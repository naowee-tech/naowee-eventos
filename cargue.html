<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naowee Eventos — Cargues del evento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared/tokens.css?v=0.4.0">
<link rel="stylesheet" href="shared/shell.css?v=0.4.5">
<link rel="stylesheet" href="shared/list-components.css?v=0.4.2">
<link rel="stylesheet" href="shared/event-detail.css?v=0.4.0">
<link rel="stylesheet" href="shared/forms.css?v=0.4.3">
<link rel="stylesheet" href="shared/naowee-footer.css?v=0.4.0">
<script src="shared/naowee-footer.js?v=0.7.7" defer></script>
<!-- SheetJS: lectura/escritura real de .xlsx para el cargue masivo (validación real por fila). -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  /* ═══════════════════════════════════════════════════════════════
     CARGUES DEL EVENTO — Gestor (workspace por evento)
     Una sola entrada: el Gestor abre un evento desde su lista y aquí ve
       (1) el DETALLE del evento (patrón canónico .det-card — shared) y
       (2) un container con 3 TABS canónicos: Inscripciones · Ranking/
           Resultados · Medallería. En cada tab: sub-segmento Masivo|Manual,
           descargar plantilla, analizar archivo y la tabla VERSIONADA de los
           archivos cargados (data con las columnas de la planilla).
     Parámetros: ?id=EV-XXXX&role=GESTOR  (compat: ?tipo= abre ese tab).
     ADMIN entra por ?tipo=…&role=ADMIN → vista oversight (solo lectura).
     ═══════════════════════════════════════════════════════════════ */

  /* ── Selector de evento (fallback sin ?id) ── */
  .carg-picker {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl);
    padding: 36px 32px; display: flex; flex-direction: column; align-items: center; gap: 20px;
    text-align: center; max-width: 560px; margin: 40px auto 0;
    animation: fadeInUp .4s var(--easing-smoothout) both;
  }
  .carg-picker__icon { width: 52px; height: 52px; border-radius: var(--radius-lg); background: var(--accent-bg); display: flex; align-items: center; justify-content: center; color: var(--accent); }
  .carg-picker__icon svg { width: 26px; height: 26px; }
  .carg-picker__title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0; }
  .carg-picker__sub { font-size: 13.5px; color: var(--text-secondary); margin: 0; line-height: 1.5; }
  .carg-picker__form { width: 100%; display: flex; flex-direction: column; gap: 14px; }

  /* ── Container "Cargues del evento" (tabs + panel) ── */
  .carg-tabs-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl);
    padding: 18px 20px 22px; animation: fadeInUp .4s var(--easing-smoothout) both; animation-delay: .08s;
  }
  .carg-tabs-card__head { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .carg-tabs-card__head svg { width: 18px; height: 18px; color: var(--text-secondary); flex-shrink: 0; }
  .carg-tabs-card__head h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 0; }

  /* Tab bar (3 tabs) — .naowee-tabs canónico (proporcional, underline ::after).
     Bleed horizontal (-20px = padding del card) → el divider va de borde a borde. */
  .carg-tabs { margin: 0 -20px 20px; }

  /* ── Sub-segmento Masivo/Manual — CENTRADO bajo los tabs ── */
  .carg-mode-bar { display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
  /* Pila de cards del modo activo (form + cola "Deportistas por inscribir") con gap */
  #modeBody { display: flex; flex-direction: column; gap: 18px; }

  /* Los avisos de estado (borrador/finalizado) usan el componente canónico del
     DS .naowee-message (--caution / --informative) de forms.css. */

  /* ── Card de cargue (sin sombra, borde 1px) ── */
  .carg-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px 22px; }
  .carg-card__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .carg-card__title { font-size: 14.5px; font-weight: 700; color: var(--text-primary); margin: 0; }
  .carg-card__sub { font-size: 12.5px; color: var(--text-secondary); margin: 4px 0 0; line-height: 1.4; }

  /* ── Plantilla CTA strip ── */
  .carg-template-strip {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 14px 18px; border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--bg-soft); margin-bottom: 22px; flex-wrap: wrap;
  }
  .carg-template-strip__info { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .carg-template-strip__ico { color: var(--green); flex-shrink: 0; display: flex; }
  .carg-template-strip__ico svg { width: 22px; height: 22px; }
  .carg-template-strip__text { font-size: 13px; color: var(--text-primary); font-weight: 500; min-width: 0; }
  .carg-template-strip__hint { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }

  /* ── Hint / nota del uploader ── */
  .carg-upload-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: flex-start; gap: 6px; }
  .carg-upload-hint svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

  /* ── Botón de analizar ── */
  .carg-analyze-row { display: flex; justify-content: flex-end; margin-top: 20px; }

  /* ── Panel de resultados ── */
  .carg-results { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 22px; display: none; }
  .carg-results.is-visible { display: block; animation: fadeInUp .3s var(--easing-smoothout) both; }
  .carg-results__summary { display: flex; align-items: stretch; gap: 0; border-bottom: 1px solid var(--border); }
  .carg-results__stat { flex: 1; padding: 16px 18px; display: flex; flex-direction: column; gap: 3px; border-right: 1px solid var(--border); }
  .carg-results__stat:last-child { border-right: 0; }
  .carg-results__stat-val { font-size: 24px; font-weight: 800; line-height: 1; font-feature-settings: 'tnum'; }
  .carg-results__stat-lbl { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .3px; }
  .carg-results__stat--total .carg-results__stat-val { color: var(--text-primary); }
  .carg-results__stat--ok    .carg-results__stat-val { color: var(--green); }
  .carg-results__stat--err   .carg-results__stat-val { color: var(--red); }
  .carg-results__body { padding: 16px 18px; }
  .carg-results__section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--text-secondary); margin-bottom: 10px; }
  /* Filas con error → cada una es un .naowee-message--negative canónico */
  .carg-err-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .carg-err-list .naowee-message__body strong { color: var(--red); font-weight: 700; white-space: nowrap; }
  .carg-results__actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .carg-results__actions-note { font-size: 12px; color: var(--text-secondary); flex: 1; min-width: 160px; }

  /* ── Modo Manual: búsqueda deportista ── */
  .carg-manual-search { display: flex; flex-direction: column; gap: 14px; }
  .carg-search-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .carg-search-row .naowee-searchbox { flex: 1 1 260px; max-width: 480px; }
  .carg-athlete-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 4px; }
  .carg-athlete-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); transition: background var(--duration-fast); }
  .carg-athlete-row:last-child { border-bottom: 0; }
  .carg-athlete-row:hover { background: var(--bg-soft); }
  .carg-athlete-row__ava { width: 36px; height: 36px; border-radius: var(--radius-full); background: var(--accent-bg); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; letter-spacing: .3px; }
  .carg-athlete-row__info { flex: 1; min-width: 0; }
  .carg-athlete-row__name { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
  .carg-athlete-row__doc { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }
  .carg-athlete-row__btn { flex-shrink: 0; }
  .carg-athlete-empty { padding: 24px 18px; text-align: center; font-size: 13px; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .carg-athlete-empty svg { width: 26px; height: 26px; color: var(--text-muted); }

  /* ── Modo Manual Ranking / Medallería (grid) ── */
  .carg-manual-grid { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }
  .carg-manual-grid__header { display: grid; column-gap: 12px; padding: 10px 16px; background: #f4f5f9; font-size: 11px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
  .carg-manual-grid__header.g-ranking { grid-template-columns: 1fr 150px 150px; }
  .carg-manual-grid__header.g-medalleria { grid-template-columns: 1fr 80px 80px 80px 90px; }
  .carg-manual-row { display: grid; column-gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); align-items: center; }
  .carg-manual-row:last-child { border-bottom: 0; }
  .carg-manual-row.g-ranking { grid-template-columns: 1fr 150px 150px; }
  .carg-manual-row.g-medalleria { grid-template-columns: 1fr 80px 80px 80px 90px; }
  .carg-manual-row__name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .carg-manual-row__doc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .carg-manual-input { height: 36px; width: 100%; padding: 0 8px; border: 1px solid var(--field-border-idle); border-radius: var(--radius-md); font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-primary); background: var(--surface); text-align: center; transition: border-color var(--duration-fast); }
  .carg-manual-input:focus { outline: none; border-width: 2px; border-color: var(--accent); }
  .carg-manual-input::-webkit-outer-spin-button,
  .carg-manual-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Pie del ranking manual: paginador (izq) + CTA Guardar (der). */
  .carg-rk-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
  .carg-rk-pager { display: flex; align-items: center; gap: 10px; }
  .carg-pg-btn { width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border-dark); background: var(--surface); border-radius: var(--radius-md); color: var(--text-secondary); cursor: pointer; transition: border-color var(--duration-fast), color var(--duration-fast); }
  .carg-pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .carg-pg-btn:disabled { opacity: .4; cursor: not-allowed; }
  .carg-pg-btn svg { width: 16px; height: 16px; }
  .carg-pg-info { font-size: 12.5px; font-weight: 500; color: var(--text-secondary); }

  /* ── Registro manual de deportistas (búsqueda SUID + form + cola en tabla) ── */
  .carg-search-row { row-gap: 10px; }
  .carg-search-row #newAthleteBtn { margin-left: auto; }

  /* Form "nuevo deportista" (panel inline canónico) */
  .carg-newform { margin-top: 8px; }
  .carg-newform[hidden] { display: none; }
  .carg-newform__inner { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-soft); padding: 18px 18px 16px; animation: fadeIn .25s ease both; }
  .carg-newform__title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
  .carg-newform__title svg { width: 16px; height: 16px; color: var(--accent); }
  .carg-newform__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .carg-newform__grid .carg-field--wide { grid-column: span 2; }
  .carg-newform__foot { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 16px; }
  .carg-field { display: flex; flex-direction: column; }

  /* Cola de inscripción */
  .carg-q-count { color: var(--text-muted); font-weight: 700; }
  .carg-q-foot { display: flex; justify-content: flex-end; margin-top: 16px; }
  .carg-qrow-x { width: 30px; height: 30px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: background var(--duration-fast), color var(--duration-fast); }
  .carg-qrow-x:hover { background: var(--red-bg); color: var(--red); }
  .carg-qrow-x:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(215,64,9,.18); }
  .carg-qrow-x svg { width: 16px; height: 16px; }

  @media (max-width: 760px) {
    .carg-newform__grid { grid-template-columns: repeat(2, 1fr); }
    .carg-newform__grid .carg-field--wide { grid-column: span 2; }
  }
  @media (max-width: 520px) {
    .carg-newform__grid { grid-template-columns: 1fr; }
    .carg-newform__grid .carg-field--wide { grid-column: span 1; }
    .carg-search-row #newAthleteBtn { margin-left: 0; }
  }

  /* ═══ ARCHIVOS CARGADOS — versionado + tabla con columnas de la planilla ═══ */
  .carg-files { margin-top: 24px; }
  .carg-files__title { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin: 0 0 12px; text-transform: uppercase; letter-spacing: .3px; display: flex; align-items: center; gap: 7px; }
  .carg-files__title svg { width: 15px; height: 15px; flex-shrink: 0; }
  .carg-files__count { color: var(--text-muted); font-weight: 600; }
  .carg-files__list { display: flex; flex-direction: column; gap: 10px; }

  .carg-file { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); }
  .carg-file__head { display: flex; align-items: center; gap: 12px; width: 100%; padding: 13px 16px; background: var(--surface); border: none; font-family: inherit; cursor: pointer; text-align: left; transition: background var(--duration-fast); }
  .carg-file__head:hover { background: var(--bg-soft); }
  .carg-file__ico { width: 34px; height: 34px; border-radius: var(--radius-md); background: var(--green-bg); color: var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .carg-file__ico svg { width: 18px; height: 18px; }
  .carg-file__meta { flex: 1; min-width: 0; }
  .carg-file__name { font-size: 13px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .carg-file__name-txt { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .carg-file__ver { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-full); background: var(--accent-bg); color: var(--accent); font-size: 10.5px; font-weight: 800; letter-spacing: .3px; flex-shrink: 0; }
  .carg-file__sub { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .carg-file__n { color: var(--green); font-weight: 700; }
  .carg-file__chev { flex-shrink: 0; color: var(--text-muted); display: flex; transition: transform var(--duration-normal) var(--easing-smoothout); }
  .carg-file__chev svg { width: 18px; height: 18px; }
  .carg-file.is-open .carg-file__chev { transform: rotate(180deg); }
  .carg-file__body { display: none; border-top: 1px solid var(--border); padding: 14px 16px 16px; background: var(--surface); }
  .carg-file.is-open .carg-file__body { display: block; animation: fadeIn .25s ease both; }

  /* Tabla de la data cargada → card-table canónica (.naowee-table--in-card) con scroll horizontal */
  .carg-data-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-lg); }
  .carg-data-scroll .naowee-table--in-card { table-layout: auto; min-width: 760px; }
  .carg-data-scroll .naowee-table--in-card tbody td { white-space: nowrap; }
  .carg-data-scroll .naowee-table--in-card .num { text-align: center; font-feature-settings: 'tnum'; }
  .carg-file__table-foot { font-size: 11.5px; color: var(--text-muted); margin-top: 10px; }

  /* ── Toast (inyectado) ── */

  /* ── Animaciones ── */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }

  /* ── :focus-visible canónico ── */
  .carg-file__head:focus-visible,
  #dlPlantilla:focus-visible,
  #browseBtn:focus-visible,
  #fileDismiss:focus-visible,
  #analyzeBtn:focus-visible,
  #submitBtn:focus-visible,
  #manualSaveBtn:focus-visible,
  .inscribir-btn:focus-visible,
  .naowee-dropdown__trigger:focus-visible,
  #evPickerCta:focus-visible {
    outline: none; box-shadow: 0 0 0 3px rgba(215,64,9,.18);
  }

  /* El "quitar" (×) del tag de archivo NO debe ser naranja (feedback Gustavo):
     neutro por defecto, rojo al hover (semántica de eliminar) — patrón del módulo. */
  .naowee-file-uploader__file-dismiss { color: var(--text-muted); }
  .naowee-file-uploader__file-dismiss svg { color: currentColor; }
  .naowee-file-uploader__file-dismiss:hover { background: var(--red-bg); color: var(--red); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .carg-card { padding: 18px 16px; }
    .carg-results__summary { flex-direction: column; }
    .carg-results__stat { border-right: 0; border-bottom: 1px solid var(--border); }
    .carg-results__stat:last-child { border-bottom: 0; }
    .carg-tabs .naowee-tab { font-size: 12.5px; gap: 5px; padding: 0 8px; }
    .carg-tabs .naowee-tab svg { width: 15px; height: 15px; }
  }
  @media (max-width: 640px) {
    .carg-tabs .naowee-tab { font-size: 11.5px; padding: 0 6px; }
    .carg-manual-grid__header.g-ranking,
    .carg-manual-row.g-ranking { grid-template-columns: 1fr 90px 90px; }
    .carg-manual-grid__header.g-ranking *:nth-child(4),
    .carg-manual-row.g-ranking *:nth-child(4) { display: none; }
    .carg-manual-grid__header.g-medalleria,
    .carg-manual-row.g-medalleria { grid-template-columns: 1fr 64px 64px 64px; }
    .carg-manual-grid__header.g-medalleria *:nth-child(5),
    .carg-manual-row.g-medalleria *:nth-child(5) { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .carg-tabs-card, .carg-results, .carg-file__body { animation: none !important; }
    .carg-file__chev { transition: none !important; }
  }

  /* ── OVERSIGHT (Admin solo lectura) ── */
  .oversight-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .oversight-head__title h2 { font-size: 22px; font-weight: 800; letter-spacing: -.4px; color: var(--text-primary); margin: 0 0 4px; }
  .oversight-head__title p { font-size: 13px; color: var(--text-secondary); margin: 0; }
  .oversight-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: var(--radius-full); background: var(--blue-bg); color: var(--blue-info); font-size: 11.5px; font-weight: 700; flex-shrink: 0; border: 1px solid #c0d8f8; }
  .oversight-badge svg { width: 14px; height: 14px; }
  .ov-gestor-chip { display: inline-flex; align-items: center; gap: 7px; }
  .ov-gestor-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .ov-gestor-name { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
  .ov-prog-wrap { display: flex; align-items: center; gap: 8px; }
  .ov-prog-track { flex: 1; height: 5px; background: var(--border); border-radius: 9999px; overflow: hidden; min-width: 60px; }
  .ov-prog-fill { height: 100%; border-radius: 9999px; background: var(--accent); transition: width .5s var(--easing-smoothout, ease); }
  .ov-prog-pct { font-size: 11.5px; font-weight: 700; color: var(--text-secondary); min-width: 32px; text-align: right; }
  .ov-last-cargue { font-size: 11.5px; color: var(--text-secondary); }
  .ov-history-toggle { background: none; border: none; font-family: inherit; font-size: 12px; color: var(--accent); font-weight: 600; cursor: pointer; padding: 3px 0; }
  .ov-history-toggle:hover { text-decoration: underline; }
  .ov-history-toggle:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(215,64,9,.18); border-radius: var(--radius-sm); }
  .ov-history-row { display: none; }
  .ov-history-row.is-open { display: table-row; }
  .ov-history-cell { padding: 0 16px 12px !important; background: var(--bg-soft); border-bottom: 1px solid var(--border); }
  .ov-history-list { display: flex; flex-direction: column; gap: 4px; padding: 8px 0 0; }

  /* Genera y descarga el .xlsx oficial (solo encabezados — el usuario llena los datos). */
  function downloadTemplate(cfg) {
    if (typeof XLSX === 'undefined') { flash('No se pudo generar la plantilla (librería no disponible).', 'error'); return; }
    const cols = TEMPLATE_COLS[activeTipo] || [];
    const ws = XLSX.utils.aoa_to_sheet([cols.map((c) => c.h)]);
    ws['!cols'] = cols.map((c) => ({ wch: Math.max(12, c.h.length + 2) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Datos');
    XLSX.writeFile(wb, cfg.plantilla);
  }

  /* Validación REAL del archivo subido contra TEMPLATE_COLS[tipo]. */
  function validateUpload(aoa, tipo) {
    const cols = TEMPLATE_COLS[tipo] || [];
    const norm = (s) => String(s ?? '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/\s+/g, ' ').trim();
    const header = (aoa[0] || []).map(norm);
    if (!aoa.length || header.every((h) => !h)) return { structureError: 'El archivo está vacío o no tiene encabezados. Descarga y usa la plantilla oficial.' };
    const idx = {}; const missing = [];
    cols.forEach((c) => { const i = header.indexOf(norm(c.h)); idx[c.k] = i; if (c.req && i < 0) missing.push(c.h); });
    if (missing.length) return { structureError: `El archivo no coincide con la plantilla oficial. Faltan columnas obligatorias: ${missing.join(', ')}.` };
    const dataRows = aoa.slice(1)
      .map((r, i) => ({ cells: r || [], fila: i + 2 }))
      .filter(({ cells }) => cells.some((c) => String(c ?? '').trim() !== ''));
    if (!dataRows.length) return { empty: true };
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const errors = [], valid = [];
    dataRows.forEach(({ cells, fila }) => {
      const get = (k) => { const i = idx[k]; return i >= 0 ? String(cells[i] ?? '').trim() : ''; };
      const probs = [];
      cols.forEach((c) => {
        const v = get(c.k);
        if (c.req && !v) probs.push(`falta «${c.h}»`);
        else if (v && c.type === 'email' && !emailRe.test(v)) probs.push(`«${c.h}» con formato inválido`);
        else if (v && c.type === 'number' && isNaN(Number(String(v).replace(',', '.')))) probs.push(`«${c.h}» debe ser numérico`);
      });
      if (probs.length) errors.push({ fila, msg: probs.join(' · ').replace(/^./, (m) => m.toUpperCase()) });
      else valid.push(displayRow(get, tipo));
    });
    return { total: dataRows.length, valid, errors };
  }

  /* Mapea una fila válida a las columnas de DISPLAY (cfg.columns) por tipo. */
  function displayRow(get, tipo) {
    const nombre = [get('pn'), get('sn'), get('pa'), get('sa')].filter(Boolean).join(' ').replace(/\s+/g, ' ').trim();
    if (tipo === 'inscripciones') return { organizacion: get('organizacion'), tipoDoc: get('tipoDoc'), nroDoc: get('nroDoc'), nombre, sexo: get('sexo'), deporte: get('deporte'), depto: get('departamento'), correo: get('correo') };
    if (tipo === 'ranking') return { organizacion: get('organizacion'), deporte: get('deporte'), prueba: get('prueba'), nombre, nroDoc: get('nroDoc'), posicion: get('posicion'), marca: get('marca') };
    return { organizacion: get('organizacion'), depto: get('departamento'), deporte: get('deporte'), prueba: get('prueba'), oro: get('oro'), plata: get('plata'), bronce: get('bronce'), total: get('total') };
  }

  /* ═══════════════════════════════════════════════════════════════
     SEGMENT helper (reusado por el sub-segmento Masivo/Manual y la tab bar)
     ═══════════════════════════════════════════════════════════════ */
  function bindSegment(segEl, getActive, onSelect) {
    const pill = segEl.querySelector('.naowee-segment__pill');
    const items = Array.from(segEl.querySelectorAll('.naowee-segment__item'));
    function place(idx, instant) {
      items.forEach((it, i) => {
        it.classList.toggle('naowee-segment__item--active', i === idx);
        it.setAttribute('aria-selected', String(i === idx));
      });
      const rect = items[idx].getBoundingClientRect();
      const segRect = segEl.getBoundingClientRect();
      /* El pill (position:absolute; left:0) se ancla al padding-box del segment
         (justo dentro del borde). Restar SOLO el ancho del borde lo alinea con el
         ítem y respeta el padding del contenedor en ambos extremos. */
      const bl = parseFloat(getComputedStyle(segEl).borderLeftWidth) || 0;
      const x = rect.left - segRect.left - bl;
      if (instant) {
        /* init / cambio de tab / reflow → posiciona SIN animación */
        pill.classList.add('naowee-segment__pill--no-anim');
        pill.style.setProperty('--seg-x', `${x}px`);
        pill.style.width = `${rect.width}px`;
        void pill.offsetWidth;                                    // commit instantáneo
        pill.classList.remove('naowee-segment__pill--no-anim');   // re-habilita transición para clicks
      } else {
        /* click directo Masivo↔Manual → anima */
        pill.style.setProperty('--seg-x', `${x}px`);
        pill.style.width = `${rect.width}px`;
      }
    }
    const init = items.findIndex((it) => it.dataset.val === getActive());
    place(init >= 0 ? init : 0, true);
    items.forEach((it, i) => it.addEventListener('click', () => { place(i, false); onSelect(it.dataset.val); }));
    /* Reposiciona el pill tras reflow (fonts/responsive) sin animar. */
    requestAnimationFrame(() => { const k = items.findIndex((x) => x.dataset.val === getActive()); if (k >= 0) place(k, true); });
  }

                ? `<div class="naowee-dropdown__empty">No hay eventos asignados a tu perfil.</div>`
                : list.map((e) => `
                    <button class="naowee-dropdown__opt" role="option" data-ev-id="${e.id}">
                      <span style="font-size:18px;flex-shrink:0">${e.emoji}</span>
                      <span>${esc(e.name)} <span style="color:var(--text-muted);font-size:12px;font-weight:400">· ${e.id}</span></span>
                    </button>`).join('')
              }
            </div>
          </div>
          <button class="naowee-btn naowee-btn--loud" id="evPickerCta" disabled style="width:100%">Continuar →</button>
        </div>
      </div>
    `;
    const dd = document.getElementById('evPickerDd');
    const trigger = document.getElementById('evPickerTrigger');
    const menu = document.getElementById('evPickerMenu');
    const val = document.getElementById('evPickerVal');
    const cta = document.getElementById('evPickerCta');
    let chosen = null;
    trigger.addEventListener('click', () => dd.classList.toggle('is-open'));
    document.addEventListener('click', (e) => { if (!dd.contains(e.target)) dd.classList.remove('is-open'); });
    menu.querySelectorAll('[data-ev-id]').forEach((opt) => {
      opt.addEventListener('click', () => {
        chosen = opt.dataset.evId;
        val.textContent = opt.textContent.trim();
        val.classList.remove('is-placeholder');
        dd.classList.remove('is-open');
        cta.disabled = false;
        menu.querySelectorAll('.is-selected').forEach((o) => o.classList.remove('is-selected'));
        opt.classList.add('is-selected');
      });
    });
    cta.addEventListener('click', () => {
      if (!chosen) return;
      window.location.href = `cargue.html?id=${encodeURIComponent(chosen)}&role=${roleCode}`;
    });
  }

  /* ─── DETALLE del evento (patrón canónico .det-card — shared) ─── */
  function detailHTML() {
    const g = gestorObj();
    const gestorBlock = g
      ? `<div class="gestor-field">
           <span class="gestor-field__av" style="background:${esc(g.color)}" aria-hidden="true">${esc(g.avatar)}</span>
           <span class="gestor-field__meta">
             <span class="gestor-field__nm">${esc(g.name)}</span>
             <span class="gestor-field__role">${esc(g.area || 'Gestor de eventos')}</span>
           </span>
         </div>`
      : `<span style="font-size:13px;color:var(--text-secondary)">Sin asignar</span>`;
    return `
      <section class="det-card" aria-label="Datos del evento">
        <header class="det-head">
          <div class="det-head__id">
            <a class="det-back" href="eventos.html?role=${roleCode}${fromCalendar ? '&view=calendar' : ''}" aria-label="Volver a eventos" title="Volver a eventos">${I.chevL}</a>
            <h2 class="det-head__name">${esc(ev.name)}</h2>
            <span class="badge s-${ev.status}">${STATUS_LABEL[ev.status]}</span>
          </div>
        </header>
        <div class="meta-strip" role="group" aria-label="Fechas, lugar y organismo">
          <div class="meta-strip__col"><span class="meta-strip__lbl">${I.cal} Fecha de inicio</span><span class="meta-strip__val">${esc(ev.start)}</span></div>
          <div class="meta-strip__col"><span class="meta-strip__lbl">${I.cal} Fecha final</span><span class="meta-strip__val">${esc(ev.end)}</span></div>
          <div class="meta-strip__col"><span class="meta-strip__lbl">${I.pin} Lugar</span><span class="meta-strip__val">${esc(ev.place)}</span></div>
          <div class="meta-strip__col"><span class="meta-strip__lbl">${I.org} Organismo</span><span class="meta-strip__val">${esc(ev.org)}</span></div>
        </div>
        <div class="det-foot">
          <div class="det-foot__block">
            <span class="det-foot__lbl">${I.user} Gestor asignado</span>
            ${gestorBlock}
          </div>
          <div class="det-foot__block">
            <span class="det-foot__lbl">${I.doc} Descripción</span>
            <p class="det-foot__desc">${esc(ev.descripcion || 'Evento del calendario oficial gestionado en Naowee Eventos. La operación (inscripciones, resultados y medallería) se realiza por cargue mientras el evento esté activo.')}</p>
          </div>
        </div>
      </section>
    `;
  }

  /* ─── WORKSPACE del gestor: detalle + container de tabs ─── */
  function renderWorkspace() {
    document.getElementById('cargueApp').innerHTML = `
      ${detailHTML()}
      <section class="carg-tabs-card" aria-label="Cargues del evento">
        <div class="carg-tabs-card__head">${I.upload}<h3>Cargues del evento</h3></div>
        <div class="naowee-tabs naowee-tabs--proportional carg-tabs" id="tipoTabs" role="tablist" aria-label="Tipo de cargue">
          ${TIPOS.map((t) => `
            <button class="naowee-tab${t === activeTipo ? ' naowee-tab--selected' : ''}" data-tab="${t}" type="button" role="tab" aria-selected="${t === activeTipo}">
              ${getIcon(TIPO_CFG[t].icon)}<span class="carg-tab-lbl">${TIPO_CFG[t].tabLabel}</span>
            </button>`).join('')}
        </div>
        <div id="tabPanel"></div>
      </section>
    `;
    document.querySelectorAll('#tipoTabs .naowee-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        const val = tab.dataset.tab;
        if (val === activeTipo) return;
        activeTipo = val;
        activeMode = 'masivo';
        selectedFile = null; parseResults = null;
        inscQueue = []; newDraft = {};
        document.querySelectorAll('#tipoTabs .naowee-tab').forEach((t) => {
          const on = t.dataset.tab === val;
          t.classList.toggle('naowee-tab--selected', on);
          t.setAttribute('aria-selected', String(on));
        });
        renderTabPanel();
      });
    });
    renderTabPanel();
  }

  /* ─── PANEL del tab activo ─── */
  function renderTabPanel() {
    const cfg = TIPO_CFG[activeTipo];
    const panel = document.getElementById('tabPanel');
    if (!panel) return;

    /* Único estado que cierra el cargue: finalizado → solo lectura de lo ya cargado.
       (Borrador NO bloquea: el gestor puede adelantar la operación — feedback Danna.) */
    if (!gateOpen) {
      panel.innerHTML = `
        <div class="naowee-message naowee-message--informative" style="margin-bottom:18px">
          <div class="naowee-message__header">
            <span class="naowee-message__icon"><svg viewBox="0 0 16 16" fill="none"><path d="M7 7h2v4H7z" fill="#fff"/><circle cx="8" cy="5" r="1" fill="#fff"/></svg></span>
            <span class="naowee-message__body">Evento <strong>finalizado</strong> · los cargues están cerrados (solo lectura). Puedes consultar los archivos ya cargados.</span>
          </div>
        </div>
        ${filesHTML()}
      `;
      bindFiles();
      return;
    }

    /* Aviso informativo (no bloquea): el evento aún está en borrador pero el gestor
       puede adelantar los cargues; se activará en su fecha de inicio. */
    const borradorNote = ev.status === 'borrador'
      ? `<div class="naowee-message naowee-message--caution" style="margin-bottom:18px">
           <div class="naowee-message__header">
             <span class="naowee-message__icon"><svg viewBox="0 0 16 16" fill="none"><path d="M7 5h2v4H7z" fill="#fff"/><circle cx="8" cy="11" r="1" fill="#fff"/></svg></span>
             <span class="naowee-message__body">Evento en <strong>borrador</strong>. Puedes adelantar los cargues de <strong>${esc(cfg.label.toLowerCase())}</strong>; el evento se activará automáticamente el <strong>${esc(ev.start)}</strong>.</span>
           </div>
         </div>`
      : '';
    panel.innerHTML = `
      ${borradorNote}
      <div class="carg-mode-bar">
        <div class="naowee-segment" data-segmented id="modeSegment" role="tablist" aria-label="Modo de cargue">
          <span class="naowee-segment__pill" aria-hidden="true"></span>
          <button class="naowee-segment__item naowee-segment__item--active" data-val="masivo" type="button" role="tab" aria-selected="true">Masivo</button>
          <button class="naowee-segment__item" data-val="manual" type="button" role="tab" aria-selected="false">Manual</button>
        </div>
      </div>
      <div id="modeBody"></div>
      <div id="filesMount">${filesHTML()}</div>
    `;
    bindSegment(document.getElementById('modeSegment'), () => activeMode, (val) => {
      if (val === activeMode) return;
      activeMode = val;
      renderModeBody();
    });
    renderModeBody();
    bindFiles();
  }

  function renderModeBody() {
    const cfg = TIPO_CFG[activeTipo];
    const modeBody = document.getElementById('modeBody');
    if (!modeBody) return;
    if (activeMode === 'masivo') renderMasivo(modeBody, cfg);
    else renderManual(modeBody, cfg);
  }

  /* ═══ MODO MASIVO ═══ */
  function renderMasivo(container, cfg) {
    container.innerHTML = `
      <div class="carg-card" id="uploadCard">
        <div class="carg-card__head">
          <div>
            <h3 class="carg-card__title">Cargue masivo — ${esc(cfg.label)}</h3>
            <p class="carg-card__sub">Descarga la plantilla oficial, rellena los datos y súbela. El sistema detecta errores por fila y carga las válidas aunque otras fallen.</p>
          </div>
        </div>

        <div class="carg-template-strip">
          <div class="carg-template-strip__info">
            <span class="carg-template-strip__ico">${I.fileSheet}</span>
            <div>
              <div class="carg-template-strip__text">Plantilla oficial: <strong>${esc(cfg.plantilla)}</strong></div>
              <div class="carg-template-strip__hint">La estructura está bloqueada — solo llena los datos. No modifiques columnas ni formato.</div>
            </div>
          </div>
          <button class="naowee-btn naowee-btn--ghost naowee-btn--sm" type="button" id="dlPlantilla">
            ${I.download} Descargar plantilla
          </button>
        </div>

        <div class="naowee-file-uploader" id="fileUploader">
          <span class="naowee-file-uploader__label naowee-file-uploader__label--required">Archivo de cargue</span>
          <input type="file" id="fileInput" accept=".xlsx,.xls" tabindex="-1">
          <div id="uploaderBody"></div>
          <div id="uploaderHelper"></div>
          <div class="carg-upload-hint">${I.info}<span>${esc(cfg.hint)}</span></div>
        </div>

        <div class="carg-analyze-row">
          <button class="naowee-btn naowee-btn--loud" id="analyzeBtn" disabled>${I.file} Analizar archivo</button>
        </div>

        <div class="carg-results" id="resultsPanel"></div>
      </div>
    `;
    bindMasivo(cfg);
  }

  /* Uploader con estados canónicos:
       idle    → botón "Seleccionar archivo" + dropzone
       success → tag con check verde + nombre + extensión + dismiss (oculta dropzone)
       error   → dropzone con borde error + helper--negative debajo */
  function bindMasivo(cfg) {
    const uploader = document.getElementById('fileUploader');
    const fileInput = document.getElementById('fileInput');
    const body = document.getElementById('uploaderBody');
    const helperSlot = document.getElementById('uploaderHelper');
    const analyzeBtn = document.getElementById('analyzeBtn');

    function clearResults() {
      const rp = document.getElementById('resultsPanel');
      rp.classList.remove('is-visible'); rp.innerHTML = ''; parseResults = null;
    }

    function bindBrowse() {
      document.getElementById('browseBtn')?.addEventListener('click', () => fileInput.click());
    }
    function bindDrop() {
      const dropZone = document.getElementById('dropZone');
      const fileInputDrop = document.getElementById('fileInputDrop');
      if (!dropZone) return;
      fileInputDrop.addEventListener('change', () => setFile(fileInputDrop.files[0] || null));
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('is-drag-over'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('is-drag-over'));
      dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('is-drag-over'); const f = e.dataTransfer.files[0]; if (f) setFile(f); });
    }

    function paintIdle() {
      uploader.classList.remove('naowee-file-uploader--error');
      helperSlot.innerHTML = '';
      body.innerHTML = `
        <div class="naowee-file-uploader__input-wrap">
          <span class="naowee-file-uploader__placeholder" id="filePlaceholder">Ningún archivo seleccionado</span>
          <button class="naowee-file-uploader__action" type="button" id="browseBtn">${I.upload} Seleccionar archivo</button>
        </div>
        <div class="naowee-file-uploader__drop-zone" id="dropZone">
          <input type="file" id="fileInputDrop" accept=".xlsx,.xls">
          <span class="naowee-file-uploader__drop-icon">${I.upload}</span>
          <span class="naowee-file-uploader__drop-title">Arrastra aquí tu archivo .xlsx</span>
          <span class="naowee-file-uploader__drop-hint">Solo .xlsx · peso máximo 50 MB · sin límite de registros</span>
        </div>`;
      bindBrowse(); bindDrop();
      analyzeBtn.disabled = true;
    }

    function paintError(msg) {
      paintIdle();
      uploader.classList.add('naowee-file-uploader--error');
      helperSlot.innerHTML = `<div class="naowee-helper naowee-helper--negative"><span class="naowee-helper__badge">${I.bang}</span><span class="naowee-helper__text">${esc(msg)}</span></div>`;
    }

    function paintSuccess(f) {
      uploader.classList.remove('naowee-file-uploader--error');
      helperSlot.innerHTML = '';
      const dot = f.name.lastIndexOf('.');
      const base = dot > 0 ? f.name.slice(0, dot) : f.name;
      const ext = dot > 0 ? f.name.slice(dot) : '';
      body.innerHTML = `
        <div class="naowee-file-uploader__input-wrap">
          <span class="naowee-file-uploader__file-tag naowee-file-uploader__file-tag--uploaded">
            ${I.checkCircle}
            <span class="naowee-file-uploader__file-name">${esc(base)}</span><span class="naowee-file-uploader__file-ext">${esc(ext)}</span>
            <button class="naowee-file-uploader__file-dismiss" type="button" id="fileDismiss" aria-label="Quitar archivo">${I.x}</button>
          </span>
          <span style="flex:1"></span>
          <span class="naowee-file-uploader__file-size">${(f.size / 1024).toFixed(0)} KB</span>
        </div>`;
      document.getElementById('fileDismiss').addEventListener('click', () => { selectedFile = null; clearResults(); paintIdle(); });
      analyzeBtn.disabled = false;
    }

    function setFile(f) {
      if (!f) { selectedFile = null; clearResults(); paintIdle(); return; }
      const nm = f.name.toLowerCase();
      if (!nm.endsWith('.xlsx') && !nm.endsWith('.xls')) { selectedFile = null; clearResults(); paintError('Formato no válido. Solo se aceptan archivos .xlsx o .xls.'); return; }
      if (f.size > 50 * 1024 * 1024) { selectedFile = null; clearResults(); paintError('El archivo supera el límite de 50 MB. Reduce el tamaño e intenta de nuevo.'); return; }
      selectedFile = f; clearResults(); paintSuccess(f);
    }

    fileInput.addEventListener('change', () => setFile(fileInput.files[0] || null));
    document.getElementById('dlPlantilla')?.addEventListener('click', () => downloadTemplate(cfg));

    /* Análisis REAL: lee el .xlsx, valida encabezados + filas contra TEMPLATE_COLS.
       Ya no inventa errores — reporta lo que de verdad falta/está mal en el archivo. */
    analyzeBtn.addEventListener('click', () => {
      if (!selectedFile) return;
      if (typeof XLSX === 'undefined') { renderResultsError('No se pudo cargar el lector de archivos (.xlsx). Revisa tu conexión e intenta de nuevo.'); return; }
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = 'Analizando…';
      const restore = () => { analyzeBtn.innerHTML = `${I.file} Analizar archivo`; analyzeBtn.disabled = false; };
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const aoa = ws ? XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false, defval: '' }) : [];
          const res = validateUpload(aoa, activeTipo);
          if (res.structureError) renderResultsError(res.structureError);
          else if (res.empty) renderResultsError('El archivo no tiene filas de datos. Descarga la plantilla, llénala y vuelve a subir.');
          else { parseResults = res; renderResults(res, cfg); }
        } catch (err) {
          renderResultsError('No se pudo leer el archivo. Asegúrate de que sea un .xlsx válido generado desde la plantilla oficial.');
        }
        restore();
      };
      reader.onerror = () => { renderResultsError('No se pudo leer el archivo. Intenta de nuevo.'); restore(); };
      reader.readAsArrayBuffer(selectedFile);
    });

    paintIdle();
  }

  /* Error de estructura/archivo vacío → message caution canónico en el panel. */
  function renderResultsError(msg) {
    const panel = document.getElementById('resultsPanel');
    if (!panel) return;
    panel.innerHTML = `
      <div class="naowee-message naowee-message--caution">
        <div class="naowee-message__header">
          <span class="naowee-message__icon">${I.bang}</span>
          <span class="naowee-message__body">${esc(msg)}</span>
        </div>
      </div>`;
    panel.classList.add('is-visible');
    parseResults = null;
  }

  /* ─── Panel de resultados del análisis ─── */
  function renderResults(r, cfg) {
    const panel = document.getElementById('resultsPanel');
    if (!panel) return;
    const nOk = r.valid.length, nErr = r.errors.length;
    const errRows = r.errors.map((e) => `
      <div class="naowee-message naowee-message--negative">
        <div class="naowee-message__header">
          <span class="naowee-message__icon">${I.bang}</span>
          <span class="naowee-message__body"><strong>Fila ${e.fila}</strong> · ${esc(e.msg)}</span>
        </div>
      </div>`).join('');

    panel.innerHTML = `
      <div class="carg-results__summary">
        <div class="carg-results__stat carg-results__stat--total"><span class="carg-results__stat-val">${r.total}</span><span class="carg-results__stat-lbl">Total filas</span></div>
        <div class="carg-results__stat carg-results__stat--ok"><span class="carg-results__stat-val">${nOk}</span><span class="carg-results__stat-lbl">Válidas</span></div>
        <div class="carg-results__stat carg-results__stat--err"><span class="carg-results__stat-val">${nErr}</span><span class="carg-results__stat-lbl">Con error</span></div>
      </div>
      <div class="carg-results__body">
        ${nErr > 0 ? `<div class="carg-results__section-label">Filas con error (${nErr}) — corrige y re-sube</div><div class="carg-err-list">${errRows}</div>` : ''}
        ${nOk > 0
          ? `<div class="carg-results__section-label">Filas válidas</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span class="naowee-badge naowee-badge--positive naowee-badge--large">${I.check} ${nOk} filas listas para cargar</span></div>`
          : `<p style="color:var(--text-muted);font-size:13px;margin:8px 0 0">Sin filas válidas en este archivo.</p>`}
      </div>
      ${nOk > 0 ? `
        <div class="carg-results__actions">
          <span class="carg-results__actions-note">${nErr > 0
            ? `Las ${nErr} fila${nErr > 1 ? 's' : ''} con error no se cargarán. Puedes cargar las ${nOk} válidas ahora y re-subir las erróneas después de corregirlas.`
            : `Todas las filas son válidas. Listo para cargar.`}</span>
          <button class="naowee-btn naowee-btn--loud" id="submitBtn">${I.check} Cargar ${nOk} fila${nOk !== 1 ? 's' : ''} válida${nOk !== 1 ? 's' : ''}</button>
        </div>` : ''}
    `;
    panel.classList.add('is-visible');
    document.getElementById('submitBtn')?.addEventListener('click', () => commitUpload(r.valid, cfg));
  }

  /* ─── Confirmar cargue masivo → crea versión de archivo + actualiza progreso ─── */
  function commitUpload(validRows, cfg) {
    if (!selectedEventId || !validRows.length) return;
    const n = validRows.length;
    const fileName = (selectedFile && selectedFile.name) || cfg.plantilla;
    applyUpload(selectedEventId, cfg.storeTipo, n);
    const ts = nowStamp();
    addUploadRecord(selectedEventId, { tipo: cfg.label, n, modeLabel: 'Masivo', timestamp: ts });
    addFileVersion(selectedEventId, cfg.storeTipo, {
      fileName, n, modeLabel: 'Masivo', timestamp: ts,
      columns: cfg.columns, rows: validRows
    });
    /* Inscripción masiva → los deportistas válidos entran al roster del evento
       (fuente de verdad para ranking/resultados y medallería). */
    if (cfg.storeTipo === 'insc') {
      addInscritos(selectedEventId, validRows.map((r) => ({
        tipoDoc: r.tipoDoc, nroDoc: r.nroDoc, nombre: r.nombre, sexo: r.sexo,
        deporte: r.deporte, depto: r.depto, organizacion: r.organizacion || '', correo: r.correo || '',
        origen: 'Masivo'
      })));
    }
    flash(`✓ ${n} fila${n !== 1 ? 's' : ''} cargada${n !== 1 ? 's' : ''} correctamente en ${cfg.label}.`, 'success');
    /* Refresca el panel (resetea uploader + muestra la nueva versión arriba). */
    selectedFile = null; parseResults = null;
    renderTabPanel();
  }

  /* ═══ MODO MANUAL ═══ */
  function renderManual(container, cfg) {
    if (cfg.manualMode === 'search') renderManualSearch(container, cfg);
    else if (activeTipo === 'ranking' && ev && ev.alcance === 'internacional') renderManualRankingIntl(container);
    else if (activeTipo === 'medalleria') renderManualMedalleria(container, cfg);
    else renderManualGrid(container, cfg);
  }

  /* ═══ MEDALLERÍA MANUAL (rediseño, feedback Juanma 25-jun) ═══
     Antes era por departamento. Ahora: buscar al deportista y darle su medalla en
     la competencia. El medallero por organismo se calcula solo (el deportista ya
     pertenece a una organización). */
  function renderManualMedalleria(container, cfg) {
    const rows = effectiveRoster(ev);
    if (!rows.length) { rosterEmptyState(container, 'Las medallas'); return; }
    const medals = {};   // id -> 'oro' | 'plata' | 'bronce'
    const medalRow = (r) => `
      <div class="carg-med-row" data-id="${r.id}">
        <div class="carg-med-row__info">
          <div class="carg-med-row__name">${esc(r.nombre)}</div>
          <div class="carg-med-row__sub">${rosterSub(r)}</div>
        </div>
        <div class="carg-med-picker" role="group" aria-label="Medalla de ${esc(r.nombre)}">
          <button type="button" class="carg-medal ${medals[r.id] === 'oro' ? 'is-selected' : ''}" data-medal="oro" data-id="${r.id}" title="Oro">🥇</button>
          <button type="button" class="carg-medal ${medals[r.id] === 'plata' ? 'is-selected' : ''}" data-medal="plata" data-id="${r.id}" title="Plata">🥈</button>
          <button type="button" class="carg-medal ${medals[r.id] === 'bronce' ? 'is-selected' : ''}" data-medal="bronce" data-id="${r.id}" title="Bronce">🥉</button>
        </div>
      </div>`;
    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Captura manual — Medallería</h3>
          <p class="carg-card__sub">Busca al deportista y asígnale su medalla en la competencia. El medallero por organismo se calcula solo.${sampleNote(rows.length)}</p>
        </div></div>
        <div class="carg-search-row" style="margin-bottom:14px">
          <div class="naowee-searchbox" id="medSearch" style="max-width:480px;flex:1 1 260px">
            <div class="naowee-searchbox__input-wrap">
              <span class="naowee-searchbox__icon">${I.search}</span>
              <input class="naowee-searchbox__input" type="search" id="medInput" placeholder="Nombre, documento o deporte…" autocomplete="off">
              <button class="naowee-searchbox__clear" id="medClear" type="button" aria-label="Limpiar búsqueda">${I.x}</button>
            </div>
          </div>
        </div>
        <div class="carg-med-list" id="medList">${rows.map(medalRow).join('')}</div>
        <div class="carg-med-foot">
          <span class="carg-med-count" id="medCount">0 medallas asignadas</span>
          <button class="naowee-btn naowee-btn--loud" id="manualSaveBtn" disabled>${I.check} Guardar medallería</button>
        </div>
      </div>`;
    const list = container.querySelector('#medList');
    const countEl = container.querySelector('#medCount');
    const saveBtn = container.querySelector('#manualSaveBtn');
    const input = container.querySelector('#medInput');
    const searchBox = container.querySelector('#medSearch');
    const sync = () => {
      const n = Object.keys(medals).length;
      countEl.textContent = `${n} medalla${n !== 1 ? 's' : ''} asignada${n !== 1 ? 's' : ''}`;
      saveBtn.disabled = n === 0;
    };
    function bindMedals() {
      list.querySelectorAll('.carg-medal').forEach((b) => b.addEventListener('click', () => {
        const id = b.dataset.id, m = b.dataset.medal;
        if (medals[id] === m) delete medals[id]; else medals[id] = m;
        b.closest('.carg-med-row').querySelectorAll('.carg-medal').forEach((x) => x.classList.toggle('is-selected', medals[id] === x.dataset.medal));
        sync();
      }));
    }
    const renderList = () => {
      const q = (input.value || '').trim().toLowerCase();
      const filtered = q ? rows.filter((r) => `${r.nombre} ${rosterDoc(r)} ${r.deporte} ${r.prueba || ''}`.toLowerCase().includes(q)) : rows;
      list.innerHTML = filtered.length ? filtered.map(medalRow).join('') : '<div class="carg-empty-inline" style="padding:16px;color:var(--text-muted)">Sin resultados para esa búsqueda.</div>';
      bindMedals();
    };
    bindMedals();
    input.addEventListener('input', () => { searchBox.classList.toggle('naowee-searchbox--has-value', input.value.length > 0); renderList(); });
    container.querySelector('#medClear').addEventListener('click', () => { input.value = ''; searchBox.classList.remove('naowee-searchbox--has-value'); renderList(); input.focus(); });
    saveBtn.addEventListener('click', () => {
      const n = Object.keys(medals).length;
      applyUpload(selectedEventId, 'med', n);
      addUploadRecord(selectedEventId, { tipo: 'Medallería', n, modeLabel: 'Manual', timestamp: nowStamp() });
      flash(`✓ ${n} medalla${n !== 1 ? 's' : ''} guardada${n !== 1 ? 's' : ''} correctamente.`, 'success');
    });
    sync();
  }

  /* ═══ RANKING INTERNACIONAL (feedback Juanma/Vanessa 25-jun) ═══
     En un evento internacional solo se sigue a los deportistas de Colombia.
     Para cada colombiano se registra su posición y se crean los participantes
     "ficticios" (país + nombre) del podio contra los que compitió. */
  const PAISES = [
    { value: 'BR', label: '🇧🇷 Brasil' }, { value: 'AR', label: '🇦🇷 Argentina' },
    { value: 'US', label: '🇺🇸 Estados Unidos' }, { value: 'FR', label: '🇫🇷 Francia' },
    { value: 'ES', label: '🇪🇸 España' }, { value: 'MX', label: '🇲🇽 México' },
    { value: 'CA', label: '🇨🇦 Canadá' }, { value: 'DE', label: '🇩🇪 Alemania' },
    { value: 'JP', label: '🇯🇵 Japón' }, { value: 'CL', label: '🇨🇱 Chile' },
    { value: 'PE', label: '🇵🇪 Perú' }, { value: 'CO', label: '🇨🇴 Colombia' }

  const ICON_X = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

  function renderManualRankingIntl(container) {
    const rows = effectiveRoster(ev);
    if (!rows.length) { rosterEmptyState(container, 'Los resultados'); return; }
    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Captura manual — Ranking internacional</h3>
          <p class="carg-card__sub">Registra la posición del deportista colombiano y el podio de la prueba.</p>
        </div></div>
        <div class="naowee-message naowee-message--informative" style="margin-bottom:16px">
          <div class="naowee-message__header">
            <span class="naowee-message__icon"><svg viewBox="0 0 16 16" fill="none"><path d="M7 7h2v4H7z" fill="#fff"/><circle cx="8" cy="5" r="1" fill="#fff"/></svg></span>
            <span class="naowee-message__body">Evento <strong>internacional</strong>: solo se hace seguimiento a los deportistas de Colombia 🇨🇴. Para cada uno, crea los <strong>participantes ficticios</strong> (país + nombre) del podio contra los que compitió.</span>

      </div>`;
    /* El drawer se monta en <body>: position:fixed dentro del card quedaba
       atrapado por un ancestro con transform (animación) → no cubría toda la
       pantalla ni mostraba el overlay. En body se ancla al viewport. */
    document.getElementById('intlDrawer')?.remove();
    document.body.insertAdjacentHTML('beforeend', intlDrawerHTML());
    bindIntl(container, rows);
  }

  function bindIntl(container, rows) {
    const drawer = document.getElementById('intlDrawer');
    const paisState = { 1: '', 2: '', 3: '' };
    let currentId = null;
    [1, 2, 3].forEach((n) => {
      const dd = drawer.querySelector(`[data-dd-pais="${n}"]`);
      setupDropdown(dd, PAISES, () => paisState[n], (val) => { paisState[n] = val; });
    });
    const clearForm = () => {
      ['colPos', 'colMarca'].forEach((id) => { const e = drawer.querySelector('#' + id); if (e) e.value = ''; });
      [1, 2, 3].forEach((n) => {
        paisState[n] = '';
        const dd = drawer.querySelector(`[data-dd-pais="${n}"]`);
        const v = dd.querySelector('[data-dd-val]'); v.textContent = 'Selecciona país…'; v.classList.add('is-placeholder');
        drawer.querySelector(`[data-slot-nombre="${n}"]`).value = '';
        drawer.querySelector(`[data-slot-marca="${n}"]`).value = '';
      });
    };
    const open = (id) => {
      currentId = id; clearForm();
      const r = rows.find((x) => x.id === id);
      drawer.querySelector('[data-drawer-name]').textContent = r.nombre;
      drawer.querySelector('[data-drawer-sub]').textContent = r.prueba ? `${r.deporte} · ${r.prueba}` : (r.deporte || '');
      drawer.hidden = false;
      void drawer.offsetWidth;           // reflow → commit del estado cerrado para que la transición del panel/overlay anime
      drawer.classList.add('is-open');
    };
    const close = () => { drawer.classList.remove('is-open'); setTimeout(() => { drawer.hidden = true; }, 300); };
    container.querySelectorAll('[data-open]').forEach((b) => b.addEventListener('click', () => open(b.dataset.open)));
    drawer.querySelectorAll('[data-close]').forEach((b) => b.addEventListener('click', close));
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !drawer.hidden) close(); });
    drawer.querySelector('#intlSaveBtn').addEventListener('click', () => {
      if (!currentId) return;
      intlDone.add(currentId);
      const row = container.querySelector(`.carg-intl-athlete[data-athlete="${currentId}"]`);
      if (row) {
        row.classList.add('is-done');
        row.querySelector('[data-status]').hidden = false;
        row.querySelector('[data-open]').textContent = 'Editar';
      }
      close();
      applyUpload(selectedEventId, 'res', 1);
      addUploadRecord(selectedEventId, { tipo: 'Ranking / Resultados', n: 1, modeLabel: 'Manual · internacional', timestamp: nowStamp() });
      flash('✓ Resultado internacional registrado.', 'success');
    });
  }

  /* ── Dropdown flotante canónico (reusable para el form de nuevo deportista) ── */
  function setupDropdown(ddEl, opts, getVal, onSelect) {
    if (!ddEl) return;
    const trigger = ddEl.querySelector('.naowee-dropdown__trigger');
    const menu = ddEl.querySelector('.naowee-dropdown__menu');
    const valEl = ddEl.querySelector('.naowee-dropdown__value');
    function paint() {
      const cur = getVal();
      menu.innerHTML = opts.map((o) => `
        <button type="button" class="naowee-dropdown__opt ${o.value === cur ? 'is-selected' : ''}" data-val="${esc(o.value)}" role="option">
          ${o.emoji ? `<span class="naowee-dropdown__opt-emoji">${o.emoji}</span>` : ''}<span>${esc(o.label)}</span>
          <span class="naowee-dropdown__opt-check">${I.check}</span>
        </button>`).join('');
      menu.querySelectorAll('.naowee-dropdown__opt').forEach((b) => {
        b.addEventListener('click', (e) => {
          e.stopPropagation();
          const o = opts.find((x) => x.value === b.dataset.val);
          valEl.textContent = o ? o.label : '';
          valEl.classList.remove('is-placeholder');
          ddEl.classList.remove('is-open');
          onSelect(b.dataset.val, o);
        });
      });
    }
    trigger.addEventListener('click', (e) => { e.stopPropagation(); const open = ddEl.classList.toggle('is-open'); if (open) paint(); });
    document.addEventListener('click', (e) => { if (!ddEl.contains(e.target)) ddEl.classList.remove('is-open'); });
  }

  /* ── Modo manual Inscripciones: búsqueda SUID + form + cola en tabla ── */
  function renderManualSearch(container, cfg) {
    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Inscripción individual</h3>
          <p class="carg-card__sub">Busca el deportista en el SUID y agrégalo a la lista, o regístralo como nuevo. Cuando termines, inscríbelos a todos de una vez.</p>
        </div></div>
        <div class="carg-manual-search">
          <div class="carg-search-row">
            <div class="naowee-searchbox" id="athleteSearch" style="max-width:460px;flex:1 1 260px">
              <div class="naowee-searchbox__input-wrap">
                <span class="naowee-searchbox__icon">${I.search}</span>
                <input class="naowee-searchbox__input" type="search" id="athleteInput" placeholder="Nombre o número de documento…" autocomplete="off">
                <button class="naowee-searchbox__clear" id="athleteClear" type="button" aria-label="Limpiar búsqueda">${I.x}</button>
              </div>
            </div>
            <button class="naowee-btn naowee-btn--ghost naowee-btn--sm" id="searchBtn" type="button">${I.search} Buscar</button>

      <div class="carg-card" id="queueCard">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Deportistas por inscribir <span class="carg-q-count" id="qCount">(0)</span></h3>
