<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naowee Eventos — Cargue</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared/tokens.css?v=0.3.0">
<link rel="stylesheet" href="shared/shell.css?v=0.3.0">
<link rel="stylesheet" href="shared/list-components.css?v=0.3.0">
<link rel="stylesheet" href="shared/forms.css?v=0.3.0">
<link rel="stylesheet" href="shared/naowee-footer.css?v=0.3.0">
<script src="shared/naowee-footer.js?v=0.3.0" defer></script>

<style>
  /* ═══════════════════════════════════════════════════════════════
     CARGUE — Fase 4 (Gestor)
     Pantalla de cargue reutilizable: inscripciones · ranking · medallería.
     Parametrizada por ?tipo=inscripciones|ranking|medalleria&id=EV-XXXX&role=GESTOR.
     Shell canónico: sidebar + top-header (sin título de página).
     Dos modos via .naowee-segment: Manual | Masivo.
     ═══════════════════════════════════════════════════════════════ */

  /* ── Encabezado de contexto del evento ── */
  .carg-hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 20px 24px 18px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    margin-bottom: 20px; animation: fadeInUp .38s var(--easing-smoothout) both;
  }
  .carg-hero__back {
    display: inline-flex; align-items: center; justify-content: center;
    width: 38px; height: 38px; flex-shrink: 0; border-radius: var(--radius-md);
    color: var(--accent); background: transparent; border: none; cursor: pointer;
    transition: background var(--duration-normal);
  }
  .carg-hero__back:hover { background: var(--accent-bg); }
  .carg-hero__back:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(215,64,9,.18); }
  .carg-hero__back svg { width: 22px; height: 22px; }
  .carg-hero__info { flex: 1; min-width: 0; }
  .carg-hero__name { font-size: 16px; font-weight: 700; color: var(--text-primary); margin: 0 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .carg-hero__meta { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .carg-hero__tipo { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700; letter-spacing: .2px; white-space: nowrap; }
  .carg-hero__tipo.t-inscripciones { background: var(--blue-bg); color: var(--blue-info); }
  .carg-hero__tipo.t-ranking { background: var(--orange-bg); color: #b45c00; }
  .carg-hero__tipo.t-medalleria { background: var(--green-bg); color: var(--green); }

  /* ── Selector de evento (si no hay ?id) ── */
  .carg-picker {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl);
    padding: 36px 32px; display: flex; flex-direction: column; align-items: center; gap: 20px;
    text-align: center; max-width: 560px; margin: 40px auto 0;
    animation: fadeInUp .4s var(--easing-smoothout) both;
  }
  .carg-picker__icon { width: 52px; height: 52px; border-radius: var(--radius-lg); background: var(--accent-bg); display: flex; align-items: center; justify-content: center; color: var(--accent); }
  .carg-picker__icon svg { width: 26px; height: 26px; }
  .carg-picker__title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0; }
  .carg-picker__sub { font-size: 13.5px; color: var(--text-secondary); margin: 0; line-height: 1.5; }
  .carg-picker__form { width: 100%; display: flex; flex-direction: column; gap: 14px; }

  /* ── Cuerpo de cargue ── */
  .carg-body { animation: fadeInUp .38s var(--easing-smoothout) both; }
  .carg-mode-bar { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
  .carg-mode-bar__left { display: flex; align-items: center; gap: 12px; }

  /* ── Sección card genérica (SIN sombra — solo borde 1px) ── */
  .carg-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 24px 28px; margin-bottom: 18px;
  }
  .carg-card__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .carg-card__title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 0; }
  .carg-card__sub { font-size: 12.5px; color: var(--text-secondary); margin: 4px 0 0; line-height: 1.4; }

  /* ── Plantilla CTA strip ── */
  .carg-template-strip {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 14px 18px; border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--bg-soft); margin-bottom: 22px; flex-wrap: wrap;
  }
  .carg-template-strip__info { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .carg-template-strip__ico { color: var(--green); flex-shrink: 0; }
  .carg-template-strip__ico svg { width: 22px; height: 22px; }
  .carg-template-strip__text { font-size: 13px; color: var(--text-primary); font-weight: 500; min-width: 0; }
  .carg-template-strip__hint { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }

  /* ── Hint / nota del uploader ── */
  .carg-upload-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: flex-start; gap: 6px; }
  .carg-upload-hint svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

  /* ── Botón de analizar (centrado) ── */
  .carg-analyze-row { display: flex; justify-content: flex-end; margin-top: 20px; }

  /* ── Panel de resultados ── */
  .carg-results {
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    overflow: hidden; margin-top: 22px; display: none;
  }
  .carg-results.is-visible { display: block; animation: fadeInUp .3s var(--easing-smoothout) both; }
  .carg-results__summary {
    display: flex; align-items: stretch; gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .carg-results__stat {
    flex: 1; padding: 16px 18px; display: flex; flex-direction: column; gap: 3px;
    border-right: 1px solid var(--border);
  }
  .carg-results__stat:last-child { border-right: 0; }
  .carg-results__stat-val { font-size: 24px; font-weight: 800; line-height: 1; font-feature-settings: 'tnum'; }
  .carg-results__stat-lbl { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .3px; }
  .carg-results__stat--total .carg-results__stat-val { color: var(--text-primary); }
  .carg-results__stat--ok    .carg-results__stat-val { color: var(--green); }
  .carg-results__stat--err   .carg-results__stat-val { color: var(--red); }

  .carg-results__body { padding: 16px 18px; }
  .carg-results__section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    color: var(--text-secondary); margin-bottom: 10px;
  }

  /* Lista de filas inválidas */
  .carg-err-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .carg-err-row {
    display: flex; align-items: flex-start; gap: 10px; padding: 9px 13px;
    background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--radius-md);
    font-size: 12.5px;
  }
  .carg-err-row__ico { flex-shrink: 0; margin-top: 1px; }
  .carg-err-row__ico svg { width: 15px; height: 15px; color: var(--red); }
  .carg-err-row__fila { font-weight: 700; color: var(--red); white-space: nowrap; }
  .carg-err-row__msg { color: var(--text-primary); }

  /* Lista de filas válidas (muestra solo las primeras N) */
  .carg-ok-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
    background: var(--green-bg); border: 1px solid var(--green-border); border-radius: var(--radius-full);
    font-size: 12px; font-weight: 700; color: var(--green);
  }
  .carg-ok-badge svg { width: 14px; height: 14px; }

  /* Acción de carga parcial */
  .carg-results__actions {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 18px; border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .carg-results__actions-note { font-size: 12px; color: var(--text-secondary); flex: 1; min-width: 160px; }

  /* ── Modo Manual: búsqueda deportista ── */
  .carg-manual-search { display: flex; flex-direction: column; gap: 14px; }
  .carg-search-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .carg-search-row .naowee-searchbox { flex: 1 1 260px; max-width: 480px; }

  /* Resultados de búsqueda (lista mock) */
  .carg-athlete-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 4px; }
  .carg-athlete-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 16px;
    border-bottom: 1px solid var(--border); background: var(--surface);
    transition: background var(--duration-fast); cursor: pointer;
  }
  .carg-athlete-row:last-child { border-bottom: 0; }
  .carg-athlete-row:hover { background: var(--bg-soft); }
  .carg-athlete-row__ava {
    width: 36px; height: 36px; border-radius: var(--radius-full); background: var(--accent-bg);
    color: var(--accent); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; flex-shrink: 0; letter-spacing: .3px;
  }
  .carg-athlete-row__info { flex: 1; min-width: 0; }
  .carg-athlete-row__name { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
  .carg-athlete-row__doc { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }
  .carg-athlete-row__btn { flex-shrink: 0; }
  .carg-athlete-empty {
    padding: 24px 18px; text-align: center; font-size: 13px; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
  }

  /* ── Modo Manual Ranking / Medallería ── */
  .carg-manual-grid {
    display: flex; flex-direction: column; gap: 0;
    border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden;
  }
  .carg-manual-grid__header {
    display: grid; padding: 10px 16px;
    background: #f4f5f9; font-size: 11px; font-weight: 600;
    letter-spacing: .3px; text-transform: uppercase; color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }
  .carg-manual-grid__header.g-ranking { grid-template-columns: 1fr 120px 120px 110px; }
  .carg-manual-grid__header.g-medalleria { grid-template-columns: 1fr 80px 80px 80px 90px; }
  .carg-manual-grid__header:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
  .carg-manual-row {
    display: grid; padding: 12px 16px;
    border-bottom: 1px solid var(--border); background: var(--surface);
    align-items: center;
  }
  .carg-manual-row:last-child { border-bottom: 0; }
  .carg-manual-row.g-ranking { grid-template-columns: 1fr 120px 120px 110px; }
  .carg-manual-row.g-medalleria { grid-template-columns: 1fr 80px 80px 80px 90px; }
  .carg-manual-row__name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .carg-manual-row__doc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .carg-manual-input {
    height: 36px; width: 100%; padding: 0 8px; border: 1px solid var(--field-border-idle);
    border-radius: var(--radius-md); font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--text-primary); background: var(--surface); text-align: center;
    transition: border-color var(--duration-fast);
  }
  .carg-manual-input:focus { outline: none; border-width: 2px; border-color: var(--accent); }
  .carg-manual-input::-webkit-outer-spin-button,
  .carg-manual-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* ── Historial de cargues ── */
  .carg-history { margin-top: 24px; }
  .carg-history__title { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin: 0 0 10px; text-transform: uppercase; letter-spacing: .3px; }
  .carg-history__empty { font-size: 12.5px; color: var(--text-muted); padding: 14px 0; }
  .carg-history__list { display: flex; flex-direction: column; gap: 6px; }
  .carg-history__item {
    display: flex; align-items: center; gap: 12px; padding: 9px 14px;
    background: var(--bg-soft); border-radius: var(--radius-md); font-size: 12.5px;
  }
  .carg-history__item-tipo { font-weight: 700; color: var(--text-primary); }
  .carg-history__item-n { color: var(--green); font-weight: 700; }
  .carg-history__item-time { color: var(--text-muted); margin-left: auto; }

  /* ── Animaciones ── */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .carg-card { padding: 18px 18px; }
    .carg-results__summary { flex-direction: column; }
    .carg-results__stat { border-right: 0; border-bottom: 1px solid var(--border); }
    .carg-results__stat:last-child { border-bottom: 0; }
  }
  @media (max-width: 640px) {
    .carg-manual-grid__header.g-ranking,
    .carg-manual-row.g-ranking { grid-template-columns: 1fr 90px 90px; }
    .carg-manual-grid__header.g-ranking *:nth-child(4),
    .carg-manual-row.g-ranking *:nth-child(4) { display: none; }
    .carg-manual-grid__header.g-medalleria,
    .carg-manual-row.g-medalleria { grid-template-columns: 1fr 64px 64px 64px; }
    .carg-manual-grid__header.g-medalleria *:nth-child(5),
    .carg-manual-row.g-medalleria *:nth-child(5) { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .carg-hero, .carg-body, .carg-results { animation: none !important; }
    .prog-fill { transition: none !important; }
  }

  /* ── :focus-visible canónico (botones de acción locales) ── */
  #dlPlantilla:focus-visible,
  #browseBtn:focus-visible,
  #fileDismiss:focus-visible,
  #analyzeBtn:focus-visible,
  #submitBtn:focus-visible,
  #manualSaveBtn:focus-visible,
  .inscribir-btn:focus-visible,
  .naowee-dropdown__trigger:focus-visible,
  #evPickerCta:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(215,64,9,.18);
  }

  /* ── OVERSIGHT (Admin solo lectura) ── */
  .oversight-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .oversight-head__title h2 { font-size: 22px; font-weight: 800; letter-spacing: -.4px; color: var(--text-primary); margin: 0 0 4px; }
  .oversight-head__title p { font-size: 13px; color: var(--text-secondary); margin: 0; }
  .oversight-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: var(--radius-full); background: var(--blue-bg); color: var(--blue-info); font-size: 11.5px; font-weight: 700; flex-shrink: 0; border: 1px solid #c0d8f8; }
  .oversight-badge svg { width: 14px; height: 14px; }

  /* Tabla oversight reusa .naowee-table-card + .naowee-table--in-card */
  .ov-gestor-chip { display: inline-flex; align-items: center; gap: 7px; }
  .ov-gestor-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .ov-gestor-name { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
  .ov-prog-wrap { display: flex; align-items: center; gap: 8px; }
  .ov-prog-track { flex: 1; height: 5px; background: var(--border); border-radius: 9999px; overflow: hidden; min-width: 60px; }
  .ov-prog-fill { height: 100%; border-radius: 9999px; background: var(--accent); transition: width .5s var(--easing-smoothout, ease); }
  .ov-prog-pct { font-size: 11.5px; font-weight: 700; color: var(--text-secondary); min-width: 32px; text-align: right; }
  .ov-last-cargue { font-size: 11.5px; color: var(--text-secondary); }
  .ov-history-toggle { background: none; border: none; font-family: inherit; font-size: 12px; color: var(--accent); font-weight: 600; cursor: pointer; padding: 3px 0; }
  .ov-history-toggle:hover { text-decoration: underline; }
  .ov-history-toggle:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(215,64,9,.18); border-radius: var(--radius-sm); }
  .ov-history-row { display: none; }
  .ov-history-row.is-open { display: table-row; }
  .ov-history-cell { padding: 0 16px 12px !important; background: var(--bg-soft); border-bottom: 1px solid var(--border); }
  .ov-history-list { display: flex; flex-direction: column; gap: 4px; padding: 8px 0 0; }
  .ov-history-item { font-size: 12px; color: var(--text-secondary); display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .ov-history-item strong { color: var(--text-primary); font-weight: 600; }
  .ov-empty-row td { padding: 28px 18px; text-align: center; font-size: 13px; color: var(--text-secondary); }
  @media (max-width: 720px) {
    .ov-col-gestor, .ov-col-prog, .ov-col-last { display: none; }
  }
  /* ── Oversight: stacked cards ≤640px (solo .naowee-table-card dentro de oversight) ── */
  @media (max-width: 640px) {
    .naowee-table-card .naowee-table--in-card thead { display: none; }
    .naowee-table-card .naowee-table--in-card,
    .naowee-table-card .naowee-table--in-card tbody,
    .naowee-table-card .naowee-table--in-card tr { display: block; }
    .naowee-table-card .naowee-table--in-card tbody tr {
      border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; flex-direction: column; gap: 6px;
    }
    .naowee-table-card .naowee-table--in-card tbody tr:last-child { border-bottom: none; }
    .naowee-table-card .naowee-table--in-card td {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 2px 0 !important; border: none; font-size: 13px;
    }
    .naowee-table-card .naowee-table--in-card td[data-label]::before {
      content: attr(data-label);
      font-size: 11px; font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .3px;
      min-width: 90px; flex-shrink: 0; padding-top: 1px;
    }
    /* Las celdas colapsadas en desktop siguen apareciendo en stacked */
    .naowee-table-card .naowee-table--in-card td.ov-col-gestor,
    .naowee-table-card .naowee-table--in-card td.ov-col-prog,
    .naowee-table-card .naowee-table--in-card td.ov-col-last { display: flex; }
    /* history rows — span across full width */
    .naowee-table-card .naowee-table--in-card tr.ov-history-row { padding: 0; }
    .naowee-table-card .naowee-table--in-card td.ov-history-cell { padding: 0 16px 12px !important; }
  }
</style>

</head>
<body>
<div class="shell" id="shellRoot">
  <div id="sidebarRoot"></div>
  <div class="main">
    <div class="top-header" id="topHeader"></div>
    <div class="page" id="pageCargue">
      <div class="page-inner" id="cargueApp"></div>
    </div>
  </div>
</div>

<script type="module">
  import { mountSidebar, mountHeader, mountBackdrop, mountDemoSwitcher, getRoleFromQuery, ROLES } from './shared/sidebar.js';
  import { allEvents, STATUS_LABEL, applyUpload, addUploadRecord, getUploadHistory, GESTOR_MAP } from './shared/events-data.js';
  import { GESTORES } from './shared/catalogo.js';

  /* ─── Params ─── */
  const params = new URLSearchParams(window.location.search);
  const roleCode = getRoleFromQuery();
  const role = ROLES[roleCode] || ROLES.USER;
  const tipo = (['inscripciones', 'ranking', 'medalleria'].includes(params.get('tipo')))
    ? params.get('tipo') : 'inscripciones';
  const eventId = params.get('id') || null;

  /* ─── Icons ─── */
  const I = {
    chevL: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
    download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    upload: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>',

    let toast = document.getElementById('evToast');
    if (!toast) {
      toast = document.createElement('div'); toast.id = 'evToast';
      toast.setAttribute('role', 'status'); document.body.appendChild(toast);
    }
    toast.textContent = msg;
    if (type === 'success') toast.style.background = '#1a6e22';
    else if (type === 'error') toast.style.background = '#b91c1c';
    else toast.style.background = '';
    toast.classList.add('is-visible');
    clearTimeout(_toastT);
    _toastT = setTimeout(() => { toast.classList.remove('is-visible'); toast.style.background = ''; }, 3200);
  }

  /* ─── Segment helpers ─── */
  function bindSegment(segEl) {
    const pill = segEl.querySelector('.naowee-segment__pill');
    const items = Array.from(segEl.querySelectorAll('.naowee-segment__item'));
    function setActive(idx) {
      items.forEach((it, i) => {
        it.classList.toggle('naowee-segment__item--active', i === idx);
        it.setAttribute('aria-selected', String(i === idx));
      });
      const rect = items[idx].getBoundingClientRect();
      const segRect = segEl.getBoundingClientRect();
      pill.style.setProperty('--seg-x', `${rect.left - segRect.left - 4}px`);
      pill.style.width = `${rect.width}px`;
      pill.classList.remove('naowee-segment__pill--no-anim');
    }
    const init = items.findIndex((it) => it.dataset.mode === activeMode);
    pill.classList.add('naowee-segment__pill--no-anim');
    setActive(init >= 0 ? init : 0);
    items.forEach((it, i) => {
      it.addEventListener('click', () => {
        activeMode = it.dataset.mode;
        setActive(i);
        renderModeBody();
      });
    });
  }

  function bindMasivo() {
    const uploader = document.getElementById('fileUploader');
    const fileInput = document.getElementById('fileInput');
    const fileInputDrop = document.getElementById('fileInputDrop');
    const browseBtn = document.getElementById('browseBtn');
    const dismiss = document.getElementById('fileDismiss');
    const placeholder = document.getElementById('filePlaceholder');
    const dropZone = document.getElementById('dropZone');
    const analyzeBtn = document.getElementById('analyzeBtn');

    function setFile(f) {
      if (!f) {
        selectedFile = null;
        uploader.classList.remove('has-file');
        placeholder.textContent = 'Ningún archivo seleccionado';
        placeholder.classList.remove('has-file');
        analyzeBtn.disabled = true;
        document.getElementById('resultsPanel').classList.remove('is-visible');
        document.getElementById('resultsPanel').innerHTML = '';
        parseResults = null;
        return;
      }
      /* Validar extensión */
      if (!f.name.toLowerCase().endsWith('.xlsx') && !f.name.toLowerCase().endsWith('.xls')) {
        flash('Solo se aceptan archivos .xlsx o .xls.', 'error');
        return;
      }
      /* Validar peso 50 MB */
      if (f.size > 50 * 1024 * 1024) {
        flash('El archivo supera el límite de 50 MB.', 'error');
        return;
      }
      selectedFile = f;
      uploader.classList.add('has-file');
      placeholder.textContent = `${f.name} · ${(f.size / 1024).toFixed(0)} KB`;
      placeholder.classList.add('has-file');
      analyzeBtn.disabled = false;
      /* Reset resultados anteriores */
      document.getElementById('resultsPanel').classList.remove('is-visible');
      document.getElementById('resultsPanel').innerHTML = '';
      parseResults = null;
    }

    browseBtn.addEventListener('click', () => fileInput.click());
    dismiss.addEventListener('click', () => setFile(null));
    fileInput.addEventListener('change', () => setFile(fileInput.files[0] || null));
    fileInputDrop.addEventListener('change', () => setFile(fileInputDrop.files[0] || null));

    /* Drag & drop */
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('is-drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('is-drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('is-drag-over');
      const f = e.dataTransfer.files[0];
      if (f) setFile(f);
    });

    /* Analizar → parseo simulado */
    analyzeBtn.addEventListener('click', () => {
      if (!selectedFile) return;
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = 'Analizando…';
      /* Simular parseo con delay realista */
      setTimeout(() => {
        const mock = MOCK_ROWS[tipo];
        const totalRows = mock.valid.length + mock.errors.length;
        parseResults = { total: totalRows, valid: mock.valid, errors: mock.errors };
        renderResults(parseResults);
        analyzeBtn.textContent = 'Analizar archivo';
        analyzeBtn.disabled = false;
      }, 900);
    });
  }

    panel.innerHTML = `

        <div class="carg-results__stat carg-results__stat--total">
          <span class="carg-results__stat-val">${r.total}</span>
          <span class="carg-results__stat-lbl">Total filas</span>
        </div>
        <div class="carg-results__stat carg-results__stat--ok">
          <span class="carg-results__stat-val">${nOk}</span>
          <span class="carg-results__stat-lbl">Válidas</span>
        </div>
        <div class="carg-results__stat carg-results__stat--err">
          <span class="carg-results__stat-val">${nErr}</span>
          <span class="carg-results__stat-lbl">Con error</span>
        </div>
      </div>
      <div class="carg-results__body">
        ${nErr > 0 ? `
          <div class="carg-results__section-label">Filas con error (${nErr}) — corrige y re-sube</div>
          <div class="carg-err-list">${errRows}</div>
        ` : ''}
        ${nOk > 0 ? `
          <div class="carg-results__section-label">Filas válidas</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="carg-ok-badge">${I.check} ${nOk} filas listas para cargar</span>
          </div>
        ` : `<p style="color:var(--text-muted);font-size:13px;margin:8px 0 0">Sin filas válidas en este archivo.</p>`}
      </div>
      ${nOk > 0 ? `
        <div class="carg-results__actions">
          <span class="carg-results__actions-note">
            ${nErr > 0
              ? `Las ${nErr} fila${nErr > 1 ? 's' : ''} con error no se cargarán. Puedes cargar las ${nOk} válidas ahora y re-subir las erróneas después de corregirlas.`
              : `Todas las filas son válidas. Listo para cargar.`
            }
          </span>
          <button class="naowee-btn naowee-btn--loud" id="submitBtn">
            ${I.check} Cargar ${nOk} fila${nOk !== 1 ? 's' : ''} válida${nOk !== 1 ? 's' : ''}
          </button>
        </div>
      ` : ''}
    `;

    panel.classList.add('is-visible');

    /* Bind submit */
    document.getElementById('submitBtn')?.addEventListener('click', () => commitUpload(nOk));
  }

  /* ─── Confirmar cargue ─── */
  function commitUpload(n) {
    if (!selectedEventId || !n) return;
    applyUpload(selectedEventId, cfg.storeTipo, n);
    addUploadRecord(selectedEventId, {
      tipo: cfg.label, n, modeLabel: 'Masivo',
      timestamp: new Date().toLocaleString('es-CO', { dateStyle: 'short', timeStyle: 'short' })
    });
    flash(`✓ ${n} ${cfg.labelShort.toLowerCase()}${n !== 1 ? 'es' : ''} cargada${n !== 1 ? 's' : ''} correctamente.`, 'success');
    /* Actualiza historial */
    renderHistory();
    /* Reset uploader */
    setTimeout(() => {
      document.getElementById('fileUploader')?.classList.remove('has-file');
      const ph = document.getElementById('filePlaceholder');
      if (ph) { ph.textContent = 'Ningún archivo seleccionado'; ph.classList.remove('has-file'); }
      document.getElementById('resultsPanel')?.classList.remove('is-visible');
      selectedFile = null;
      parseResults = null;
      const ab = document.getElementById('analyzeBtn');
      if (ab) ab.disabled = true;
    }, 400);
  }

  /* ─── MODO MANUAL ─── */
  function renderManual(container) {
    if (tipo === 'inscripciones') renderManualSearch(container);
    else renderManualGrid(container);
  }

  function renderManualSearch(container) {
    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head">
          <div>
            <h3 class="carg-card__title">Inscripción individual</h3>
            <p class="carg-card__sub">Busca el deportista por nombre o número de documento. Si no existe en el sistema, puedes registrarlo como nuevo.</p>
          </div>
        </div>
        <div class="carg-manual-search">
          <div class="carg-search-row">
            <div class="naowee-searchbox naowee-searchbox--has-value" id="athleteSearch" style="max-width:480px;flex:1">
              <div class="naowee-searchbox__input-wrap">
                <span class="naowee-searchbox__icon">${I.search}</span>
                <input class="naowee-searchbox__input" type="search" id="athleteInput" placeholder="Nombre o número de documento…" autocomplete="off">
                <button class="naowee-searchbox__clear" id="athleteClear" type="button" aria-label="Limpiar búsqueda">${I.x}</button>
              </div>
            </div>
            <button class="naowee-btn naowee-btn--ghost naowee-btn--sm" id="searchBtn" type="button">
              ${I.search} Buscar
            </button>
          </div>
          <div id="athleteResults"></div>
          <div style="padding-top:8px;border-top:1px solid var(--border);margin-top:8px">
            <button class="naowee-btn naowee-btn--link naowee-btn--sm" type="button" id="newAthleteBtn">
              ${I.user} Registrar nuevo deportista
            </button>
          </div>
        </div>
      </div>
    `;
    bindManualSearch();
  }

  function bindManualSearch() {
    const input = document.getElementById('athleteInput');
    const clear = document.getElementById('athleteClear');
    const searchBox = document.getElementById('athleteSearch');
    const results = document.getElementById('athleteResults');
    const searchBtn = document.getElementById('searchBtn');
    const newBtn = document.getElementById('newAthleteBtn');

    function performSearch() {
      const q = input.value.trim().toLowerCase();
      searchBox.classList.toggle('naowee-searchbox--has-value', q.length > 0);
      if (!q) { results.innerHTML = ''; return; }
      const matches = MOCK_ROWS.inscripciones.valid.filter((a) =>
        a.nombre.toLowerCase().includes(q) || a.doc.toLowerCase().includes(q)
      );
      if (matches.length === 0) {
        results.innerHTML = `<div class="carg-athlete-empty">${I.inbox} No se encontraron deportistas con "<strong>${esc(q)}</strong>" en el sistema.</div>`;
        return;
      }
      results.innerHTML = `
        <div class="carg-athlete-list">
          ${matches.map((a) => `
            <div class="carg-athlete-row" data-nombre="${esc(a.nombre)}" data-doc="${esc(a.doc)}">
              <div class="carg-athlete-row__ava">${a.nombre.split(' ').slice(0,2).map((w)=>w[0]).join('')}</div>
              <div class="carg-athlete-row__info">
                <div class="carg-athlete-row__name">${esc(a.nombre)}</div>
                <div class="carg-athlete-row__doc">${esc(a.doc)}</div>
              </div>
              <div class="carg-athlete-row__btn">
                <button class="naowee-btn naowee-btn--loud naowee-btn--sm inscribir-btn" type="button">Inscribir</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      results.querySelectorAll('.inscribir-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          const row = e.target.closest('[data-nombre]');
          const nombre = row.dataset.nombre;
          applyUpload(selectedEventId, 'insc', 1);
          addUploadRecord(selectedEventId, {
            tipo: 'Inscripción individual', n: 1, modeLabel: 'Manual',
            timestamp: new Date().toLocaleString('es-CO', { dateStyle: 'short', timeStyle: 'short' })
          });
          flash(`✓ ${nombre} inscrito/a correctamente.`, 'success');
          btn.disabled = true;
          btn.textContent = 'Inscrito ✓';
          btn.style.background = 'var(--green)';
          renderHistory();
        });
      });
    }

    searchBtn.addEventListener('click', performSearch);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });
    clear.addEventListener('click', () => {
      input.value = ''; results.innerHTML = '';
      searchBox.classList.remove('naowee-searchbox--has-value');
      input.focus();
    });
    newBtn.addEventListener('click', () => flash('Registrar nuevo deportista — flujo disponible en la próxima fase de la demo.'));
  }

  function renderManualGrid(container) {
    const isRanking = tipo === 'ranking';
    const rows = MOCK_INSCRITOS;

    const headerCols = isRanking
      ? `<span>Deportista</span><span>Posición</span><span>Marca/Tiempo</span><span>Fase</span>`
      : `<span>Departamento</span><span>🥇 Oro</span><span>🥈 Plata</span><span>🥉 Bronce</span><span>Total</span>`;
    const headerClass = isRanking ? 'g-ranking' : 'g-medalleria';

    const rowsHTML = isRanking
      ? rows.map((r) => `
          <div class="carg-manual-row g-ranking" data-id="${r.id}">
            <div>
              <div class="carg-manual-row__name">${esc(r.nombre)}</div>
              <div class="carg-manual-row__doc">${esc(r.doc)} · ${esc(r.deporte)} · ${esc(r.prueba)}</div>
            </div>
            <input class="carg-manual-input" type="number" min="1" placeholder="—" data-field="posicion" data-id="${r.id}" value="${r.posicion ?? ''}">
            <input class="carg-manual-input" type="text" placeholder="ej: 10.45s" data-field="marca" data-id="${r.id}" value="${r.marca ?? ''}">
            <input class="carg-manual-input" type="text" placeholder="Final" data-field="fase" data-id="${r.id}">
          </div>`)
      : [
          { depto: 'Bogotá D.C.', deporte: 'Atletismo' },
          { depto: 'Antioquia', deporte: 'Natación' },
          { depto: 'Valle del Cauca', deporte: 'Taekwondo' }
        ].map((dep) => `
          <div class="carg-manual-row g-medalleria">
            <div>
              <div class="carg-manual-row__name">${dep.depto}</div>
              <div class="carg-manual-row__doc">${dep.deporte}</div>
            </div>
            <input class="carg-manual-input" type="number" min="0" placeholder="0" data-field="oro">
            <input class="carg-manual-input" type="number" min="0" placeholder="0" data-field="plata">
            <input class="carg-manual-input" type="number" min="0" placeholder="0" data-field="bronce">
            <input class="carg-manual-input" type="number" min="0" placeholder="0" data-field="total" readonly style="background:var(--bg-soft);color:var(--text-secondary)">
          </div>`);

    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head">
          <div>
            <h3 class="carg-card__title">Captura manual — ${cfg.label}</h3>
            <p class="carg-card__sub">${isRanking ? 'Registra posición, marca/tiempo y fase para cada deportista inscrito.' : 'Ingresa el medallero por departamento y disciplina.'}</p>
          </div>
        </div>
        <div class="carg-manual-grid">
          <div class="carg-manual-grid__header ${headerClass}">${headerCols}</div>
          ${rowsHTML.join('')}
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:18px">
          <button class="naowee-btn naowee-btn--loud" id="manualSaveBtn">
            ${I.check} Guardar ${cfg.labelShort.toLowerCase()}
          </button>
        </div>
      </div>
    `;

    /* Auto-calcular total en medallería */
    if (!isRanking) {
      container.querySelectorAll('.carg-manual-row.g-medalleria').forEach((row) => {
        const inputs = row.querySelectorAll('[data-field="oro"],[data-field="plata"],[data-field="bronce"]');
        const totalInput = row.querySelector('[data-field="total"]');
        inputs.forEach((inp) => inp.addEventListener('input', () => {
          const sum = Array.from(inputs).reduce((s, i) => s + (parseInt(i.value) || 0), 0);
          totalInput.value = sum;
        }));
      });
    }

    document.getElementById('manualSaveBtn').addEventListener('click', () => {
      const n = isRanking ? rows.length : 3;
      applyUpload(selectedEventId, cfg.storeTipo, n);
      addUploadRecord(selectedEventId, {
        tipo: cfg.label, n, modeLabel: 'Manual',
        timestamp: new Date().toLocaleString('es-CO', { dateStyle: 'short', timeStyle: 'short' })
      });
      flash(`✓ ${n} ${cfg.labelShort.toLowerCase()}${n !== 1 ? 'es' : ''} guardada${n !== 1 ? 's' : ''} correctamente.`, 'success');
      renderHistory();
    });
  }

  /* ─── Historial de cargues ─── */
  function renderHistory() {
    const app = document.getElementById('cargueApp');
    if (!app || !selectedEventId) return;
    let histEl = document.getElementById('cargHistory');
    if (!histEl) {
      histEl = document.createElement('div');
      histEl.id = 'cargHistory';
      histEl.className = 'carg-history';
      app.appendChild(histEl);
    }
    const records = getUploadHistory(selectedEventId);
    histEl.innerHTML = `
      <div class="carg-card">
        <h3 class="carg-card__title" style="margin-bottom:12px">${I.history} Historial de cargues</h3>
        ${records.length === 0
          ? `<p class="carg-history__empty">Aún no se han realizado cargues en este evento durante esta sesión.</p>`
          : `<div class="carg-history__list">
              ${records.map((r) => `
                <div class="carg-history__item">
                  <span class="carg-history__item-tipo">${esc(r.tipo)}</span>
                  <span>·</span>
                  <span class="carg-history__item-n">+${r.n} registros</span>
                  <span>·</span>
                  <span style="color:var(--text-secondary)">${esc(r.modeLabel)}</span>
                  <span class="carg-history__item-time">${esc(r.timestamp)}</span>
                </div>`).join('')}
            </div>`
        }
      </div>
    `;
  }

  /* ─── Utilidad ─── */
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─── OVERSIGHT: modo Admin (solo lectura) ─── */
  function renderOversight() {
    const app = document.getElementById('cargueApp');
    const tipoLabel = { inscripciones: 'Inscripciones', ranking: 'Ranking / Resultados', medalleria: 'Medallería' }[tipo] || cfg.label;
    const storeKey = { inscripciones: 'insc', ranking: 'res', medalleria: 'med' }[tipo] || 'insc';

    const events = allEvents();

    function resolveGestor(ev) {
      const gid = ev.assignedGestorId || GESTOR_MAP[ev.id];
      return GESTORES.find((g) => g.id === gid) || null;
    }

    function lastCargue(ev) {
      const hist = getUploadHistory(ev.id);
      if (!hist.length) return '—';
      return hist[0].timestamp || '—';
    }

    function progPct(ev) {
      const o = ev[storeKey === 'insc' ? 'insc' : storeKey === 'res' ? 'res' : 'med'];
      if (!o || !o.total) return 0;
      return Math.round((o.done / o.total) * 100);
    }

    function progLabel(ev) {
      const o = ev[storeKey === 'insc' ? 'insc' : storeKey === 'res' ? 'res' : 'med'];
      if (!o) return '—';
      if (!o.total) return '—';
      return `${o.done} / ${o.total}`;
    }

    const rows = events.map((ev, i) => {
      const gestor = resolveGestor(ev);
      const p = progPct(ev);
      const hist = getUploadHistory(ev.id);
      const histId = `ov-hist-${i}`;
      return `
        <tr>
          <td data-label="Evento">
            <div class="ev-row__name">
              <span class="ev-row__emoji" aria-hidden="true">${esc(ev.emoji)}</span>
              <div style="min-width:0">
                <div class="ev-row__nm">${esc(ev.name)}</div>
                <div class="ev-row__sport" style="font-size:11.5px">${esc(ev.id)}</div>
              </div>
            </div>
          </td>
          <td data-label="Estado"><span class="badge s-${ev.status}">${STATUS_LABEL[ev.status] || ev.status}</span></td>
          <td class="ov-col-gestor" data-label="Gestor">
            ${gestor
              ? `<div class="ov-gestor-chip"><span class="ov-gestor-av" style="background:${esc(gestor.color)}">${esc(gestor.avatar)}</span><span class="ov-gestor-name">${esc(gestor.name)}</span></div>`
              : '<span style="color:var(--text-secondary);font-size:12px">Sin asignar</span>'
            }
          </td>
          <td class="ov-col-prog" data-label="Progreso">
            <div class="ov-prog-wrap">
              <div class="ov-prog-track"><div class="ov-prog-fill" style="width:${p}%"></div></div>
              <span class="ov-prog-pct">${progLabel(ev)}</span>
            </div>
          </td>
          <td class="ov-col-last" data-label="Último cargue"><span class="ov-last-cargue">${esc(lastCargue(ev))}</span></td>
          <td data-label="Historial" style="text-align:right">
            ${hist.length
              ? `<button type="button" class="ov-history-toggle" data-hist="${histId}" aria-expanded="false">Ver historial</button>`
              : '<span style="font-size:11.5px;color:var(--text-muted)">Sin cargues</span>'
            }
          </td>
        </tr>
        ${hist.length ? `
        <tr class="ov-history-row" id="${histId}">
          <td class="ov-history-cell" colspan="6">
            <div class="ov-history-list">
              ${hist.slice(0, 8).map((r) => `
                <div class="ov-history-item">
                  <strong>${esc(r.tipo)}</strong>
                  <span>+${r.n} registros</span>
                  <span>·</span>
                  <span>${esc(r.modeLabel)}</span>
                  <span>·</span>
                  <span>${esc(r.timestamp)}</span>
                </div>`).join('')}
            </div>
          </td>
        </tr>` : ''}`;
    }).join('');

    app.innerHTML = `
      <div class="oversight-head">
        <div class="oversight-head__title">
          <h2>${esc(tipoLabel)} · seguimiento</h2>
          <p>Monitoreo de cargues por evento — lectura en vivo del progreso de cada gestor.</p>
        </div>
        <span class="oversight-badge">${I.info} Solo lectura</span>
      </div>

      <div class="naowee-table-card">
        <div class="naowee-table-card__table-wrap">
          <table class="naowee-table--in-card">
            <colgroup>
              <col style="min-width:200px">
              <col style="width:110px">
              <col class="ov-col-gestor" style="width:180px">
              <col class="ov-col-prog" style="width:180px">
              <col class="ov-col-last" style="width:140px">
              <col style="width:110px">
            </colgroup>
            <thead><tr>
              <th>Evento</th>
              <th>Estado</th>
              <th class="ov-col-gestor">Gestor asignado</th>
              <th class="ov-col-prog">Cargado · progreso</th>
              <th class="ov-col-last">Último cargue</th>
              <th style="text-align:right">Historial</th>
            </tr></thead>
            <tbody>
              ${events.length === 0
                ? `<tr class="ov-empty-row"><td colspan="6">No hay eventos registrados.</td></tr>`
                : rows
              }
            </tbody>
          </table>
        </div>
      </div>
    `;

    /* Bind toggles de historial */
    app.querySelectorAll('.ov-history-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.hist);
        if (!target) return;
        const open = target.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', String(open));
        btn.textContent = open ? 'Ocultar' : 'Ver historial';
      });
    });
  }

  /* ─── Bootstrap ─── */
  mountSidebar({ rootEl: document.getElementById('sidebarRoot'), roleCode, activeId: tipo });
  mountHeader({ headerEl: document.getElementById('topHeader'), role });
  mountBackdrop();
  mountDemoSwitcher({ roleCode });

  /* Admin → oversight; Gestor / demás → cargue normal */
  if (roleCode === 'ADMIN') {
    renderOversight();
  } else {
    render();
  }

  document.title = `Naowee Eventos — ${cfg.label}${roleCode === 'ADMIN' ? ' · seguimiento' : ''}`;
</script>

</body>
</html>
