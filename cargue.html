<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naowee Eventos — Cargues del evento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared/tokens.css?v=0.9.1">
<link rel="stylesheet" href="shared/shell.css?v=0.4.5">
<link rel="stylesheet" href="shared/list-components.css?v=0.9.1">
<link rel="stylesheet" href="shared/event-detail.css?v=0.9.1">
<link rel="stylesheet" href="shared/forms.css?v=0.9.1">
<link rel="stylesheet" href="shared/naowee-footer.css?v=0.9.1">
<script src="shared/naowee-footer.js?v=0.9.2" defer></script>
<!-- SheetJS: lectura/escritura real de .xlsx para el cargue masivo (validación real por fila). -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  /* ═══════════════════════════════════════════════════════════════
     CARGUES DEL EVENTO — Gestor (workspace por evento)
     Una sola entrada: el Gestor abre un evento desde su lista y aquí ve
       (1) el DETALLE del evento (patrón canónico .det-card — shared) y
       (2) un container con 3 TABS canónicos: Inscripciones · Ranking/
           Resultados · Medallería. En cada tab: sub-segmento Masivo|Manual,
           descargar plantilla, analizar archivo y la tabla VERSIONADA de los
           archivos cargados (data con las columnas de la planilla).
     Parámetros: ?id=EV-XXXX&role=GESTOR  (compat: ?tipo= abre ese tab).
     ADMIN entra por ?tipo=…&role=ADMIN → vista oversight (solo lectura).
     ═══════════════════════════════════════════════════════════════ */

  /* ── Selector de evento (fallback sin ?id) ── */
  .carg-picker {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl);
    padding: 36px 32px; display: flex; flex-direction: column; align-items: center; gap: 20px;
    text-align: center; max-width: 560px; margin: 40px auto 0;
    animation: fadeInUp .4s var(--easing-smoothout) both;
  }
  .carg-picker__icon { width: 52px; height: 52px; border-radius: var(--radius-lg); background: var(--accent-bg); display: flex; align-items: center; justify-content: center; color: var(--accent); }
  .carg-picker__icon svg { width: 26px; height: 26px; }
  .carg-picker__title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0; }
  .carg-picker__sub { font-size: 13.5px; color: var(--text-secondary); margin: 0; line-height: 1.5; }
  .carg-picker__form { width: 100%; display: flex; flex-direction: column; gap: 14px; }

  /* ── Container "Cargues del evento" (tabs + panel) ── */
  .carg-tabs-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl);
    padding: 18px 20px 22px; animation: fadeInUp .4s var(--easing-smoothout) both; animation-delay: .08s;
  }
  .carg-tabs-card__head { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .carg-tabs-card__head svg { width: 18px; height: 18px; color: var(--text-secondary); flex-shrink: 0; }
  .carg-tabs-card__head h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 0; }

  /* Tab bar (3 tabs) — .naowee-tabs canónico (proporcional, underline ::after).
     Bleed horizontal (-20px = padding del card) → el divider va de borde a borde.
     padding lateral 12px → el fondo del hover del tab (accent-bg, llena los 48px) NO
     queda pegado al borde del card; el divider sigue de borde a borde (vive en el
     border-box, que el bleed -20px lleva hasta los bordes del container). */
  .carg-tabs { margin: 0 -20px 20px; padding: 0 12px; }
  .carg-tabs .naowee-tab { padding: 0 8px; }

  /* ── Sub-segmento Masivo/Manual — CENTRADO bajo los tabs ── */
  .carg-mode-bar { display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
  /* Pila de cards del modo activo (form + cola "Deportistas por inscribir") con gap */
  #modeBody { display: flex; flex-direction: column; gap: 18px; }
  /* El modo activo (formularios/grids con dropdowns) se apila POR ENCIMA de la card
     "Cargas realizadas": si no, la card siguiente (posterior en el DOM) tapaba el menú
     absolute de los dropdowns que se abren cerca del borde inferior del formulario. */
  #modeBody { position: relative; z-index: 3; }
  #filesMount { position: relative; z-index: 1; }

  /* Los avisos de estado (borrador/finalizado) usan el componente canónico del
     DS .naowee-message (--caution / --informative) de forms.css. */

  /* ── Card de cargue (sin sombra, borde 1px) ── */
  .carg-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px 22px; }
  .carg-card__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .carg-card__title { font-size: 14.5px; font-weight: 700; color: var(--text-primary); margin: 0; }
  .carg-card__sub { font-size: 12.5px; color: var(--text-secondary); margin: 4px 0 0; line-height: 1.4; }

  /* ── Plantilla oficial: file-card elevado ── */
  .carg-template-card {
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
    padding: 16px 18px; background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card); margin-bottom: 22px; flex-wrap: wrap;
    transition: transform var(--duration-normal) var(--easing-smoothout),
                box-shadow var(--duration-normal) var(--easing-smoothout);
  }
  .carg-template-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .carg-template-card__doc { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1 1 320px; }
  /* Tile de documento (neutral) */
  .carg-template-card__tile {
    flex: none; display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; border-radius: var(--radius-md);
    background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-secondary);
  }
  .carg-template-card__tile svg { width: 24px; height: 24px; }
  .carg-template-card__meta { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .carg-template-card__eyebrow {
    font-size: 10.5px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
    color: var(--text-muted);
  }
  .carg-template-card__name {
    margin: 0; font-size: 15px; font-weight: 700; color: var(--text-primary);
    line-height: 1.2; overflow-wrap: anywhere;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .carg-template-card__tags { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .carg-template-card__hint { font-size: 11.5px; color: var(--text-secondary); line-height: 1.35; min-width: 0; }
  .carg-template-card__cta { flex: none; }

  @media (max-width: 640px) {
    .carg-template-card { flex-direction: column; align-items: stretch; gap: 14px; }
    .carg-template-card__doc { flex: 1 1 auto; align-items: flex-start; }
    .carg-template-card__cta { width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    .carg-template-card { transition: none; }
    .carg-template-card:hover { transform: none; }
  }

  /* ── Hint / nota del uploader ── */
  .carg-upload-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: flex-start; gap: 6px; }
  .carg-upload-hint svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

  /* ── Botón de analizar ── */
  .carg-analyze-row { display: flex; justify-content: flex-end; margin-top: 20px; }

  /* ── Panel de resultados ── */
  .carg-results { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 22px; display: none; }
  .carg-results.is-visible { display: block; animation: fadeInUp .3s var(--easing-smoothout) both; }
  .carg-results__summary { display: flex; align-items: stretch; gap: 0; border-bottom: 1px solid var(--border); }
  .carg-results__stat { flex: 1; padding: 16px 18px; display: flex; flex-direction: column; gap: 3px; border-right: 1px solid var(--border); }
  .carg-results__stat:last-child { border-right: 0; }
  .carg-results__stat-val { font-size: 24px; font-weight: 800; line-height: 1; font-feature-settings: 'tnum'; }
  .carg-results__stat-lbl { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .3px; }
  .carg-results__stat--total .carg-results__stat-val { color: var(--text-primary); }
  .carg-results__stat--ok    .carg-results__stat-val { color: var(--green); }
  .carg-results__stat--err   .carg-results__stat-val { color: var(--red); }
  .carg-results__body { padding: 16px 18px; }
  .carg-results__section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--text-secondary); margin-bottom: 10px; }
  /* Filas con error → cada una es un .naowee-message--negative canónico */
  .carg-err-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .carg-err-list .naowee-message__body strong { color: var(--red); font-weight: 700; white-space: nowrap; }
  .carg-results__actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .carg-results__actions-note { font-size: 12px; color: var(--text-secondary); flex: 1; min-width: 160px; }

  /* ── Modo Manual: búsqueda deportista ── */
  .carg-manual-search { display: flex; flex-direction: column; gap: 14px; }
  .carg-search-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .carg-search-row .naowee-searchbox { flex: 1 1 260px; max-width: 480px; }
  .carg-athlete-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 4px; }
  .carg-athlete-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); transition: background var(--duration-fast); }
  .carg-athlete-row:last-child { border-bottom: 0; }
  .carg-athlete-row:hover { background: var(--bg-soft); }
  .carg-athlete-row__ava { width: 36px; height: 36px; border-radius: var(--radius-full); background: var(--accent-bg); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; letter-spacing: .3px; }
  .carg-athlete-row__info { flex: 1; min-width: 0; }
  .carg-athlete-row__name { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
  .carg-athlete-row__doc { font-size: 11.5px; color: var(--text-secondary); margin-top: 1px; }
  .carg-athlete-row__btn { flex-shrink: 0; }
  .carg-athlete-empty { padding: 24px 18px; text-align: center; font-size: 13px; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .carg-athlete-empty svg { width: 26px; height: 26px; color: var(--text-muted); }

  /* ── Modo Manual Ranking / Medallería (grid) ── */
  .carg-manual-grid { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }
  .carg-manual-grid__header { display: grid; column-gap: 12px; padding: 10px 16px; background: var(--th-bg); font-size: 11px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
  .carg-manual-grid__header.g-ranking { grid-template-columns: 1fr 150px 150px; }
  .carg-manual-grid__header.g-medalleria { grid-template-columns: 1fr 80px 80px 80px 90px; }
  .carg-manual-row { display: grid; column-gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); align-items: center; }
  .carg-manual-row:last-child { border-bottom: 0; }
  .carg-manual-row.g-ranking { grid-template-columns: 1fr 150px 150px; }
  .carg-manual-row.g-medalleria { grid-template-columns: 1fr 80px 80px 80px 90px; }
  .carg-manual-row__name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .carg-manual-row__doc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .carg-manual-input { height: 36px; width: 100%; padding: 0 8px; border: 1px solid var(--field-border-idle); border-radius: var(--radius-md); font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-primary); background: var(--surface); text-align: center; transition: border-color var(--duration-fast); }
  .carg-manual-input:focus { outline: none; border-width: 2px; border-color: var(--accent); }
  .carg-manual-input--dup { border-color: var(--red) !important; background: var(--red-bg); color: var(--red); font-weight: 700; }
  .carg-rk-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
  .carg-rk-dupwarn { font-size: 12.5px; font-weight: 600; color: var(--red); }
  .carg-manual-input::-webkit-outer-spin-button,
  .carg-manual-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Pie del ranking manual: paginador (izq) + CTA Guardar (der). */
  .carg-rk-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
  .carg-rk-pager { display: flex; align-items: center; gap: 10px; }
  .carg-pg-btn { width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border-dark); background: var(--surface); border-radius: var(--radius-md); color: var(--text-secondary); cursor: pointer; transition: border-color var(--duration-fast), color var(--duration-fast); }
  .carg-pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .carg-pg-btn:disabled { opacity: .4; cursor: not-allowed; }
  .carg-pg-btn svg { width: 16px; height: 16px; }
  .carg-pg-info { font-size: 12.5px; font-weight: 500; color: var(--text-secondary); }

  /* ── Registro manual de deportistas (búsqueda SUID + form + cola en tabla) ── */
  .carg-search-row { row-gap: 10px; }
  .carg-search-row #newAthleteBtn { margin-left: auto; }

  /* Form "nuevo deportista" (panel inline canónico) */
  .carg-newform { margin-top: 8px; }
  .carg-newform[hidden] { display: none; }
  /* Panel sutil: superficie blanca + borde hairline + sombra tenue (en vez del gris
     lleno pesado). Aire generoso y radio grande = se siente ligero, no un cajón. */
  .carg-newform__inner { border: 1px solid var(--border); border-radius: var(--radius-xl); background: var(--surface); padding: 22px 24px 20px; box-shadow: var(--shadow-sm); animation: fadeIn .25s ease both; }
  /* Encabezado con jerarquía de TÍTULO: tile de icono + título + subtítulo + divisor. */
  .carg-newform__head { display: flex; align-items: flex-start; gap: 12px; padding-bottom: 16px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
  .carg-newform__ico { flex-shrink: 0; width: 34px; height: 34px; border-radius: var(--radius-md); background: var(--accent-bg); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; }
  .carg-newform__ico svg { width: 18px; height: 18px; }
  .carg-newform__title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 0; line-height: 1.3; }
  .carg-newform__sub { font-size: 12.5px; color: var(--text-secondary); margin: 3px 0 0; line-height: 1.45; }
  .carg-newform__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .carg-newform__grid .carg-field--wide { grid-column: span 2; }
  .carg-newform__foot { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 16px; }
  .carg-field { display: flex; flex-direction: column; }


  @media (max-width: 760px) {
    .carg-newform__grid { grid-template-columns: repeat(2, 1fr); }
    .carg-newform__grid .carg-field--wide { grid-column: span 2; }
  }
  @media (max-width: 520px) {
    .carg-newform__grid { grid-template-columns: 1fr; }
    .carg-newform__grid .carg-field--wide { grid-column: span 1; }
    .carg-search-row #newAthleteBtn { margin-left: 0; }
  }

  /* ═══ ARCHIVOS CARGADOS — versionado + tabla con columnas de la planilla ═══ */
  .carg-files { margin-top: 24px; }
  .carg-files__title { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin: 0 0 12px; text-transform: uppercase; letter-spacing: .3px; display: flex; align-items: center; gap: 7px; }
  .carg-files__title svg { width: 15px; height: 15px; flex-shrink: 0; }
  .carg-files__count { color: var(--text-muted); font-weight: 600; }
  .carg-files__list { display: flex; flex-direction: column; gap: 10px; }

  .carg-file { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); }
  .carg-file__head { display: flex; align-items: center; gap: 12px; width: 100%; padding: 13px 16px; background: var(--surface); border: none; font-family: inherit; cursor: pointer; text-align: left; transition: background var(--duration-fast); }
  .carg-file__head:hover { background: var(--bg-soft); }
  .carg-file__ico { width: 34px; height: 34px; border-radius: var(--radius-md); background: var(--green-bg); color: var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .carg-file__ico svg { width: 18px; height: 18px; }
  .carg-file__meta { flex: 1; min-width: 0; }
  .carg-file__name { font-size: 13px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .carg-file__name-txt { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .carg-file__ver { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-full); background: var(--accent-bg); color: var(--accent); font-size: 10.5px; font-weight: 800; letter-spacing: .3px; flex-shrink: 0; }
  .carg-file__sub { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .carg-file__n { color: var(--green); font-weight: 700; }
  .carg-file__chev { flex-shrink: 0; color: var(--text-muted); display: flex; transition: transform var(--duration-normal) var(--easing-smoothout); }
  .carg-file__chev svg { width: 18px; height: 18px; }
  .carg-file.is-open .carg-file__chev { transform: rotate(180deg); }
  .carg-file__body { display: none; border-top: 1px solid var(--border); padding: 14px 16px 16px; background: var(--surface); }
  .carg-file.is-open .carg-file__body { display: block; animation: fadeIn .25s ease both; }

  /* Tabla de la data cargada → card-table canónica (.naowee-table--in-card) con scroll horizontal */
  .carg-data-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-lg); }
  .carg-data-scroll .naowee-table--in-card { table-layout: auto; min-width: 760px; }
  .carg-data-scroll .naowee-table--in-card tbody td { white-space: nowrap; }
  .carg-data-scroll .naowee-table--in-card .num { text-align: center; font-feature-settings: 'tnum'; }
  .carg-file__table-foot { font-size: 11.5px; color: var(--text-muted); margin-top: 10px; }
  /* Acciones por fila (editar/borrar) en "Cargas realizadas". */
  /* Columna de acciones fija a la derecha → editar/borrar siempre visibles aunque
     la tabla scrollee horizontalmente. */
  .carg-file__acts-th { width: 1%; position: sticky; right: 0; z-index: 1; background: var(--th-bg); }
  .carg-file__acts { white-space: nowrap; text-align: right; position: sticky; right: 0; background: var(--surface); box-shadow: -8px 0 8px -6px rgba(40, 40, 52, .10); }
  .carg-file__act { width: 28px; height: 28px; border: none; background: transparent; border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background var(--duration-fast), color var(--duration-fast); }
  .carg-file__act svg { width: 15px; height: 15px; }
  .carg-file__act:hover { background: var(--accent-bg); color: var(--accent); }
  .carg-file__act--del:hover { background: var(--red-bg); color: var(--red); }
  .carg-file__act--save:hover { background: var(--green-bg); color: var(--green); }
  .carg-file__edit-input { width: 100%; min-width: 90px; height: 32px; padding: 0 8px; border: 1px solid var(--border-dark); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; color: var(--text-primary); background: var(--surface); }
  .carg-file__edit-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(215,64,9,.12); }

  /* ── Toast (inyectado) ── */

  /* ── Animaciones ── */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }

  /* ── :focus-visible canónico ── */
  .carg-file__head:focus-visible,
  #dlPlantilla:focus-visible,
  #browseBtn:focus-visible,
  #fileDismiss:focus-visible,
  #analyzeBtn:focus-visible,
  #submitBtn:focus-visible,
  #manualSaveBtn:focus-visible,
  .inscribir-btn:focus-visible,
  .naowee-dropdown__trigger:focus-visible,
  #evPickerCta:focus-visible {
    outline: none; box-shadow: 0 0 0 3px rgba(215,64,9,.18);
  }

  /* El "quitar" (×) del tag de archivo NO debe ser naranja (feedback Gustavo):
     neutro por defecto, rojo al hover (semántica de eliminar) — patrón del módulo. */
  .naowee-file-uploader__file-dismiss { color: var(--text-muted); }
  .naowee-file-uploader__file-dismiss svg { color: currentColor; }
  .naowee-file-uploader__file-dismiss:hover { background: var(--red-bg); color: var(--red); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .carg-card { padding: 18px 16px; }
    .carg-results__summary { flex-direction: column; }
    .carg-results__stat { border-right: 0; border-bottom: 1px solid var(--border); }
    .carg-results__stat:last-child { border-bottom: 0; }
    .carg-tabs .naowee-tab { font-size: 12.5px; gap: 5px; padding: 0 8px; }
    .carg-tabs .naowee-tab svg { width: 15px; height: 15px; }
  }
  @media (max-width: 640px) {
    .carg-tabs .naowee-tab { font-size: 11.5px; padding: 0 6px; }
    .carg-manual-grid__header.g-ranking,
    .carg-manual-row.g-ranking { grid-template-columns: 1fr 90px 90px; }
    .carg-manual-grid__header.g-ranking *:nth-child(4),
    .carg-manual-row.g-ranking *:nth-child(4) { display: none; }
    .carg-manual-grid__header.g-medalleria,
    .carg-manual-row.g-medalleria { grid-template-columns: 1fr 64px 64px 64px; }
    .carg-manual-grid__header.g-medalleria *:nth-child(5),
    .carg-manual-row.g-medalleria *:nth-child(5) { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .carg-tabs-card, .carg-results, .carg-file__body { animation: none !important; }
    .carg-file__chev, .carg-medal { transition: none !important; }
  }

  /* ── OVERSIGHT (Admin solo lectura) ── */
  .oversight-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .oversight-head__title h2 { font-size: 22px; font-weight: 800; letter-spacing: -.4px; color: var(--text-primary); margin: 0 0 4px; }
  .oversight-head__title p { font-size: 13px; color: var(--text-secondary); margin: 0; }
  .oversight-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: var(--radius-full); background: var(--blue-bg); color: var(--blue-info); font-size: 11.5px; font-weight: 700; flex-shrink: 0; border: 1px solid var(--blue-border); }
  .oversight-badge svg { width: 14px; height: 14px; }
  .ov-gestor-chip { display: inline-flex; align-items: center; gap: 7px; }
  .ov-gestor-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .ov-gestor-name { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
  .ov-prog-wrap { display: flex; align-items: center; gap: 8px; }
  .ov-prog-track { flex: 1; height: 5px; background: var(--border); border-radius: 9999px; overflow: hidden; min-width: 60px; }
  .ov-prog-fill { height: 100%; border-radius: 9999px; background: var(--accent); transition: width .5s var(--easing-smoothout, ease); }
  .ov-prog-pct { font-size: 11.5px; font-weight: 700; color: var(--text-secondary); min-width: 32px; text-align: right; }
  .ov-last-cargue { font-size: 11.5px; color: var(--text-secondary); }
  .ov-history-toggle { background: none; border: none; font-family: inherit; font-size: 12px; color: var(--accent); font-weight: 600; cursor: pointer; padding: 3px 0; }
  .ov-history-toggle:hover { text-decoration: underline; }
  .ov-history-toggle:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(215,64,9,.18); border-radius: var(--radius-sm); }
  .ov-history-row { display: none; }
  .ov-history-row.is-open { display: table-row; }
  .ov-history-cell { padding: 0 16px 12px !important; background: var(--bg-soft); border-bottom: 1px solid var(--border); }
  .ov-history-list { display: flex; flex-direction: column; gap: 4px; padding: 8px 0 0; }
  .ov-history-item { font-size: 12px; color: var(--text-secondary); display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .ov-history-item strong { color: var(--text-primary); font-weight: 600; }
  .ov-empty-row td { padding: 28px 18px; text-align: center; font-size: 13px; color: var(--text-secondary); }
  @media (max-width: 720px) {
    .ov-col-gestor, .ov-col-prog, .ov-col-last { display: none; }
  }
  @media (max-width: 640px) {
    .naowee-table-card .naowee-table--in-card thead { display: none; }
    .naowee-table-card .naowee-table--in-card,
    .naowee-table-card .naowee-table--in-card tbody,
    .naowee-table-card .naowee-table--in-card tr { display: block; }
    .naowee-table-card .naowee-table--in-card tbody tr { border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
    .naowee-table-card .naowee-table--in-card tbody tr:last-child { border-bottom: none; }
    .naowee-table-card .naowee-table--in-card td { display: flex; align-items: flex-start; gap: 8px; padding: 2px 0 !important; border: none; font-size: 13px; }
    .naowee-table-card .naowee-table--in-card td[data-label]::before { content: attr(data-label); font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .3px; min-width: 90px; flex-shrink: 0; padding-top: 1px; }
    .naowee-table-card .naowee-table--in-card td.ov-col-gestor,
    .naowee-table-card .naowee-table--in-card td.ov-col-prog,
    .naowee-table-card .naowee-table--in-card td.ov-col-last { display: flex; }
    .naowee-table-card .naowee-table--in-card tr.ov-history-row { padding: 0; }
    .naowee-table-card .naowee-table--in-card td.ov-history-cell { padding: 0 16px 12px !important; }
  }

  /* ── Modal "Archivos cargados" (oversight ADMIN) — pequeño + timeline ── */
  .ov-modal-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(40,40,52,.48); opacity: 0; pointer-events: none; transition: opacity .2s ease; }
  .ov-modal-overlay.is-open { opacity: 1; pointer-events: auto; }
  .ov-modal { background: var(--surface); border-radius: var(--radius-xl); width: 95vw; max-width: 460px; max-height: 84vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-card); transform: translateY(20px) scale(.98); opacity: 0; transition: transform .26s cubic-bezier(.4,0,.2,1), opacity .2s ease; }
  .ov-modal-overlay.is-open .ov-modal { transform: none; opacity: 1; }
  .ov-modal__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; padding: 20px 22px 14px; border-bottom: 1px solid var(--border); border-radius: var(--radius-xl) var(--radius-xl) 0 0; }
  .ov-modal__head h3 { font-size: 16px; font-weight: 700; color: var(--text-primary); margin: 0; }
  .ov-modal__head p { font-size: 12.5px; color: var(--text-secondary); margin: 4px 0 0; line-height: 1.4; }
  .ov-modal__close { width: 32px; height: 32px; border: none; background: transparent; border-radius: var(--radius-md); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background var(--duration-fast), color var(--duration-fast); }
  .ov-modal__close:hover { background: var(--bg-soft); color: var(--text-primary); }
  .ov-modal__close:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(215,64,9,.18); }
  .ov-modal__close svg { width: 18px; height: 18px; }
  .ov-modal__body { padding: 18px 22px 22px; overflow-y: auto; }
  .ov-modal__empty { text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; }

  /* Timeline de archivos */
  .carg-timeline { position: relative; display: flex; flex-direction: column; gap: 18px; }
  .carg-timeline::before { content: ''; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
  .carg-tl-item { position: relative; display: flex; gap: 14px; padding-left: 0; }
  .carg-tl-dot { width: 16px; height: 16px; flex-shrink: 0; border-radius: 50%; background: var(--green-bg); border: 2px solid var(--green); margin-top: 3px; z-index: 1; }
  .carg-tl-content { flex: 1; min-width: 0; }
  .carg-tl-file { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .carg-tl-ico { width: 30px; height: 30px; border-radius: var(--radius-md); background: var(--green-bg); color: var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .carg-tl-ico svg { width: 16px; height: 16px; }
  .carg-tl-name { font-size: 13px; font-weight: 700; color: var(--text-primary); word-break: break-word; }
  .carg-tl-meta { font-size: 12px; color: var(--text-secondary); margin-top: 6px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .carg-tl-who { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; color: var(--text-primary); }
  .carg-tl-av { width: 20px; height: 20px; border-radius: 50%; color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .carg-tl-n { color: var(--green); font-weight: 700; }
  .carg-tl-time { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; }
  @media (prefers-reduced-motion: reduce) { .ov-modal, .ov-modal-overlay { transition: none !important; } }

  /* ═══ Ranking INTERNACIONAL: lista de colombianos + drawer de podio (ficticios) ═══ */
  .carg-intl-list { display: flex; flex-direction: column; gap: 10px; }
  .carg-intl-athlete { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); flex-wrap: wrap; }
  .carg-intl-athlete.is-done { border-color: var(--green-border); background: var(--green-bg); }
  .carg-intl-athlete__main { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .carg-intl-athlete__flag { font-size: 20px; line-height: 1; }
  .carg-intl-athlete__name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .carg-intl-athlete__sub { font-size: 12px; color: var(--text-secondary); }
  .carg-intl-athlete__right { display: flex; align-items: center; gap: 10px; }
  .carg-intl-athlete__status { font-size: 12.5px; font-weight: 700; color: var(--green); }
  /* Drawer derecho */
  .carg-intl-drawer { position: fixed; inset: 0; z-index: 1100; }
  .carg-intl-drawer[hidden] { display: none; }
  .carg-intl-drawer__overlay { position: absolute; inset: 0; background: rgba(40,40,52,.48); opacity: 0; transition: opacity .25s ease; }
  .carg-intl-drawer.is-open .carg-intl-drawer__overlay { opacity: 1; }
  .carg-intl-drawer__panel { position: absolute; top: 0; right: 0; bottom: 0; width: min(440px, 92vw); background: var(--surface); display: flex; flex-direction: column; transform: translateX(100%); transition: transform .3s var(--easing-smoothout); box-shadow: -8px 0 30px rgba(0,0,0,.14); }
  .carg-intl-drawer.is-open .carg-intl-drawer__panel { transform: none; }
  .carg-intl-drawer__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 20px 22px 16px; border-bottom: 1px solid var(--border); }
  .carg-intl-drawer__title { font-size: 16px; font-weight: 800; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
  .carg-intl-drawer__sub { font-size: 12.5px; color: var(--text-secondary); margin-top: 3px; }
  .carg-intl-drawer__close { width: 34px; height: 34px; border-radius: var(--radius-md); border: none; background: var(--bg-soft); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .carg-intl-drawer__close svg { width: 18px; height: 18px; }
  .carg-intl-drawer__body { flex: 1; overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 22px; }
  .carg-intl-sec__title { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-secondary); margin-bottom: 11px; }
  .carg-intl-field { display: flex; flex-direction: column; gap: 5px; }
  .carg-intl-field > label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .carg-intl-input { height: 40px; padding: 0 12px; border: 1px solid var(--border-dark); border-radius: var(--radius-md); font-family: inherit; font-size: 14px; color: var(--text-primary); background: var(--surface); width: 100%; }
  .carg-intl-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(215,64,9,.12); }
  .carg-intl-row2 { display: grid; grid-template-columns: 1fr 110px; gap: 10px; }
  .carg-podio-slot { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 13px 14px; display: flex; flex-direction: column; gap: 11px; margin-bottom: 11px; }
  .carg-podio-slot__head { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .carg-podio-slot__medal { font-size: 18px; }
  /* Slot ocupado por el deportista colombiano (su puesto = su posición registrada):
     read-only, no duplicable ni editable. Los demás slots son rivales ficticios. */
  .carg-podio-slot--owned { border-color: var(--accent); background: var(--accent-bg); }
  .carg-podio-slot__owned { display: flex; align-items: center; gap: 10px; }
  .carg-podio-slot__owned-flag { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .carg-podio-slot__owned-name { font-size: 13.5px; font-weight: 700; color: var(--text-primary); }
  .carg-podio-slot__owned-tag { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 1px; }
  .carg-podio-slot__fields { display: flex; flex-direction: column; gap: 11px; }
  /* El display:flex de arriba pisa el display:none del atributo [hidden] → restaurarlo. */
  .carg-podio-slot__owned[hidden], .carg-podio-slot__fields[hidden] { display: none; }
  .carg-intl-drawer__foot { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
  @media (max-width: 600px) {
    .carg-intl-drawer__panel { width: 100%; top: auto; height: 88vh; border-radius: var(--radius-xl) var(--radius-xl) 0 0; transform: translateY(100%); }
    .carg-intl-drawer.is-open .carg-intl-drawer__panel { transform: none; }
  }

  /* ═══ Medallería manual: buscar deportista → asignar medalla ═══ */
  .carg-med-list { display: flex; flex-direction: column; gap: 8px; }
  .carg-med-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-lg); flex-wrap: wrap; }
  .carg-med-row__name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .carg-med-row__sub { font-size: 12px; color: var(--text-secondary); }
  .carg-med-picker { display: flex; gap: 6px; }
  .carg-medal { width: 42px; height: 42px; border-radius: var(--radius-md); border: 1.5px solid var(--border); background: var(--surface); font-size: 20px; line-height: 1; cursor: pointer; opacity: .4; filter: grayscale(.4); transition: opacity .14s, filter .14s; }
  .carg-medal:hover:not(:disabled) { opacity: .85; }
  .carg-medal.is-selected { opacity: 1; filter: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(215,64,9,.1); }
  /* Medalla bloqueada por el puesto del ranking (fuera de podio o no corresponde). */
  .carg-medal:disabled, .carg-medal.is-disabled { opacity: .22; filter: grayscale(1); cursor: not-allowed; }
  /* Tag de puesto en la fila de medallería (liga Resultados↔Medallería). */
  .carg-med-postag { display: inline-block; margin-left: 6px; padding: 1px 8px; border-radius: var(--radius-full); font-size: 10.5px; font-weight: 700; vertical-align: middle; }
  .carg-med-postag--podio { background: var(--green-bg); color: var(--green); }
  .carg-med-postag--out { background: var(--red-bg); color: var(--red); }
  .carg-med-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
  .carg-med-count { font-size: 13px; font-weight: 700; color: var(--text-secondary); }
  /* Medallero por organización EN VIVO (se calcula solo). */
  .carg-med-orgpanel { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
  .carg-med-orgpanel__title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; color: var(--text-secondary); margin-bottom: 10px; }
  .carg-med-orgpanel__hint { color: var(--text-muted); font-weight: 500; text-transform: none; letter-spacing: 0; }
  .carg-tally-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-soft); margin-bottom: 6px; }
  .carg-tally-org { font-size: 13px; font-weight: 600; color: var(--text-primary); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .carg-tally-medals { font-size: 13px; font-weight: 700; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; font-feature-settings: 'tnum'; }
  .carg-tally-empty { font-size: 12.5px; color: var(--text-muted); margin: 0; }

  /* ═══ Captura de EQUIPOS (deportes de conjunto) — feedback reunión 03-jul ═══ */
  /* Toggle "tipo de entidad" contextual en el header de la tarjeta (feedback Doug:
     NO un segmento gemelo centrado). Segment pequeño + etiqueta, alineado a la
     derecha del título de la tarjeta. */
  .carg-scope-toggle { display: inline-flex; align-items: center; gap: 9px; flex-shrink: 0; }
  .carg-scope-toggle__lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-secondary); white-space: nowrap; }
  .naowee-segment--sm { height: 32px; padding: 3px; border-radius: var(--radius-md); }
  .naowee-segment--sm .naowee-segment__pill { top: 3px; bottom: 3px; }
  .naowee-segment--sm .naowee-segment__item { padding: 0 12px; font-size: 12px; }
  .carg-card__head--toggle { justify-content: flex-end; margin-bottom: 16px; }
  /* El bloque título crece para empujar el toggle a la derecha, alineado arriba
     con el título; en pantallas angostas el toggle baja y ocupa el ancho. */
  #scopeBody .carg-card__head > div:not(.carg-scope-toggle) { flex: 1 1 260px; min-width: 0; }
  #scopeBody .carg-scope-toggle { align-self: flex-start; }
  @media (max-width: 560px) {
    .carg-scope-toggle { width: 100%; justify-content: space-between; }
    .naowee-segment--sm { flex: 1; }
    .naowee-segment--sm .naowee-segment__item { flex: 1; }
  }
  /* Panel unificado con "Registrar nuevo deportista": superficie blanca + hairline +
     sombra tenue (no gris lleno) + encabezado tipo título con tile de icono. */
  .carg-eq-form { border: 1px solid var(--border); border-radius: var(--radius-xl); background: var(--surface); padding: 22px 24px 20px; box-shadow: var(--shadow-sm); }
  .carg-eq-form__head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .carg-eq-form__ico { flex-shrink: 0; width: 34px; height: 34px; border-radius: var(--radius-md); background: var(--accent-bg); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; }
  .carg-eq-form__ico svg { width: 18px; height: 18px; }
  .carg-eq-form__title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 0; line-height: 1.3; }
  .carg-eq-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .carg-eq-fixed { height: 44px; display: flex; align-items: center; padding: 0 12px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .carg-eq-medalfield { display: flex; flex-direction: column; gap: 6px; }
  .carg-eq-medalfield .carg-med-picker { margin-top: 2px; }
  .carg-eq-foot { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 16px; }

  /* Integrantes del equipo (asociar participantes — sin inscripción) */
  .carg-eq-members { margin-top: 22px; border-top: 1px dashed var(--border-dark); padding-top: 20px; }
  .carg-eq-members__title { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 12px; }
  .carg-eq-members__row { display: grid; grid-template-columns: 1fr 170px auto; gap: 10px; align-items: end; }
  .carg-eq-members__opt { font-weight: 500; color: var(--text-muted); text-transform: none; letter-spacing: 0; }
  /* Selector de integrantes = combobox de deportistas INSCRITOS (roster del evento). */
  .carg-eq-memsel { position: relative; }
  .carg-eq-memmenu { position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 20; max-height: 220px; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
  .carg-eq-memmenu[hidden] { display: none; }
  .carg-eq-memopt { display: flex; flex-direction: column; gap: 1px; width: 100%; text-align: left; padding: 8px 12px; border: none; background: transparent; cursor: pointer; font-family: inherit; }
  .carg-eq-memopt:hover { background: var(--accent-bg); }
  .carg-eq-memopt__nm { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .carg-eq-memopt__meta { font-size: 11.5px; color: var(--text-secondary); }
  .carg-eq-memmenu__empty { padding: 12px 14px; font-size: 12.5px; color: var(--text-muted); line-height: 1.4; }
  .carg-eq-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    if (!aoa.length || header.every((h) => !h)) return { structureError: 'El archivo está vacío o no tiene encabezados. Descarga y usa la plantilla oficial.' };
    const idx = {}; const missing = [];
    cols.forEach((c) => { const i = header.indexOf(norm(c.h)); idx[c.k] = i; if (c.req && i < 0) missing.push(c.h); });
    if (missing.length) return { structureError: `El archivo no coincide con la plantilla oficial. Faltan columnas obligatorias: ${missing.join(', ')}.` };
    const dataRows = aoa.slice(1)
      .map((r, i) => ({ cells: r || [], fila: i + 2 }))
      .filter(({ cells }) => cells.some((c) => String(c ?? '').trim() !== ''));
    if (!dataRows.length) return { empty: true };
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const errors = [], valid = [];
    dataRows.forEach(({ cells, fila }) => {
      const get = (k) => { const i = idx[k]; return i >= 0 ? String(cells[i] ?? '').trim() : ''; };
      const probs = [];
      cols.forEach((c) => {
        const v = get(c.k);
        if (c.req && !v) probs.push(`falta «${c.h}»`);
        else if (v && c.type === 'email' && !emailRe.test(v)) probs.push(`«${c.h}» con formato inválido`);
        else if (v && c.type === 'number' && isNaN(Number(String(v).replace(',', '.')))) probs.push(`«${c.h}» debe ser numérico`);
      });
      if (probs.length) errors.push({ fila, msg: probs.join(' · ').replace(/^./, (m) => m.toUpperCase()) });
      else valid.push(displayRow(get, tipo));
    });
    return { total: dataRows.length, valid, errors };
  }

  /* Detección de deportes de CONJUNTO (para el aviso de medallería: en conjunto
     la medalla es UNA por equipo, no una por integrante — feedback Juanma/César). */
  const _normDep = (s) => String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
  const CONJUNTO_SET = new Set((DEPORTES_POR_TIPO.Conjunto || []).map((d) => _normDep(d.label)));
  const isConjuntoDeporte = (dep) => CONJUNTO_SET.has(_normDep(dep));
  /* ¿El evento es MULTIDEPORTE? (heurística del sport, para el fallback sin catálogo). */
  const eventEsMultideporte = (e) => _normDep(e && e.sport).startsWith('multideporte');
  /* Catálogo deportivo CONFIGURADO del evento (ev.deportes, lo asocia el ADMIN en la
     edición). Es la fuente de verdad; el sport es solo fallback cuando no hay catálogo. */
  const _catalogDeportes = (e) => (Array.isArray(e && e.deportes) && e.deportes.length)
    ? e.deportes.map((d) => ({ label: d.deporte, emoji: d.emoji || '', pruebas: (d.competencias && d.competencias.length) ? d.competencias : ['EQUIPOS'] }))
    : null;
  /* ¿El evento admite deportes de CONJUNTO? Prioriza el catálogo configurado; si no hay,
     cae al sport (multideporte / deporte de conjunto en el encabezado / etiqueta "·Conjunto").
     Feedback reunión 03-jul: los de conjunto se registran POR EQUIPO. */
  const eventAdmiteConjunto = (e) => {
    if (!e) return false;
    const cat = _catalogDeportes(e);
    if (cat) return cat.some((d) => isConjuntoDeporte(d.label));
    if (eventEsMultideporte(e)) return true;
    const head = String(e.sport || '').split('·')[0].trim();
    return isConjuntoDeporte(head) || _normDep(e.sport).includes('conjunto');
  };
  /* ¿Tiene deportes INDIVIDUALES? (decide modo dual vs puro conjunto). */
  const eventHasIndividual = (e) => {
    if (!e) return true;
    const cat = _catalogDeportes(e);
    if (cat) return cat.some((d) => !isConjuntoDeporte(d.label));
    if (eventEsMultideporte(e)) return true;
    const head = String(e.sport || '').split('·')[0].trim();
    return !(isConjuntoDeporte(head) || _normDep(e.sport).includes('conjunto'));
  };
  /* Deportes de conjunto disponibles para el flujo de equipos (del catálogo si existe). */
  const conjuntoDeportesForEvent = (e) => {
    const cat = _catalogDeportes(e);
    if (cat) { const cj = cat.filter((d) => isConjuntoDeporte(d.label)); if (cj.length) return cj; }
    const all = DEPORTES_POR_TIPO.Conjunto || [];
    if (eventEsMultideporte(e)) return all;
    const head = String((e && e.sport) || '').split('·')[0].trim();
    const exact = all.find((d) => _normDep(d.label) === _normDep(head));
    if (exact) return [exact];
    const partial = all.find((d) => _normDep(head).includes(_normDep(d.label)) || _normDep(d.label).includes(_normDep(head)));
    return partial ? [partial] : all;
  };

  /* ═══════════════════════════════════════════════════════════════
     SEGMENT helper (reusado por el sub-segmento Masivo/Manual y la tab bar)
     ═══════════════════════════════════════════════════════════════ */
  function bindSegment(segEl, getActive, onSelect) {
    const pill = segEl.querySelector('.naowee-segment__pill');
    const items = Array.from(segEl.querySelectorAll('.naowee-segment__item'));
    function place(idx, instant) {
      items.forEach((it, i) => {
        it.classList.toggle('naowee-segment__item--active', i === idx);
        it.setAttribute('aria-selected', String(i === idx));
      });
      const rect = items[idx].getBoundingClientRect();
      const segRect = segEl.getBoundingClientRect();
      /* El pill (position:absolute; left:0) se ancla al padding-box del segment
         (justo dentro del borde). Restar SOLO el ancho del borde lo alinea con el
         ítem y respeta el padding del contenedor en ambos extremos. */
      const bl = parseFloat(getComputedStyle(segEl).borderLeftWidth) || 0;
      const x = rect.left - segRect.left - bl;
      if (instant) {
        /* init / cambio de tab / reflow → posiciona SIN animación */
        pill.classList.add('naowee-segment__pill--no-anim');
        pill.style.setProperty('--seg-x', `${x}px`);
        pill.style.width = `${rect.width}px`;
        void pill.offsetWidth;                                    // commit instantáneo
        pill.classList.remove('naowee-segment__pill--no-anim');   // re-habilita transición para clicks
      } else {
        /* click directo Masivo↔Manual → anima */
        pill.style.setProperty('--seg-x', `${x}px`);
        pill.style.width = `${rect.width}px`;
      }
    }
    const init = items.findIndex((it) => it.dataset.val === getActive());
    place(init >= 0 ? init : 0, true);
    items.forEach((it, i) => it.addEventListener('click', () => { place(i, false); onSelect(it.dataset.val); }));
    /* Reposiciona el pill tras reflow (fonts/responsive) sin animar. */
    requestAnimationFrame(() => { const k = items.findIndex((x) => x.dataset.val === getActive()); if (k >= 0) place(k, true); });
  }

  /* ═══════════════════════════════════════════════════════════════
     RENDER PRINCIPAL
     ═══════════════════════════════════════════════════════════════ */
  function render() {
    if (!selectedEventId || !ev) renderPicker();
    else renderWorkspace();
  }

  /* ─── Picker de evento (fallback sin ?id) ─── */
  function renderPicker() {
    const gid = gestorIdForRole(roleCode);
    const list = gid ? eventsForGestor(gid) : allEvents().filter((e) => e.status === 'activo');
    document.getElementById('cargueApp').innerHTML = `
      <div class="carg-picker">
        <div class="carg-picker__icon">${I.layers}</div>
        <h2 class="carg-picker__title">Selecciona un evento</h2>
        <p class="carg-picker__sub">Elige el evento que vas a gestionar. Dentro encontrarás el detalle del evento y los cargues (inscripciones, ranking/resultados y medallería).</p>
        <div class="carg-picker__form">
          <div class="naowee-dropdown" id="evPickerDd">
            <button class="naowee-dropdown__trigger" type="button" aria-haspopup="listbox" id="evPickerTrigger">

                    <button class="naowee-dropdown__opt" role="option" data-ev-id="${e.id}">

                      <span>${esc(e.name)} <span style="color:var(--text-muted);font-size:12px;font-weight:400">· ${e.id}</span></span>
                    </button>`).join('')
              }
            </div>
          </div>
          <button class="naowee-btn naowee-btn--loud" id="evPickerCta" disabled style="width:100%">Continuar →</button>

      </div>

    const dd = document.getElementById('evPickerDd');
    const trigger = document.getElementById('evPickerTrigger');

    trigger.addEventListener('click', () => dd.classList.toggle('is-open'));
    document.addEventListener('click', (e) => { if (!dd.contains(e.target)) dd.classList.remove('is-open'); });
    menu.querySelectorAll('[data-ev-id]').forEach((opt) => {
      opt.addEventListener('click', () => {
        chosen = opt.dataset.evId;
        val.textContent = opt.textContent.trim();
        val.classList.remove('is-placeholder');
        dd.classList.remove('is-open');
        cta.disabled = false;
        menu.querySelectorAll('.is-selected').forEach((o) => o.classList.remove('is-selected'));
        opt.classList.add('is-selected');
      });

    cta.addEventListener('click', () => {
      if (!chosen) return;
      window.location.href = `cargue.html?id=${encodeURIComponent(chosen)}&role=${roleCode}`;
    });
  }

  /* ─── DETALLE del evento (patrón canónico .det-card — shared) ─── */
