  /* ─── WORKSPACE del gestor: detalle + container de tabs ─── */
  function renderWorkspace() {
    document.getElementById('cargueApp').innerHTML = `
      ${detailHTML()}
      <section class="carg-tabs-card" aria-label="Cargues del evento">
        <div class="carg-tabs-card__head">${I.upload}<h3>Cargues del evento</h3></div>
        <div class="naowee-tabs naowee-tabs--proportional carg-tabs" id="tipoTabs" role="tablist" aria-label="Tipo de cargue">
          ${TIPOS.map((t) => `
            <button class="naowee-tab${t === activeTipo ? ' naowee-tab--selected' : ''}" data-tab="${t}" type="button" role="tab" aria-selected="${t === activeTipo}">
              ${getIcon(TIPO_CFG[t].icon)}<span class="carg-tab-lbl">${TIPO_CFG[t].tabLabel}</span>
            </button>`).join('')}
        </div>
        <div id="tabPanel"></div>
      </section>
    `;
    document.querySelectorAll('#tipoTabs .naowee-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        const val = tab.dataset.tab;
        if (val === activeTipo) return;
        activeTipo = val;
        activeMode = 'masivo';
        manualScope = 'ind';
        selectedFile = null; parseResults = null;
        newDraft = {};
        document.querySelectorAll('#tipoTabs .naowee-tab').forEach((t) => {
          const on = t.dataset.tab === val;
          t.classList.toggle('naowee-tab--selected', on);
          t.setAttribute('aria-selected', String(on));
        });
        renderTabPanel();
      });
    });
    renderTabPanel();
  }

  /* ─── PANEL del tab activo ─── */
  function renderTabPanel() {
    const cfg = TIPO_CFG[activeTipo];
    const panel = document.getElementById('tabPanel');
    if (!panel) return;
    /* Refresca el snapshot del evento: tras un cargue en vivo, insc.done incluye
       el delta → la nota de muestreo (sampleNote) muestra el total al día. */
    ev = allEvents().find((e) => e.id === selectedEventId) || ev;

    /* Único estado que cierra el cargue: finalizado → solo lectura de lo ya cargado.
       (Borrador NO bloquea: el gestor puede adelantar la operación — feedback Danna.) */
    if (!gateOpen) {
      panel.innerHTML = `
        <div class="naowee-message naowee-message--informative" style="margin-bottom:18px">
          <div class="naowee-message__header">
            <span class="naowee-message__icon"><svg viewBox="0 0 16 16" fill="none"><path d="M7 7h2v4H7z" fill="currentColor"/><circle cx="8" cy="5" r="1" fill="currentColor"/></svg></span>
            <span class="naowee-message__body">Evento <strong>finalizado</strong> · los cargues están cerrados (solo lectura). Puedes consultar los archivos ya cargados.</span>
          </div>
        </div>
        ${filesHTML()}
      `;
      bindFiles();
      return;
    }

    /* Aviso informativo (no bloquea): el evento aún está en borrador pero el gestor
       puede adelantar los cargues; se activará en su fecha de inicio. */
    const borradorNote = ev.status === 'borrador'
      ? `<div class="naowee-message naowee-message--caution" style="margin-bottom:18px">
           <div class="naowee-message__header">
             <span class="naowee-message__icon"><svg viewBox="0 0 16 16" fill="none"><path d="M7 5h2v4H7z" fill="currentColor"/><circle cx="8" cy="11" r="1" fill="currentColor"/></svg></span>
             <span class="naowee-message__body">Evento en <strong>borrador</strong>. Puedes adelantar los cargues de <strong>${esc(cfg.label.toLowerCase())}</strong>; el evento se activará automáticamente el <strong>${esc(ev.start)}</strong>.</span>
           </div>
         </div>`
      : '';
    panel.innerHTML = `
      ${borradorNote}
      <div class="carg-mode-bar">
        <div class="naowee-segment" data-segmented id="modeSegment" role="tablist" aria-label="Modo de cargue">
          <span class="naowee-segment__pill" aria-hidden="true"></span>
          <button class="naowee-segment__item naowee-segment__item--active" data-val="masivo" type="button" role="tab" aria-selected="true">Masivo</button>
          <button class="naowee-segment__item" data-val="manual" type="button" role="tab" aria-selected="false">Manual</button>
        </div>
      </div>
      <div id="modeBody"></div>
      <div id="filesMount">${activeTipo === 'inscripciones' ? '' : filesHTML()}</div>
    `;
    bindSegment(document.getElementById('modeSegment'), () => activeMode, (val) => {
      if (val === activeMode) return;
      activeMode = val;
      renderModeBody();
    });
    renderModeBody();
    /* Inscripciones: lista de "Deportistas inscritos" con filtros + eliminar (#2, #5).
       Otros tipos: historial de archivos cargados. */
    if (activeTipo === 'inscripciones') mountInscritosPanel();
    else bindFiles();
  }

  function renderModeBody() {
    const cfg = TIPO_CFG[activeTipo];
    const modeBody = document.getElementById('modeBody');
    if (!modeBody) return;
    if (activeMode === 'masivo') renderMasivo(modeBody, cfg);
    else renderManual(modeBody, cfg);
  }

  /* ═══ MODO MASIVO ═══ */
  function renderMasivo(container, cfg) {
    /* Mismo invariante que el modo manual: resultados y medallería (masivo o
       manual) SOLO se cargan sobre un evento con inscritos. Sin inscripciones
       → estado vacío también por la vía masiva (no basta con la plantilla).
       EXCEPCIÓN (reunión 03-jul): los eventos de PURO conjunto se registran por
       equipo sin inscripción previa → no se bloquean por roster vacío. */
    const pureConjunto = eventAdmiteConjunto(ev) && !eventHasIndividual(ev);
    /* Puro conjunto: la carga masiva por-persona NO aplica (el registro es por equipo;
       la masiva de equipos vive en backend/S3). Se redirige al modo Manual · Equipos,
       único flujo coherente en la demo → evita el callejón de la plantilla individual. */
    if (activeTipo !== 'inscripciones' && pureConjunto) {
      container.innerHTML = `
        <div class="carg-card">
          <div class="empty-state">
            <div class="empty-state__icon">${I.layers}</div>
            <p class="empty-state__title">Deporte de conjunto — se registra por equipo</p>
            <p class="empty-state__desc">${activeTipo === 'medalleria' ? 'Las medallas' : 'Los resultados'} de conjunto no se cargan con la plantilla por deportista. Regístralos por <strong>equipo</strong> en el modo <strong>Manual</strong>.</p>
            <button class="naowee-btn naowee-btn--loud naowee-btn--sm" id="goManualEq" type="button">${I.users} Ir a captura manual</button>
          </div>
        </div>`;
      container.querySelector('#goManualEq')?.addEventListener('click', () => {
        const m = document.querySelector('#modeSegment .naowee-segment__item[data-val="manual"]');
        if (m) m.click();
      });
      return;
    }
    if (activeTipo !== 'inscripciones' && !effectiveRoster(ev).length) {
      rosterEmptyState(container, activeTipo === 'medalleria' ? 'Las medallas' : 'Los resultados');
      return;
    }
    const _plName = esc(cfg.plantilla);
    const _plDot = _plName.lastIndexOf('.');
    const _plBase = _plDot > 0 ? _plName.slice(0, _plDot) : _plName;
    const _plExt = _plDot > 0 ? _plName.slice(_plDot + 1) : '';
    container.innerHTML = `
      <div class="carg-card" id="uploadCard">
        <div class="carg-card__head">
          <div>
            <h3 class="carg-card__title">Cargue masivo — ${esc(cfg.label)}</h3>
            <p class="carg-card__sub">Descarga la plantilla oficial, rellena los datos y súbela. El sistema detecta errores por fila y carga las válidas aunque otras fallen.</p>
          </div>
        </div>

        <div class="carg-template-card">
          <div class="carg-template-card__doc">
            <span class="carg-template-card__tile">${I.fileSheet}</span>
            <div class="carg-template-card__meta">
              <span class="carg-template-card__eyebrow">Plantilla oficial</span>
              <h3 class="carg-template-card__name">${_plBase}${_plExt ? `<span class="naowee-badge naowee-badge--neutral naowee-badge--quiet">${_plExt.toUpperCase()}</span>` : ''}</h3>
              <div class="carg-template-card__tags">
                <span class="naowee-badge naowee-badge--neutral naowee-badge--quiet">${I.lock} Estructura bloqueada</span>
                <span class="carg-template-card__hint">Solo llena los datos — no modifiques columnas ni formato.</span>
              </div>
            </div>
          </div>
          <button class="naowee-btn naowee-btn--loud naowee-btn--sm carg-template-card__cta" type="button" id="dlPlantilla">
            ${I.download} Descargar plantilla
          </button>
        </div>

        <div class="naowee-file-uploader" id="fileUploader">
          <span class="naowee-file-uploader__label naowee-file-uploader__label--required">Archivo de cargue</span>
          <input type="file" id="fileInput" accept=".xlsx,.xls" tabindex="-1">
          <div id="uploaderBody"></div>
          <div id="uploaderHelper"></div>
          <div class="carg-upload-hint">${I.info}<span>${esc(cfg.hint)}</span></div>
        </div>

        <div class="carg-analyze-row">
          <button class="naowee-btn naowee-btn--loud" id="analyzeBtn" disabled>${I.file} Analizar archivo</button>
        </div>

        <div class="carg-results" id="resultsPanel"></div>
      </div>
    `;
    bindMasivo(cfg);
  }

  /* Uploader con estados canónicos:
       idle    → botón "Seleccionar archivo" + dropzone
       success → tag con check verde + nombre + extensión + dismiss (oculta dropzone)
       error   → dropzone con borde error + helper--negative debajo */
  function bindMasivo(cfg) {
    const uploader = document.getElementById('fileUploader');
    const fileInput = document.getElementById('fileInput');
    const body = document.getElementById('uploaderBody');
    const helperSlot = document.getElementById('uploaderHelper');
    const analyzeBtn = document.getElementById('analyzeBtn');

    function clearResults() {
      const rp = document.getElementById('resultsPanel');
      rp.classList.remove('is-visible'); rp.innerHTML = ''; parseResults = null;
    }

    function bindBrowse() {
      document.getElementById('browseBtn')?.addEventListener('click', () => fileInput.click());
    }
    function bindDrop() {
      const dropZone = document.getElementById('dropZone');
      const fileInputDrop = document.getElementById('fileInputDrop');
      if (!dropZone) return;
      fileInputDrop.addEventListener('change', () => setFile(fileInputDrop.files[0] || null));
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('is-drag-over'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('is-drag-over'));
      dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('is-drag-over'); const f = e.dataTransfer.files[0]; if (f) setFile(f); });
    }

    function paintIdle() {
      uploader.classList.remove('naowee-file-uploader--error');
      helperSlot.innerHTML = '';
      body.innerHTML = `
        <div class="naowee-file-uploader__input-wrap">
          <span class="naowee-file-uploader__placeholder" id="filePlaceholder">Ningún archivo seleccionado</span>
          <button class="naowee-file-uploader__action" type="button" id="browseBtn">${I.upload} Seleccionar archivo</button>
        </div>
        <div class="naowee-file-uploader__drop-zone" id="dropZone">
          <input type="file" id="fileInputDrop" accept=".xlsx,.xls">
          <span class="naowee-file-uploader__drop-icon">${I.upload}</span>
          <span class="naowee-file-uploader__drop-title">Arrastra aquí tu archivo .xlsx</span>
          <span class="naowee-file-uploader__drop-hint">Solo .xlsx · peso máximo 50 MB · sin límite de registros</span>
        </div>`;
      bindBrowse(); bindDrop();
      analyzeBtn.disabled = true;
    }

    function paintError(msg) {
      paintIdle();
      uploader.classList.add('naowee-file-uploader--error');
      helperSlot.innerHTML = `<div class="naowee-helper naowee-helper--negative"><span class="naowee-helper__badge">${I.bang}</span><span class="naowee-helper__text">${esc(msg)}</span></div>`;
    }

    function paintSuccess(f) {
      uploader.classList.remove('naowee-file-uploader--error');
      helperSlot.innerHTML = '';
      const dot = f.name.lastIndexOf('.');
      const base = dot > 0 ? f.name.slice(0, dot) : f.name;
      const ext = dot > 0 ? f.name.slice(dot) : '';
      body.innerHTML = `
        <div class="naowee-file-uploader__input-wrap">
          <span class="naowee-file-uploader__file-tag naowee-file-uploader__file-tag--uploaded">
            ${I.checkCircle}
            <span class="naowee-file-uploader__file-name">${esc(base)}</span><span class="naowee-file-uploader__file-ext">${esc(ext)}</span>
            <button class="naowee-file-uploader__file-dismiss" type="button" id="fileDismiss" aria-label="Quitar archivo">${I.x}</button>
          </span>
          <span style="flex:1"></span>
          <span class="naowee-file-uploader__file-size">${(f.size / 1024).toFixed(0)} KB</span>
        </div>`;
      document.getElementById('fileDismiss').addEventListener('click', () => { selectedFile = null; clearResults(); paintIdle(); });
      analyzeBtn.disabled = false;
    }

    function setFile(f) {
      if (!f) { selectedFile = null; clearResults(); paintIdle(); return; }
      const nm = f.name.toLowerCase();
      if (!nm.endsWith('.xlsx') && !nm.endsWith('.xls')) { selectedFile = null; clearResults(); paintError('Formato no válido. Solo se aceptan archivos .xlsx o .xls.'); return; }
      if (f.size > 50 * 1024 * 1024) { selectedFile = null; clearResults(); paintError('El archivo supera el límite de 50 MB. Reduce el tamaño e intenta de nuevo.'); return; }
      selectedFile = f; clearResults(); paintSuccess(f);
    }

    fileInput.addEventListener('change', () => setFile(fileInput.files[0] || null));
    document.getElementById('dlPlantilla')?.addEventListener('click', () => downloadTemplate(cfg));

    /* Análisis REAL: lee el .xlsx, valida encabezados + filas contra TEMPLATE_COLS.
       Ya no inventa errores — reporta lo que de verdad falta/está mal en el archivo. */
    analyzeBtn.addEventListener('click', () => {
      if (!selectedFile) return;
      if (typeof XLSX === 'undefined') { renderResultsError('No se pudo cargar el lector de archivos (.xlsx). Revisa tu conexión e intenta de nuevo.'); return; }
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = 'Analizando…';
      const restore = () => { analyzeBtn.innerHTML = `${I.file} Analizar archivo`; analyzeBtn.disabled = false; };
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const aoa = ws ? XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false, defval: '' }) : [];
          const res = validateUpload(aoa, activeTipo);
          if (res.structureError) renderResultsError(res.structureError);
          else if (res.empty) renderResultsError('El archivo no tiene filas de datos. Descarga la plantilla, llénala y vuelve a subir.');
          else { parseResults = res; renderResults(res, cfg); }
        } catch (err) {
          renderResultsError('No se pudo leer el archivo. Asegúrate de que sea un .xlsx válido generado desde la plantilla oficial.');
        }
        restore();
      };
      reader.onerror = () => { renderResultsError('No se pudo leer el archivo. Intenta de nuevo.'); restore(); };
      reader.readAsArrayBuffer(selectedFile);
    });

    paintIdle();
  }

  /* Error de estructura/archivo vacío → message caution canónico en el panel. */
  function renderResultsError(msg) {
    const panel = document.getElementById('resultsPanel');
    if (!panel) return;
    panel.innerHTML = `
      <div class="naowee-message naowee-message--caution">
        <div class="naowee-message__header">
          <span class="naowee-message__icon">${I.bang}</span>
          <span class="naowee-message__body">${esc(msg)}</span>
        </div>
      </div>`;
    panel.classList.add('is-visible');
    parseResults = null;
  }

  /* ─── Panel de resultados del análisis ─── */
  function renderResults(r, cfg) {
    const panel = document.getElementById('resultsPanel');
    if (!panel) return;
    const nOk = r.valid.length, nErr = r.errors.length;
    const errRows = r.errors.map((e) => `
      <div class="naowee-message naowee-message--negative">
        <div class="naowee-message__header">
          <span class="naowee-message__icon">${I.bang}</span>
          <span class="naowee-message__body"><strong>Fila ${e.fila}</strong> · ${esc(e.msg)}</span>
        </div>
      </div>`).join('');

    panel.innerHTML = `
      <div class="carg-results__summary">
        <div class="carg-results__stat carg-results__stat--total"><span class="carg-results__stat-val">${r.total}</span><span class="carg-results__stat-lbl">Total filas</span></div>
        <div class="carg-results__stat carg-results__stat--ok"><span class="carg-results__stat-val">${nOk}</span><span class="carg-results__stat-lbl">Válidas</span></div>
        <div class="carg-results__stat carg-results__stat--err"><span class="carg-results__stat-val">${nErr}</span><span class="carg-results__stat-lbl">Con error</span></div>
      </div>
      <div class="carg-results__body">
        ${nErr > 0 ? `<div class="carg-results__section-label">Filas con error (${nErr}) — corrige y re-sube</div><div class="carg-err-list">${errRows}</div>` : ''}
        ${nOk > 0
          ? `<div class="carg-results__section-label">Filas válidas</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span class="naowee-badge naowee-badge--positive naowee-badge--large">${I.check} ${nOk} filas listas para cargar</span></div>`
          : `<p style="color:var(--text-muted);font-size:13px;margin:8px 0 0">Sin filas válidas en este archivo.</p>`}
      </div>
      ${nOk > 0 ? `
        <div class="carg-results__actions">
          <span class="carg-results__actions-note">${nErr > 0
            ? `Las ${nErr} fila${nErr > 1 ? 's' : ''} con error no se cargarán. Puedes cargar las ${nOk} válidas ahora y re-subir las erróneas después de corregirlas.`
            : `Todas las filas son válidas. Listo para cargar.`}</span>
          <button class="naowee-btn naowee-btn--loud" id="submitBtn">${I.check} Cargar ${nOk} fila${nOk !== 1 ? 's' : ''} válida${nOk !== 1 ? 's' : ''}</button>
        </div>` : ''}
    `;
    panel.classList.add('is-visible');
    document.getElementById('submitBtn')?.addEventListener('click', () => commitUpload(r.valid, cfg));
  }

  /* ─── Confirmar cargue masivo → crea versión de archivo + actualiza progreso ─── */
  function commitUpload(validRows, cfg) {
    if (!selectedEventId || !validRows.length) return;
    const n = validRows.length;
    const fileName = (selectedFile && selectedFile.name) || cfg.plantilla;
    applyUpload(selectedEventId, cfg.storeTipo, n);
    const ts = nowStamp();
    addUploadRecord(selectedEventId, { tipo: cfg.label, n, modeLabel: 'Masivo', timestamp: ts });
    addFileVersion(selectedEventId, cfg.storeTipo, {
      fileName, n, modeLabel: 'Masivo', timestamp: ts,
      columns: cfg.columns, rows: validRows
    });
    /* Inscripción masiva → los deportistas válidos entran al roster del evento
       (fuente de verdad para ranking/resultados y medallería). */
    if (cfg.storeTipo === 'insc') {
      addInscritos(selectedEventId, validRows.map((r) => ({
        tipoDoc: r.tipoDoc, nroDoc: r.nroDoc, nombre: r.nombre, sexo: r.sexo,
        deporte: r.deporte, depto: r.depto, organizacion: r.organizacion || '', correo: r.correo || '',
        origen: 'Masivo'
      })));
    }
    flash(`✓ ${n} fila${n !== 1 ? 's' : ''} cargada${n !== 1 ? 's' : ''} correctamente en ${cfg.label}.`, 'success');
    /* Refresca el panel (resetea uploader + muestra la nueva versión arriba). */
    selectedFile = null; parseResults = null;
    renderTabPanel();
  }

  /* ═══ MODO MANUAL ═══ */
  function renderManual(container, cfg) {
    if (cfg.manualMode === 'search') { renderManualSearch(container, cfg); return; }
    const kind = activeTipo === 'medalleria' ? 'medalleria' : 'ranking';
    const admiteConj = eventAdmiteConjunto(ev);
    const hasInd = eventHasIndividual(ev);
    /* Internacional (ranking, eventos SIN conjunto): flujo de ficticios. */
    if (activeTipo === 'ranking' && ev && ev.alcance === 'internacional' && !admiteConj) { renderManualRankingIntl(container); return; }
    /* Deportes de conjunto (según el CATÁLOGO del evento) → captura POR EQUIPO.
       Mixto (conjunto + individual) → sub-segmento Individuales|Equipos; puro conjunto
       → solo equipos. Tiene prioridad sobre el internacional. */
    if (admiteConj && hasInd) { renderManualDual(container, cfg, kind); return; }
    if (admiteConj) { renderManualEquipo(container, cfg, kind); return; }
    if (activeTipo === 'medalleria') renderManualMedalleria(container, cfg);
    else renderManualGrid(container, cfg);
  }

  /* Eventos multideporte: el manual permite capturar INDIVIDUALES (roster) o
     EQUIPOS (conjunto). Un sub-segmento canónico alterna entre ambos. */
  /* Cambio de sub-modo centralizado: lo usan el toggle contextual Y el CTA del
     empty-state (para no depender del DOM del segmento). */
  let _repaintDual = null;
  function setManualScope(val) {
    if (val === manualScope) return;
    manualScope = val;
    if (_repaintDual) _repaintDual();
  }
  /* Toggle "tipo de entidad": NO es un segmento gemelo centrado (feedback Doug).
     Vive como sub-control contextual, etiquetado, en el header de la tarjeta de
     captura — jerarquía clara frente al segmento primario Masivo/Manual. */
  const scopeToggleHTML = () => `
    <div class="carg-scope-toggle">
      <span class="carg-scope-toggle__lbl">Registrar</span>
      <div class="naowee-segment naowee-segment--sm" data-segmented id="scopeSegment" role="tablist" aria-label="Individuales o equipos">
        <span class="naowee-segment__pill" aria-hidden="true"></span>
        <button class="naowee-segment__item" data-val="ind" type="button" role="tab">Individuales</button>
        <button class="naowee-segment__item" data-val="eq" type="button" role="tab">Equipos</button>
      </div>
    </div>`;
  function injectScopeToggle(root) {
    const card = root.querySelector('.carg-card');
    if (!card || card.querySelector('#scopeSegment')) return;
    let head = card.querySelector('.carg-card__head');
    if (!head) { head = document.createElement('div'); head.className = 'carg-card__head carg-card__head--toggle'; card.insertBefore(head, card.firstChild); }
    head.insertAdjacentHTML('beforeend', scopeToggleHTML());
    bindSegment(card.querySelector('#scopeSegment'), () => manualScope, (val) => setManualScope(val));
  }
  function renderManualDual(container, cfg, kind) {
    container.innerHTML = '<div id="scopeBody"></div>';
    const body = container.querySelector('#scopeBody');
    const paint = () => {
      if (manualScope === 'eq') renderManualEquipo(body, cfg, kind);
      else if (kind === 'medalleria') renderManualMedalleria(body, cfg);
      else renderManualGrid(body, cfg);
      injectScopeToggle(body);   // el toggle vive dentro de la tarjeta que se acaba de pintar
    };
    _repaintDual = paint;
    paint();
  }

  /* ═══ MEDALLERÍA MANUAL (rediseño, feedback Juanma 25-jun) ═══
     Antes era por departamento. Ahora: buscar al deportista y darle su medalla en
     la competencia. El medallero por organismo se calcula solo (el deportista ya
     pertenece a una organización). */
  const MED_EMOJI = { oro: '🥇', plata: '🥈', bronce: '🥉' };
  const MED_COLS = [
    { k: 'organizacion', l: 'Organización' }, { k: 'deportista', l: 'Deportista' },
    { k: 'deporte', l: 'Deporte' }, { k: 'prueba', l: 'Prueba' }, { k: 'medalla', l: 'Medalla' }
  ];
  const RANK_COLS = [
    { k: 'organizacion', l: 'Organización' }, { k: 'deportista', l: 'Deportista' },
    { k: 'deporte', l: 'Deporte' }, { k: 'prueba', l: 'Prueba' },
    { k: 'posicion', l: 'Posición', num: true }, { k: 'marca', l: 'Marca/Tiempo' }
  ];
  function renderManualMedalleria(container, cfg) {
    /* Los atletas de deportes de conjunto NO se medallan individualmente aquí (la
       medalla de equipo es UNA): se excluyen del listado y van al modo Equipos. */
    const fullRoster = effectiveRoster(ev);
    const rows = fullRoster.filter((r) => !isConjuntoDeporte(r.deporte));
    const hasConjunto = fullRoster.some((r) => isConjuntoDeporte(r.deporte));
    if (!rows.length) { if (hasConjunto) { conjuntoOnlyState(container, 'medalleria'); return; } rosterEmptyState(container, 'Las medallas'); return; }
    const medals = {};   // id -> 'oro' | 'plata' | 'bronce'
    /* Liga con Resultados: la posición registrada en el ranking restringe la medalla
       (fuera de podio = sin medalla; 1/2/3 = solo la que corresponde). Sin resultado → libre. */
    const positions = getResultPositions(selectedEventId);
    const hasPositions = Object.keys(positions).length > 0;
    const posOf = (r) => { const e = positions[positionKey({ nroDoc: r.nroDoc, deporte: r.deporte, prueba: r.prueba })]; const n = e ? parseInt(e.posicion, 10) : NaN; return Number.isFinite(n) ? n : null; };
    const medalRow = (r) => {
      const pos = posOf(r);
      const podiumMedal = pos != null ? MEDAL_BY_POS[pos] : null;   // oro/plata/bronce · undefined si >3
      const locked = pos != null;                                   // hay resultado → la medalla la manda el puesto
      const btn = (m, emoji, label) => {
        const dis = locked && m !== podiumMedal;
        return `<button type="button" class="carg-medal ${medals[r.id] === m ? 'is-selected' : ''}" data-medal="${m}" data-id="${r.id}" title="${label}"${dis ? ' disabled aria-disabled="true"' : ''}>${emoji}</button>`;
      };
      const posTag = pos == null ? '' : (podiumMedal
        ? `<span class="carg-med-postag carg-med-postag--podio">Puesto ${pos}</span>`
        : `<span class="carg-med-postag carg-med-postag--out">Puesto ${pos} · fuera de podio</span>`);
      return `
      <div class="carg-med-row" data-id="${r.id}">
        <div class="carg-med-row__info">
          <div class="carg-med-row__name">${esc(r.nombre)}${posTag}</div>
          <div class="carg-med-row__sub">${rosterSub(r)}${r.organizacion ? ' · ' + esc(r.organizacion) : ''}</div>
        </div>
        <div class="carg-med-picker" role="group" aria-label="Medalla de ${esc(r.nombre)}">
          ${btn('oro', '🥇', 'Oro')}${btn('plata', '🥈', 'Plata')}${btn('bronce', '🥉', 'Bronce')}
        </div>
      </div>`;
    };
    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Captura manual — Medallería</h3>
          <p class="carg-card__sub">Busca al deportista y asígnale su medalla en la competencia. El medallero por organismo se calcula solo.${sampleNote(rows.length)}</p>
        </div></div>
        ${hasConjunto ? `<div class="naowee-message naowee-message--caution" style="margin-bottom:14px"><div class="naowee-message__header"><span class="naowee-message__icon">${I.bang}</span><span class="naowee-message__body">Este evento incluye <strong>deportes de conjunto</strong>: la medalla de equipo es <strong>una sola</strong>, no una por integrante. Regístrala en el modo <strong>Equipos · conjunto</strong> (arriba), no aquí por deportista.</span></div></div>` : ''}
        ${hasPositions ? `<div class="naowee-message naowee-message--informative" style="margin-bottom:14px"><div class="naowee-message__header"><span class="naowee-message__icon"><svg viewBox="0 0 16 16" fill="none"><path d="M7 7h2v4H7z" fill="currentColor"/><circle cx="8" cy="5" r="1" fill="currentColor"/></svg></span><span class="naowee-message__body">Las medallas respetan el <strong>ranking</strong>: solo el <strong>podio (1-3)</strong> recibe medalla, y oro/plata/bronce según el puesto. Los deportistas fuera de podio quedan bloqueados.</span></div></div>` : ''}
        <div class="carg-search-row" style="margin-bottom:14px">
          <div class="naowee-searchbox" id="medSearch" style="max-width:480px;flex:1 1 260px">
            <div class="naowee-searchbox__input-wrap">
              <span class="naowee-searchbox__icon">${I.search}</span>
              <input class="naowee-searchbox__input" type="search" id="medInput" placeholder="Nombre, documento o deporte…" autocomplete="off">
              <button class="naowee-searchbox__clear" id="medClear" type="button" aria-label="Limpiar búsqueda">${I.x}</button>
            </div>
          </div>
        </div>
        <div class="carg-med-list" id="medList">${rows.map(medalRow).join('')}</div>
        <div class="carg-med-orgpanel">
          <div class="carg-med-orgpanel__title">Medallero por organización <span class="carg-med-orgpanel__hint">· se calcula solo</span></div>
          <div id="medOrgTally"></div>
        </div>
        <div class="carg-med-foot">
          <span class="carg-med-count" id="medCount">0 medallas asignadas</span>
          <button class="naowee-btn naowee-btn--loud" id="manualSaveBtn" disabled>${I.check} Guardar medallería</button>
        </div>
      </div>`;
    const list = container.querySelector('#medList');
    const countEl = container.querySelector('#medCount');
    const saveBtn = container.querySelector('#manualSaveBtn');
    const input = container.querySelector('#medInput');
    const searchBox = container.querySelector('#medSearch');
    const tallyEl = container.querySelector('#medOrgTally');
    /* Medallero por organización EN VIVO: derivado de la organización de cada
       deportista del roster → demuestra el "se calcula solo" (feedback Juanma). */
    const renderTally = () => {
      const t = {};
      Object.entries(medals).forEach(([id, m]) => {
        const r = rows.find((x) => x.id === id); if (!r) return;
        const org = r.organizacion || 'Sin organización';
        (t[org] = t[org] || { oro: 0, plata: 0, bronce: 0 })[m]++;
      });
      const orgs = Object.keys(t).sort();
      tallyEl.innerHTML = orgs.length
        ? orgs.map((o) => `<div class="carg-tally-row"><span class="carg-tally-org">${esc(o)}</span><span class="carg-tally-medals">${['oro', 'plata', 'bronce'].filter((k) => t[o][k]).map((k) => `${MED_EMOJI[k]} ${t[o][k]}`).join('&nbsp;&nbsp;') || '—'}</span></div>`).join('')
        : '<p class="carg-tally-empty">Asigna medallas y verás aquí cómo se suman por organización, automáticamente.</p>';
    };
    const sync = () => {
      const n = Object.keys(medals).length;
      countEl.textContent = `${n} medalla${n !== 1 ? 's' : ''} asignada${n !== 1 ? 's' : ''}`;
      saveBtn.disabled = n === 0;
      renderTally();
    };
    function bindMedals() {
      list.querySelectorAll('.carg-medal').forEach((b) => b.addEventListener('click', () => {
        if (b.disabled) return;   // medalla bloqueada por el puesto del ranking
        const id = b.dataset.id, m = b.dataset.medal;
        if (medals[id] === m) delete medals[id]; else medals[id] = m;
        b.closest('.carg-med-row').querySelectorAll('.carg-medal').forEach((x) => x.classList.toggle('is-selected', medals[id] === x.dataset.medal));
        sync();
      }));
    }
    const renderList = () => {
      const q = (input.value || '').trim().toLowerCase();
      const filtered = q ? rows.filter((r) => `${r.nombre} ${rosterDoc(r)} ${r.deporte} ${r.prueba || ''} ${r.organizacion || ''}`.toLowerCase().includes(q)) : rows;
      list.innerHTML = filtered.length ? filtered.map(medalRow).join('') : '<div class="carg-empty-inline" style="padding:16px;color:var(--text-muted)">Sin resultados para esa búsqueda.</div>';
      bindMedals();
    };
    bindMedals();
    input.addEventListener('input', () => { searchBox.classList.toggle('naowee-searchbox--has-value', input.value.length > 0); renderList(); });
    container.querySelector('#medClear').addEventListener('click', () => { input.value = ''; searchBox.classList.remove('naowee-searchbox--has-value'); renderList(); input.focus(); });
    saveBtn.addEventListener('click', () => {
      const entries = Object.entries(medals);
      const n = entries.length;
      if (!n) return;
      saveBtn.disabled = true;   // evita doble guardado mientras persiste
      const assigned = entries.map(([id, m]) => {
        const r = rows.find((x) => x.id === id) || {};
        return { organizacion: r.organizacion || '—', deportista: r.nombre || '—', deporte: r.deporte || '—', prueba: r.prueba || '—', medalla: `${MED_EMOJI[m]} ${m.charAt(0).toUpperCase() + m.slice(1)}` };
      });
      const ts = nowStamp();
      applyUpload(selectedEventId, 'med', n);
      addUploadRecord(selectedEventId, { tipo: 'Medallería', n, modeLabel: 'Manual', timestamp: ts });
      addFileVersion(selectedEventId, 'med', { fileName: 'Medallería manual', n, modeLabel: 'Manual', timestamp: ts, columns: MED_COLS, rows: assigned });
      flash(`✓ ${n} medalla${n !== 1 ? 's' : ''} guardada${n !== 1 ? 's' : ''} correctamente.`, 'success');
      renderTabPanel();   // resetea el estado (medals={}) y muestra la nueva versión en "Archivos cargados"
    });
    sync();
  }

  /* ═══ CAPTURA POR EQUIPOS — deportes de conjunto (feedback reunión 03-jul) ═══
     Los deportes de conjunto se registran POR EQUIPO, sin inscripción previa: se
     crea el resultado/medalla del equipo (organización) en su competencia y,
     opcionalmente, se asocian los integrantes al grupo. La medalla es UNA por
     equipo (no una por integrante). Reusa la misma función para ranking y
     medallería (kind); persiste como versión de archivo igual que los demás. */
  const EQ_RANK_COLS = [
    { k: 'organizacion', l: 'Equipo / Organización' }, { k: 'deporte', l: 'Deporte' },
    { k: 'prueba', l: 'Prueba' }, { k: 'posicion', l: 'Posición', num: true },
    { k: 'marca', l: 'Resultado / Marca' }, { k: 'integrantes', l: 'Integrantes' }
  ];
  const EQ_MED_COLS = [
    { k: 'organizacion', l: 'Equipo / Organización' }, { k: 'deporte', l: 'Deporte' },
    { k: 'prueba', l: 'Prueba' }, { k: 'medalla', l: 'Medalla' }, { k: 'integrantes', l: 'Integrantes' }
  ];
  const _cap = (s) => String(s || '').charAt(0).toUpperCase() + String(s || '').slice(1);

  function renderManualEquipo(container, cfg, kind) {
    const isMed = kind === 'medalleria';
    const storeTipo = isMed ? 'med' : 'res';
    const deportes = conjuntoDeportesForEvent(ev);
    const multi = deportes.length > 1;
    const pruebasDe = (label) => { const d = deportes.find((x) => x.label === label); return (d && d.pruebas && d.pruebas.length) ? d.pruebas : ['EQUIPOS']; };
    const teams = [];   // equipos staged (por guardar)
    const form = { deporte: multi ? '' : deportes[0].label, prueba: multi ? '' : pruebasDe(deportes[0].label)[0], organizacion: '', posicion: '', marca: '', medalla: '', integrantes: [] };

    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Captura manual — ${isMed ? 'Medallería de equipos' : 'Resultado de equipos'}</h3>
          <p class="carg-card__sub">Los deportes de conjunto se registran por equipo, sin inscripción previa. Crea el ${isMed ? 'equipo con su medalla' : 'resultado del equipo'} y, si quieres, asocia a sus integrantes.</p>
        </div></div>
        <div class="naowee-message naowee-message--informative" style="margin-bottom:16px">
          <div class="naowee-message__header">
            <span class="naowee-message__icon"><svg viewBox="0 0 16 16" fill="none"><path d="M7 7h2v4H7z" fill="currentColor"/><circle cx="8" cy="5" r="1" fill="currentColor"/></svg></span>
            <span class="naowee-message__body">Evento con <strong>deportes de conjunto</strong>: registra el ${isMed ? 'la medalla del' : 'resultado del'} <strong>equipo</strong> (no hace falta inscribir a cada integrante). ${isMed ? 'La medalla de equipo es <strong>una sola</strong>.' : ''} Asocia a sus integrantes <strong>eligiéndolos de los deportistas inscritos</strong>.</span>
          </div>
        </div>
        <div class="carg-eq-form" id="eqForm">
          <div class="carg-eq-form__head">
            <span class="carg-eq-form__ico">${I.userPlus}</span>
            <h4 class="carg-eq-form__title">Nuevo ${isMed ? 'equipo con medalla' : 'resultado de equipo'}</h4>
          </div>
          <div class="carg-eq-grid">
            ${multi
              ? ddFieldHTML('deporte', 'Deporte', 'Selecciona…', true)
              : `<div class="carg-field"><label class="naowee-textfield__label">Deporte</label><div class="carg-eq-fixed">${esc(form.deporte)}</div></div>`}
            <div class="carg-field" data-prueba-slot></div>
            ${ddFieldHTML('organizacion', 'Equipo / Organización', 'Busca la liga/club…', true)}
            ${isMed
              ? `<div class="carg-field carg-eq-medalfield">
                   <label class="naowee-textfield__label naowee-textfield__label--required">Medalla</label>
                   <div class="carg-med-picker" role="group" aria-label="Medalla del equipo" id="eqMedalPicker">
                     <button type="button" class="carg-medal" data-medal="oro" title="Oro">🥇</button>
                     <button type="button" class="carg-medal" data-medal="plata" title="Plata">🥈</button>
                     <button type="button" class="carg-medal" data-medal="bronce" title="Bronce">🥉</button>
                   </div>
                 </div>`
              : `${tfFieldHTML('posicion', 'Posición', 'ej: 1', true)}${tfFieldHTML('marca', 'Resultado / Marca', 'ej: 3-1 · 3-0 sets', false)}`}
          </div>
          <div class="carg-eq-members">
            <div class="carg-eq-members__title">Integrantes del equipo <span class="carg-eq-members__opt">· elígelos de los inscritos · opcional</span></div>
            <div class="carg-eq-memsel">
              <div class="naowee-searchbox" id="memSearchBox">
                <div class="naowee-searchbox__input-wrap">
                  <span class="naowee-searchbox__icon">${I.search}</span>
                  <input class="naowee-searchbox__input" type="search" id="memSearch" placeholder="Busca un inscrito por nombre o documento…" autocomplete="off">
                  <button class="naowee-searchbox__clear" id="memClear" type="button" aria-label="Limpiar">${I.x}</button>
                </div>
              </div>
              <div class="carg-eq-memmenu" id="memMenu" hidden></div>
            </div>
            <div class="carg-eq-chips" id="memChips"></div>
          </div>
          <div class="carg-eq-foot">
            <button class="naowee-btn naowee-btn--ghost naowee-btn--sm" type="button" id="eqAddBtn" disabled>${I.check} Agregar equipo</button>
          </div>
        </div>

        <div class="carg-eq-staged" id="eqStaged"></div>

        ${isMed ? `<div class="carg-med-orgpanel"><div class="carg-med-orgpanel__title">Medallero por organización <span class="carg-med-orgpanel__hint">· se calcula solo</span></div><div id="eqOrgTally"></div></div>` : ''}

        <div class="carg-med-foot" style="margin-top:18px">
          <span class="carg-med-count" id="eqCount">0 equipos en la lista</span>
          <button class="naowee-btn naowee-btn--loud" id="eqSaveBtn" disabled>${I.check} Guardar ${isMed ? 'medallería' : 'resultados'}</button>
        </div>
      </div>`;

    const addBtn = container.querySelector('#eqAddBtn');
    const saveBtn = container.querySelector('#eqSaveBtn');
    const stagedEl = container.querySelector('#eqStaged');
    const countEl = container.querySelector('#eqCount');
    const tallyEl = container.querySelector('#eqOrgTally');
    const chipsEl = container.querySelector('#memChips');
    const pruebaSlot = container.querySelector('[data-prueba-slot]');
    const memSearch = container.querySelector('#memSearch');
    const memMenu = container.querySelector('#memMenu');
    const memBox = container.querySelector('#memSearchBox');
    const memClear = container.querySelector('#memClear');
    /* Roster de inscritos → los integrantes se ELIGEN de aquí (feedback Doug), no a mano. */
    const rosterPool = effectiveRoster(ev);
    const _nq = (s) => String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

    /* Prueba = campo fijo derivado del deporte (conjunto → 'EQUIPOS'). */
    const setPruebaDisplay = () => {
      const p = form.prueba;
      pruebaSlot.innerHTML = `<label class="naowee-textfield__label">Prueba</label><div class="carg-eq-fixed">${p ? esc(p) : '<span style="color:var(--text-muted);font-weight:500">Elige el deporte…</span>'}</div>`;
    };
    const canAdd = () => !!(form.deporte && form.prueba && form.organizacion && (isMed ? form.medalla : String(form.posicion).trim()));
    const syncAdd = () => { addBtn.disabled = !canAdd(); };

    if (multi) {
      setupDropdown(container.querySelector('[data-dd="deporte"]'), deportes.map((d) => ({ value: d.label, label: d.label, emoji: d.emoji })), () => form.deporte, (v) => { form.deporte = v; form.prueba = pruebasDe(v)[0] || 'EQUIPOS'; setPruebaDisplay(); syncAdd(); });
    }
    const orgDd = setupDropdown(container.querySelector('[data-dd="organizacion"]'), ORGS_LIST, () => form.organizacion, (v) => {
      form.organizacion = v;
      /* Los integrantes pertenecen a la organización del equipo: al cambiarla, purga los que ya no correspondan. */
      if (v && form.integrantes.length) {
        const before = form.integrantes.length;
        form.integrantes = form.integrantes.filter((m) => (m.organizacion || '') === v);
        const dropped = before - form.integrantes.length;
        if (dropped) { renderChips(); flash(`Se quitaron ${dropped} integrante${dropped !== 1 ? 's' : ''} que no pertenecen a ${v}.`, 'caution'); }
      }
      syncAdd();
    });

    if (isMed) {
      const picker = container.querySelector('#eqMedalPicker');
      picker.querySelectorAll('.carg-medal').forEach((b) => b.addEventListener('click', () => {
        const m = b.dataset.medal;
        form.medalla = form.medalla === m ? '' : m;
        picker.querySelectorAll('.carg-medal').forEach((x) => x.classList.toggle('is-selected', x.dataset.medal === form.medalla));
        syncAdd();
      }));
    } else {
      container.querySelector('[data-tf="posicion"] .naowee-textfield__input').addEventListener('input', (e) => { form.posicion = e.target.value; syncAdd(); });
      container.querySelector('[data-tf="marca"] .naowee-textfield__input').addEventListener('input', (e) => { form.marca = e.target.value; });
    }

    /* ── Integrantes: se ELIGEN de los deportistas INSCRITOS del evento (roster) ── */
    const renderChips = () => {
      chipsEl.innerHTML = form.integrantes.map((m, i) => `<span class="carg-eq-chip">${esc(m.nombre)}${m.doc ? ` <span class="carg-eq-chip__doc">${esc(m.doc)}</span>` : ''}<button type="button" class="carg-eq-chip__x" data-rm="${i}" aria-label="Quitar integrante">${I.x}</button></span>`).join('');
      chipsEl.querySelectorAll('[data-rm]').forEach((b) => b.addEventListener('click', () => { form.integrantes.splice(Number(b.dataset.rm), 1); renderChips(); }));
    };
    const isMemAdded = (p) => form.integrantes.some((m) => m.id === p.id);
    const renderMemMenu = () => {
      if (!rosterPool.length) { memMenu.innerHTML = '<div class="carg-eq-memmenu__empty">Aún no hay deportistas inscritos. Inscríbelos en la pestaña <strong>Inscripciones</strong>; el equipo se puede registrar y asociarlos luego.</div>'; memMenu.hidden = false; return; }
      const q = _nq(memSearch.value);
      let pool = rosterPool.filter((p) => !isMemAdded(p));
      if (form.organizacion) pool = pool.filter((p) => (p.organizacion || '') === form.organizacion);   // integrantes de la organización elegida
      if (q) pool = pool.filter((p) => _nq(`${p.nombre} ${rosterDoc(p)}`).includes(q));
      if (form.organizacion && !pool.length && !q) { memMenu.innerHTML = `<div class="carg-eq-memmenu__empty">No hay inscritos de <strong>${esc(form.organizacion)}</strong> sin asignar.</div>`; memMenu.hidden = false; return; }
      const items = pool.slice(0, 40);
      memMenu.innerHTML = items.length
        ? items.map((p) => `<button type="button" class="carg-eq-memopt" data-mid="${esc(p.id)}"><span class="carg-eq-memopt__nm">${esc(p.nombre)}</span><span class="carg-eq-memopt__meta">${esc(rosterDoc(p))}${p.organizacion ? ' · ' + esc(p.organizacion) : ''}</span></button>`).join('')
        : '<div class="carg-eq-memmenu__empty">Sin inscritos que coincidan.</div>';
      memMenu.hidden = false;
      memMenu.querySelectorAll('.carg-eq-memopt').forEach((b) => b.addEventListener('click', () => {
        const p = rosterPool.find((x) => x.id === b.dataset.mid); if (!p) return;
        form.integrantes.push({ id: p.id, nombre: p.nombre, doc: rosterDoc(p), organizacion: p.organizacion || '' });
        memSearch.value = ''; memBox.classList.remove('naowee-searchbox--has-value'); memMenu.hidden = true;
        renderChips(); memSearch.focus();
      }));
    };
    memSearch.addEventListener('focus', renderMemMenu);
    memSearch.addEventListener('input', () => { memBox.classList.toggle('naowee-searchbox--has-value', memSearch.value.length > 0); renderMemMenu(); });
    memClear.addEventListener('click', () => { memSearch.value = ''; memBox.classList.remove('naowee-searchbox--has-value'); renderMemMenu(); memSearch.focus(); });
    /* Cierra el menú al hacer clic fuera; auto-limpia el listener tras re-render. */
    function onMemDocClick(e) { if (!memBox.isConnected) { document.removeEventListener('click', onMemDocClick); return; } if (!e.target.closest('.carg-eq-memsel')) memMenu.hidden = true; }
    document.addEventListener('click', onMemDocClick);

    /* ── Lista de equipos por guardar (staged) + medallero en vivo ── */
    const compKey = (t) => `${_normDep(t.deporte)}·${_normDep(t.prueba)}`;
    const stagedRow = (t, i) => {
      const meta = isMed
        ? `<td data-label="Medalla"><span class="carg-eq-medaltag">${MED_EMOJI[t.medalla]} ${_cap(t.medalla)}</span></td>`
        : `<td data-label="Posición" class="num">${esc(t.posicion)}</td><td data-label="Resultado">${esc(t.marca || '—')}</td>`;
      return `<tr>
        <td data-label="Equipo">${esc(t.organizacion)}</td>
        <td data-label="Deporte">${esc(t.deporte)}</td>
        <td data-label="Prueba">${esc(t.prueba)}</td>
        ${meta}
        <td data-label="Integrantes">${t.integrantes.length ? esc(t.integrantes.map((m) => m.nombre).join(', ')) : '—'}</td>
        <td style="text-align:right"><button class="carg-eq-del" type="button" data-rm-team="${i}" aria-label="Quitar equipo">${I.trash}</button></td>
      </tr>`;
    };
    const renderTally = () => {
      if (!isMed || !tallyEl) return;
      const t = {};
      teams.forEach((tm) => { const o = tm.organizacion || 'Sin organización'; (t[o] = t[o] || { oro: 0, plata: 0, bronce: 0 })[tm.medalla]++; });
      const orgs = Object.keys(t).sort();
      tallyEl.innerHTML = orgs.length
        ? orgs.map((o) => `<div class="carg-tally-row"><span class="carg-tally-org">${esc(o)}</span><span class="carg-tally-medals">${['oro', 'plata', 'bronce'].filter((k) => t[o][k]).map((k) => `${MED_EMOJI[k]} ${t[o][k]}`).join('&nbsp;&nbsp;') || '—'}</span></div>`).join('')
        : '<p class="carg-tally-empty">Agrega equipos con medalla y verás aquí el medallero por organización, automáticamente.</p>';
    };
    const renderStaged = () => {
      const head = isMed
        ? `<th>Equipo / Organización</th><th>Deporte</th><th>Prueba</th><th>Medalla</th><th>Integrantes</th><th></th>`
        : `<th>Equipo / Organización</th><th>Deporte</th><th>Prueba</th><th>Posición</th><th>Resultado</th><th>Integrantes</th><th></th>`;
      stagedEl.innerHTML = teams.length ? `
        <div class="carg-eq-staged__title">${I.layers} Equipos por guardar (${teams.length})</div>
        <div class="carg-data-scroll"><table class="naowee-table--in-card"><thead><tr>${head}</tr></thead><tbody>${teams.map(stagedRow).join('')}</tbody></table></div>` : '';
      stagedEl.querySelectorAll('[data-rm-team]').forEach((b) => b.addEventListener('click', () => { teams.splice(Number(b.dataset.rmTeam), 1); refresh(); }));
      const n = teams.length;
      countEl.textContent = `${n} equipo${n !== 1 ? 's' : ''} en la lista`;
      saveBtn.disabled = n === 0;
      renderTally();
    };
    const refresh = () => renderStaged();

    addBtn.addEventListener('click', () => {
      if (!canAdd()) return;
      const ck = `${_normDep(form.deporte)}·${_normDep(form.prueba)}`;
      if (isMed) {
        if (teams.some((t) => compKey(t) === ck && t.medalla === form.medalla)) { flash(`Ya hay un equipo con medalla de ${form.medalla} en esa competencia.`, 'error'); return; }
      } else {
        const pos = String(form.posicion).trim();
        if (teams.some((t) => compKey(t) === ck && String(t.posicion).trim() === pos)) { flash(`Ya hay un equipo en la posición ${pos} de esa competencia.`, 'error'); return; }
      }
      teams.push({ organizacion: form.organizacion, deporte: form.deporte, prueba: form.prueba, posicion: form.posicion, marca: form.marca, medalla: form.medalla, integrantes: form.integrantes.slice() });
      /* Reset de los campos por-equipo (mantiene deporte/prueba para agregar rápido). */
      form.organizacion = ''; form.posicion = ''; form.marca = ''; form.medalla = ''; form.integrantes = [];
      if (orgDd) orgDd.reset();
      if (isMed) { container.querySelectorAll('#eqMedalPicker .carg-medal').forEach((x) => x.classList.remove('is-selected')); }
      else { const pi = container.querySelector('[data-tf="posicion"] .naowee-textfield__input'); const mi = container.querySelector('[data-tf="marca"] .naowee-textfield__input'); if (pi) pi.value = ''; if (mi) mi.value = ''; }
      renderChips(); syncAdd(); refresh();
      flash('Equipo agregado a la lista.');
    });

    saveBtn.addEventListener('click', () => {
      if (!teams.length) return;
      saveBtn.disabled = true;
      const n = teams.length;
      const ts = nowStamp();
      const rows = teams.map((t) => isMed
        ? { organizacion: t.organizacion, deporte: t.deporte, prueba: t.prueba, medalla: `${MED_EMOJI[t.medalla]} ${_cap(t.medalla)}`, integrantes: t.integrantes.length ? t.integrantes.map((m) => m.nombre).join(', ') : '—' }
        : { organizacion: t.organizacion, deporte: t.deporte, prueba: t.prueba, posicion: t.posicion || '—', marca: t.marca || '—', integrantes: t.integrantes.length ? t.integrantes.map((m) => m.nombre).join(', ') : '—' });
      applyUpload(selectedEventId, storeTipo, n);
      addUploadRecord(selectedEventId, { tipo: isMed ? 'Medallería' : 'Ranking / Resultados', n, modeLabel: 'Manual · equipos', timestamp: ts });
      addFileVersion(selectedEventId, storeTipo, { fileName: isMed ? 'Medallería de equipos' : 'Resultados de equipos', n, modeLabel: 'Manual · equipos', timestamp: ts, columns: isMed ? EQ_MED_COLS : EQ_RANK_COLS, rows });
      flash(`✓ ${n} equipo${n !== 1 ? 's' : ''} guardado${n !== 1 ? 's' : ''} en ${isMed ? 'medallería' : 'resultados'}.`, 'success');
      renderTabPanel();
    });

    setPruebaDisplay();
    renderChips();
    renderStaged();
    syncAdd();
  }

  /* ═══ RANKING INTERNACIONAL (feedback Juanma/Vanessa 25-jun) ═══
     En un evento internacional solo se sigue a los deportistas de Colombia.
     Para cada colombiano se registra su posición y se crean los participantes
     "ficticios" (país + nombre) del podio contra los que compitió. */
  const PAISES = [
    { value: 'BR', label: '🇧🇷 Brasil' }, { value: 'AR', label: '🇦🇷 Argentina' },
    { value: 'US', label: '🇺🇸 Estados Unidos' }, { value: 'FR', label: '🇫🇷 Francia' },
    { value: 'ES', label: '🇪🇸 España' }, { value: 'MX', label: '🇲🇽 México' },
    { value: 'CA', label: '🇨🇦 Canadá' }, { value: 'DE', label: '🇩🇪 Alemania' },
    { value: 'JP', label: '🇯🇵 Japón' }, { value: 'CL', label: '🇨🇱 Chile' },
    { value: 'PE', label: '🇵🇪 Perú' }, { value: 'CO', label: '🇨🇴 Colombia' }
  ];
  const ICON_X = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  const intlDone = new Set();
  const intlData = {};        // id -> { pos, marca, podio:{1,2,3} } (sobrevive re-renders de la sesión)
  let intlEscHandler = null;  // handler único de Escape (evita acumulación en document)

  function intlAthleteRow(r) {
    const done = intlDone.has(r.id);
    return `<div class="carg-intl-athlete ${done ? 'is-done' : ''}" data-athlete="${r.id}">
      <div class="carg-intl-athlete__main">
        <span class="carg-intl-athlete__flag">🇨🇴</span>
        <div><div class="carg-intl-athlete__name">${esc(r.nombre)}</div><div class="carg-intl-athlete__sub">${rosterSub(r)}</div></div>
      </div>
      <div class="carg-intl-athlete__right">
        <span class="carg-intl-athlete__status" data-status ${done ? '' : 'hidden'}>✓ ${done && intlData[r.id] ? 'Puesto ' + esc(intlData[r.id].pos) : 'Resultado registrado'}</span>
        <button type="button" class="naowee-btn naowee-btn--ghost naowee-btn--sm" data-open="${r.id}">${done ? 'Editar' : 'Registrar resultado'}</button>
      </div>
    </div>`;
  }

  function intlDrawerHTML() {
    const slot = (n, medal) => `
      <div class="carg-podio-slot" data-slot="${n}">
        <div class="carg-podio-slot__head"><span class="carg-podio-slot__medal">${medal}</span> ${n}.º lugar</div>
        <!-- Estado OCUPADO por el colombiano (su posición = este puesto): read-only. -->
        <div class="carg-podio-slot__owned" data-owned="${n}" hidden>
          <span class="carg-podio-slot__owned-flag">🇨🇴</span>
          <div>
            <div class="carg-podio-slot__owned-name" data-owned-name="${n}">—</div>
            <div class="carg-podio-slot__owned-tag">Este puesto es del deportista colombiano · su marca se toma de arriba</div>
          </div>
        </div>
        <!-- Estado editable (rival ficticio): país (sin Colombia) + nombre + marca. -->
        <div class="carg-podio-slot__fields" data-fields="${n}">
          <div class="carg-intl-field">
            <label>País del participante</label>
            <div class="naowee-dropdown" data-dd-pais="${n}">
              <button type="button" class="naowee-dropdown__trigger" aria-haspopup="listbox"><span class="naowee-dropdown__value is-placeholder" data-dd-val>Selecciona país…</span><span class="naowee-dropdown__chevron">${I.chevD}</span></button>
              <div class="naowee-dropdown__menu" role="listbox"></div>
            </div>
          </div>
          <div class="carg-intl-row2">
            <div class="carg-intl-field"><label>Nombre</label><input class="carg-intl-input" data-slot-nombre="${n}" placeholder="Nombre del participante"></div>
            <div class="carg-intl-field"><label data-slot-marca-label="${n}">Marca</label><input class="carg-intl-input" data-slot-marca="${n}" placeholder="ej: 10.4 s"></div>
          </div>
        </div>
      </div>`;
    return `
    <div class="carg-intl-drawer" id="intlDrawer" hidden>
      <div class="carg-intl-drawer__overlay" data-close></div>
      <aside class="carg-intl-drawer__panel" role="dialog" aria-modal="true" aria-label="Registrar resultado internacional">
        <header class="carg-intl-drawer__head">
          <div>
            <div class="carg-intl-drawer__title">🇨🇴 <span data-drawer-name>—</span></div>
            <div class="carg-intl-drawer__sub" data-drawer-sub>—</div>
          </div>
          <button type="button" class="carg-intl-drawer__close" data-close aria-label="Cerrar">${ICON_X}</button>
        </header>
        <div class="carg-intl-drawer__body">
          <section>
            <div class="carg-intl-sec__title">Resultado del colombiano</div>
            <div class="carg-intl-row2">
              <div class="carg-intl-field"><label>Posición final</label><input class="carg-intl-input" id="colPos" type="number" min="1" placeholder="ej: 4"></div>
              <div class="carg-intl-field"><label data-col-marca-label>Marca</label><input class="carg-intl-input" id="colMarca" placeholder="ej: 10.6 s"></div>
            </div>
          </section>
          <section>
            <div class="carg-intl-sec__title">Podio de la prueba · participantes ficticios</div>
            ${slot(1, '🥇')}${slot(2, '🥈')}${slot(3, '🥉')}
          </section>
        </div>
        <footer class="carg-intl-drawer__foot">
          <button type="button" class="naowee-btn naowee-btn--loud" id="intlSaveBtn">${I.check} Guardar resultado</button>
        </footer>
      </aside>
    </div>`;
  }

  function renderManualRankingIntl(container) {
    const rows = effectiveRoster(ev);
    if (!rows.length) { rosterEmptyState(container, 'Los resultados'); return; }
    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Captura manual — Ranking internacional</h3>
          <p class="carg-card__sub">Registra la posición del deportista colombiano y el podio de la prueba.</p>
        </div></div>
        <div class="naowee-message naowee-message--informative" style="margin-bottom:16px">
          <div class="naowee-message__header">
            <span class="naowee-message__icon"><svg viewBox="0 0 16 16" fill="none"><path d="M7 7h2v4H7z" fill="currentColor"/><circle cx="8" cy="5" r="1" fill="currentColor"/></svg></span>
            <span class="naowee-message__body">Evento <strong>internacional</strong>: solo se hace seguimiento a los deportistas de Colombia 🇨🇴. Para cada uno, crea los <strong>participantes ficticios</strong> (país + nombre) del podio contra los que compitió.</span>
          </div>
        </div>
        <div class="carg-intl-list">${rows.map((r) => intlAthleteRow(r)).join('')}</div>
        <div id="intlPreview"></div>
      </div>`;
    /* El drawer se monta en <body>: position:fixed dentro del card quedaba
       atrapado por un ancestro con transform (animación) → no cubría toda la
       pantalla ni mostraba el overlay. En body se ancla al viewport. */
    document.getElementById('intlDrawer')?.remove();
    document.body.insertAdjacentHTML('beforeend', intlDrawerHTML());
    bindIntl(container, rows);
  }

  function bindIntl(container, rows) {
    const drawer = document.getElementById('intlDrawer');
    const previewEl = container.querySelector('#intlPreview');
    /* Previsualización tipo TABLA de los resultados ya registrados (feedback Doug:
       poder verlos sin tener que darle "Editar"). Read-only; se recalcula al guardar. */
    const renderIntlPreview = () => {
      if (!previewEl) return;
      const done = rows.filter((r) => intlDone.has(r.id) && intlData[r.id]);
      if (!done.length) { previewEl.innerHTML = ''; return; }
      const medalN = ['🥇', '🥈', '🥉'];
      const podioStr = (d) => [1, 2, 3].map((n) => { const s = (d.podio && d.podio[n]) || {}; const pa = (PAISES.find((x) => x.value === s.pais) || {}).label || ''; return s.nombre ? `${medalN[n - 1]} ${esc(pa)} ${esc(s.nombre)}`.trim() : ''; }).filter(Boolean).join(' · ') || '—';
      previewEl.innerHTML = `
        <div class="carg-eq-staged__title" style="margin-top:22px">${I.layers} Resultados registrados (${done.length})</div>
        <div class="carg-data-scroll"><table class="naowee-table--in-card">
          <thead><tr><th>Deportista 🇨🇴</th><th>Puesto</th><th>Resultado</th><th>Podio de la prueba</th></tr></thead>
          <tbody>${done.map((r) => { const d = intlData[r.id]; return `<tr><td>${esc(r.nombre)}</td><td class="num">${esc(d.pos)}</td><td>${esc(d.marca || '—')}</td><td>${podioStr(d)}</td></tr>`; }).join('')}</tbody>
        </table></div>`;
    };
    const paisState = { 1: '', 2: '', 3: '' };
    let currentId = null;
    const paisLabel = (val) => (PAISES.find((p) => p.value === val) || {}).label || 'Selecciona país…';
    const setPais = (n, val) => {
      paisState[n] = val || '';
      const v = drawer.querySelector(`[data-dd-pais="${n}"] [data-dd-val]`);
      v.textContent = val ? paisLabel(val) : 'Selecciona país…';
      v.classList.toggle('is-placeholder', !val);
    };
    [1, 2, 3].forEach((n) => {
      const dd = drawer.querySelector(`[data-dd-pais="${n}"]`);
      /* Sin Colombia: el podio son RIVALES ficticios; al colombiano lo ocupa su propio puesto. */
      setupDropdown(dd, PAISES.filter((p) => p.value !== 'CO'), () => paisState[n], (val) => { paisState[n] = val; });
    });
    const setVal = (sel, val) => { const e = drawer.querySelector(sel); if (e) e.value = val || ''; };
    const clearForm = () => {
      setVal('#colPos', ''); setVal('#colMarca', '');
      [1, 2, 3].forEach((n) => { setPais(n, ''); setVal(`[data-slot-nombre="${n}"]`, ''); setVal(`[data-slot-marca="${n}"]`, ''); });
    };
    const fillForm = (d) => {
      setVal('#colPos', d.pos); setVal('#colMarca', d.marca);
      [1, 2, 3].forEach((n) => { const s = (d.podio && d.podio[n]) || {}; setPais(n, s.pais || ''); setVal(`[data-slot-nombre="${n}"]`, s.nombre || ''); setVal(`[data-slot-marca="${n}"]`, s.marca || ''); });
    };
    const open = (id) => {
      currentId = id;
      const r = rows.find((x) => x.id === id);
      drawer.querySelector('[data-drawer-name]').textContent = r.nombre;
      drawer.querySelector('[data-drawer-sub]').textContent = r.prueba ? `${r.deporte} · ${r.prueba}` : (r.deporte || '');
      /* El resultado se etiqueta según deporte+prueba (no genérico "Marca"). */
      const rm = resultMeta(r.deporte, r.prueba);
      const colLbl = drawer.querySelector('[data-col-marca-label]'); if (colLbl) colLbl.textContent = rm.label;
      const colM = drawer.querySelector('#colMarca'); if (colM) colM.placeholder = rm.ph;
      [1, 2, 3].forEach((n) => { const l = drawer.querySelector(`[data-slot-marca-label="${n}"]`); if (l) l.textContent = rm.label; const i2 = drawer.querySelector(`[data-slot-marca="${n}"]`); if (i2) i2.placeholder = rm.ph; });
      if (intlData[id]) fillForm(intlData[id]); else clearForm();   // Editar reabre CON lo capturado
      syncOwnedSlots();                    // bloquea el slot del colombiano según su posición
      drawer.hidden = false;
      void drawer.offsetWidth;           // reflow → commit del estado cerrado para que la transición del panel/overlay anime
      drawer.classList.add('is-open');
    };
    const close = () => { drawer.classList.remove('is-open'); setTimeout(() => { drawer.hidden = true; }, 300); };
    container.querySelectorAll('[data-open]').forEach((b) => b.addEventListener('click', () => open(b.dataset.open)));
    drawer.querySelectorAll('[data-close]').forEach((b) => b.addEventListener('click', close));
    /* Handler ÚNICO de Escape (antes se agregaba uno por render → se acumulaban). */
    if (intlEscHandler) document.removeEventListener('keydown', intlEscHandler);
    intlEscHandler = (e) => { if (e.key === 'Escape' && !drawer.hidden) close(); };
    document.addEventListener('keydown', intlEscHandler);
    /* El slot del podio que coincide con la posición del colombiano LO OCUPA él
       (read-only): no se puede duplicar ni poner a otro ahí; los demás = rivales.
       Evita registrarlo en primer lugar (o cualquier puesto) en dos sitios a la vez. */
    const colPosEl = drawer.querySelector('#colPos');
    function syncOwnedSlots() {
      const p = parseInt(colPosEl.value, 10);
      const r = currentId ? rows.find((x) => x.id === currentId) : null;
      [1, 2, 3].forEach((n) => {
        const owned = (p === n);
        const ownedEl = drawer.querySelector(`[data-owned="${n}"]`);
        const fieldsEl = drawer.querySelector(`[data-fields="${n}"]`);
        if (ownedEl) ownedEl.hidden = !owned;
        if (fieldsEl) fieldsEl.hidden = owned;
        drawer.querySelector(`[data-slot="${n}"]`)?.classList.toggle('carg-podio-slot--owned', owned);
        if (owned) {
          const nm = drawer.querySelector(`[data-owned-name="${n}"]`); if (nm) nm.textContent = r ? r.nombre : '';
          setPais(n, ''); setVal(`[data-slot-nombre="${n}"]`, ''); setVal(`[data-slot-marca="${n}"]`, '');
        }
      });
    }
    colPosEl.addEventListener('input', syncOwnedSlots);
    drawer.querySelector('#intlSaveBtn').addEventListener('click', () => {
      if (!currentId) return;
      const pos = (drawer.querySelector('#colPos').value || '').trim();
      if (!pos) { flash('Ingresa la posición del deportista colombiano.', 'error'); drawer.querySelector('#colPos').focus(); return; }
      const colMarca = (drawer.querySelector('#colMarca').value || '').trim();
      const rCol = rows.find((x) => x.id === currentId);
      const podio = {};
      [1, 2, 3].forEach((n) => {
        if (String(pos) === String(n)) {
          /* El puesto del colombiano lo ocupa él (no un rival): Colombia + su nombre + su marca. */
          podio[n] = { pais: 'CO', nombre: rCol ? rCol.nombre : '', marca: colMarca };
        } else {
          podio[n] = { pais: paisState[n], nombre: (drawer.querySelector(`[data-slot-nombre="${n}"]`).value || '').trim(), marca: (drawer.querySelector(`[data-slot-marca="${n}"]`).value || '').trim() };
        }
      });
      const wasDone = intlDone.has(currentId);
      intlData[currentId] = { pos, marca: colMarca, podio };
      intlDone.add(currentId);
      const row = container.querySelector(`.carg-intl-athlete[data-athlete="${currentId}"]`);
      if (row) {
        row.classList.add('is-done');
        const st = row.querySelector('[data-status]'); st.hidden = false; st.textContent = '✓ Puesto ' + pos;
        row.querySelector('[data-open]').textContent = 'Editar';
      }
      /* Liga con Medallería: la posición del colombiano restringe su medalla. */
      const rAth = rows.find((x) => x.id === currentId);
      if (rAth) setResultPosition(selectedEventId, { nroDoc: rAth.nroDoc, deporte: rAth.deporte, prueba: rAth.prueba, posicion: pos, deportista: rAth.nombre });
      close();
      if (!wasDone) {   // solo suma la primera vez; "Editar" no re-suma al contador
        applyUpload(selectedEventId, 'res', 1);
        addUploadRecord(selectedEventId, { tipo: 'Ranking / Resultados', n: 1, modeLabel: 'Manual · internacional', timestamp: nowStamp() });
      }
      renderIntlPreview();
      flash(wasDone ? '✓ Resultado actualizado.' : '✓ Resultado internacional registrado.', 'success');
    });
    renderIntlPreview();   // muestra los ya registrados al montar (persisten en la sesión)
  }

  /* ── Dropdown flotante canónico (reusable para el form de nuevo deportista) ── */
  /* Cierra cualquier otro dropdown abierto → solo UNO abierto a la vez (feedback Doug). */
  function closeOtherDropdowns(except) {
    document.querySelectorAll('.naowee-dropdown.is-open').forEach((d) => {
      if (d === except) return;
      d.classList.remove('is-open');
      d.querySelector('.naowee-dropdown__trigger')?.setAttribute('aria-expanded', 'false');
    });
  }
  function setupDropdown(ddEl, opts, getVal, onSelect) {
    if (!ddEl) return;
    const trigger = ddEl.querySelector('.naowee-dropdown__trigger');
    const menu = ddEl.querySelector('.naowee-dropdown__menu');
    const valEl = ddEl.querySelector('.naowee-dropdown__value');
    const placeholder = valEl.textContent;   // para reset() en cascadas
    /* opts puede ser array O función (para dropdowns en cascada, p.ej. prueba←deporte). */
    const getOpts = () => (typeof opts === 'function' ? opts() : opts);
    function paint() {
      const cur = getVal();
      const list = getOpts();
      menu.innerHTML = list.length ? list.map((o) => `
        <button type="button" class="naowee-dropdown__opt ${o.value === cur ? 'is-selected' : ''}" data-val="${esc(o.value)}" role="option">
          ${o.emoji ? `<span class="naowee-dropdown__opt-emoji">${o.emoji}</span>` : ''}<span>${esc(o.label)}</span>
          <span class="naowee-dropdown__opt-check">${I.check}</span>
        </button>`).join('') : '<div class="naowee-dropdown__empty" style="padding:10px 14px;font-size:13px;color:var(--text-muted)">Elige primero el deporte.</div>';
      menu.querySelectorAll('.naowee-dropdown__opt').forEach((b) => {
        b.addEventListener('click', (e) => {
          e.stopPropagation();
          const o = getOpts().find((x) => x.value === b.dataset.val);
          valEl.textContent = o ? o.label : '';
          valEl.classList.remove('is-placeholder');
          ddEl.classList.remove('is-open');
          trigger.setAttribute('aria-expanded', 'false');
          onSelect(b.dataset.val, o);
        });
      });
    }
    trigger.setAttribute('aria-expanded', 'false');
    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const willOpen = !ddEl.classList.contains('is-open');
      if (willOpen) closeOtherDropdowns(ddEl);          // solo un dropdown abierto a la vez
      ddEl.classList.toggle('is-open', willOpen);
      trigger.setAttribute('aria-expanded', String(willOpen));
      if (willOpen) paint();
    });
    /* Handler nombrado con auto-limpieza: si el dropdown ya no está en el DOM (tras
       re-render) se desuscribe solo → evita fuga de listeners de document (auditoría). */
    function onDocClick(e) {
      if (!ddEl.isConnected) { document.removeEventListener('click', onDocClick); return; }
      if (!ddEl.contains(e.target)) { ddEl.classList.remove('is-open'); trigger.setAttribute('aria-expanded', 'false'); }
    }
    document.addEventListener('click', onDocClick);
    return { reset() { valEl.textContent = placeholder; valEl.classList.add('is-placeholder'); } };
  }

  /* ═══ Modal de confirmación reutilizable (registro / eliminar) — feedback 25-jul:
     sin borradores, se confirma y se guarda directo ═══ */
  function confirmDialog({ title, message = '', detailHTML = '', confirmLabel = 'Confirmar', onConfirm }) {
    document.getElementById('cargConfirm')?.remove();
    const el = document.createElement('div');
    el.className = 'carg-modal-overlay'; el.id = 'cargConfirm';
    el.innerHTML = `
      <div class="carg-modal" role="dialog" aria-modal="true" aria-labelledby="cargConfirmTitle">
        <div class="carg-modal__head">
          <h3 class="carg-modal__title" id="cargConfirmTitle">${esc(title)}</h3>
          <button class="carg-modal__close" type="button" data-close aria-label="Cerrar">${I.x}</button>
        </div>
        <div class="carg-modal__body">${message ? `<p class="carg-modal__msg">${message}</p>` : ''}${detailHTML}</div>
        <div class="carg-modal__foot">
          <button class="naowee-btn naowee-btn--ghost" type="button" data-close>Cancelar</button>
          <button class="naowee-btn naowee-btn--loud" type="button" id="cargConfirmBtn">${I.check} ${esc(confirmLabel)}</button>
        </div>
      </div>`;
    document.body.appendChild(el);
    void el.offsetWidth; el.classList.add('is-open');
    function onEsc(e) { if (e.key === 'Escape') close(); }
    function close() { el.classList.remove('is-open'); document.removeEventListener('keydown', onEsc); setTimeout(() => el.remove(), 240); }
    el.querySelectorAll('[data-close]').forEach((b) => b.addEventListener('click', close));
    el.addEventListener('click', (e) => { if (e.target === el) close(); });
    document.addEventListener('keydown', onEsc);
    el.querySelector('#cargConfirmBtn').addEventListener('click', () => { close(); onConfirm && onConfirm(); });
    el.querySelector('#cargConfirmBtn').focus();
  }

  /* Inscribe UN deportista directo (sin cola/borrador) tras confirmación (#4). */
  function inscribeOne(a) {
    const nd = (s) => String(s || '').trim().toUpperCase();
    const dup = effectiveRoster(ev).some((r) => nd(r.nroDoc) === nd(a.nroDoc) && (r.deporte || '').toLowerCase() === (a.deporte || '').toLowerCase());
    if (dup) { flash('Ese deportista ya está inscrito en este deporte.', 'error'); return; }
    addInscritos(selectedEventId, [{ tipoDoc: a.tipoDoc, nroDoc: a.nroDoc, nombre: a.nombre, sexo: a.sexo, deporte: a.deporte, prueba: a.prueba || '', depto: a.depto || '', organizacion: a.organizacion || '', correo: a.correo || '', origen: a.origen || 'Manual' }]);
    applyUpload(selectedEventId, 'insc', 1);
    addUploadRecord(selectedEventId, { tipo: 'Inscripciones', n: 1, modeLabel: 'Manual', timestamp: nowStamp() });
    flash(`✓ ${a.nombre} inscrito correctamente.`, 'success');

      ${a.organizacion ? `<div class="carg-modal__dl-row"><span class="carg-modal__dl-k">Organización</span><span class="carg-modal__dl-v">${esc(a.organizacion)}</span></div>` : ''}

  /* ═══ Panel "Deportistas inscritos" con filtros + eliminar (#2, #5) —
     reemplaza a "archivos cargados" en la pestaña Inscripciones ═══ */
  let inscFilter = { deporte: '', prueba: '', q: '' };
  const ICON_EDIT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>';
  const inscRowHTML = (r) => `<tr>
      <td>${esc(r.nombre)}</td><td>${esc(rosterDoc(r))}</td><td>${esc(r.deporte || '—')}</td>
      <td>${esc(r.prueba || '—')}</td><td>${esc(r.organizacion || '—')}</td><td>${esc(r.correo || '—')}</td>
      <td style="text-align:right;white-space:nowrap"><button class="carg-insc-edit" type="button" data-edit="${esc(r.id)}" aria-label="Editar inscripción" title="Editar">${ICON_EDIT}</button><button class="carg-insc-del" type="button" data-del="${esc(r.id)}" aria-label="Eliminar inscripción" title="Eliminar">${I.trash}</button></td>

  function mountInscritosPanel() {
    const mount = document.getElementById('filesMount');
    if (!mount) return;
    const all = effectiveRoster(ev);
    const deportes = [...new Set(all.map((r) => r.deporte).filter(Boolean))].sort();
    const pruebas = [...new Set(all.filter((r) => !inscFilter.deporte || r.deporte === inscFilter.deporte).map((r) => r.prueba).filter(Boolean))].sort();
    const applyFilter = () => all.filter((r) => (!inscFilter.deporte || r.deporte === inscFilter.deporte) && (!inscFilter.prueba || r.prueba === inscFilter.prueba) && (!inscFilter.q.trim() || `${r.nombre} ${rosterDoc(r)} ${r.correo || ''}`.toLowerCase().includes(inscFilter.q.trim().toLowerCase())));
    const filtered = applyFilter();
    const emptyRow = '<tr><td colspan="7" style="padding:22px;text-align:center;color:var(--text-muted);font-size:13px">Sin inscritos que coincidan con el filtro.</td></tr>';
    mount.innerHTML = `
      <div class="carg-files">
        <div class="carg-files__title">${I.users} Deportistas inscritos <span class="carg-insc-count">(${all.length})</span></div>
        ${all.length ? `
        <div class="carg-insc-filters">
          <div class="naowee-dropdown naowee-dropdown--small" data-dd="fDeporte"><button type="button" class="naowee-dropdown__trigger" aria-haspopup="listbox"><span class="naowee-dropdown__value ${inscFilter.deporte ? '' : 'is-placeholder'}" data-dd-val>${esc(inscFilter.deporte || 'Todos los deportes')}</span><span class="naowee-dropdown__chevron">${I.chevD}</span></button><div class="naowee-dropdown__menu" role="listbox"></div></div>
          <div class="naowee-dropdown naowee-dropdown--small" data-dd="fPrueba"><button type="button" class="naowee-dropdown__trigger" aria-haspopup="listbox"><span class="naowee-dropdown__value ${inscFilter.prueba ? '' : 'is-placeholder'}" data-dd-val>${esc(inscFilter.prueba || 'Todas las competencias')}</span><span class="naowee-dropdown__chevron">${I.chevD}</span></button><div class="naowee-dropdown__menu" role="listbox"></div></div>
          <div class="naowee-searchbox naowee-searchbox--small" id="fSearch"><div class="naowee-searchbox__input-wrap"><span class="naowee-searchbox__icon">${I.search}</span><input class="naowee-searchbox__input" type="search" id="fInput" placeholder="Documento, correo o nombre…" value="${esc(inscFilter.q)}" autocomplete="off"><button class="naowee-searchbox__clear" id="fClear" type="button" aria-label="Limpiar">${I.x}</button></div></div>
        </div>
        <div class="carg-data-scroll">
          <table class="naowee-table--in-card">
            <thead><tr><th>Deportista</th><th>Documento</th><th>Deporte</th><th>Competencia</th><th>Organización</th><th>Correo</th><th></th></tr></thead>
            <tbody id="inscTbody">${filtered.length ? filtered.map(inscRowHTML).join('') : emptyRow}</tbody>
          </table>
        </div>` : `
        <div class="empty-state">
          <div class="empty-state__icon">${I.users}</div>
          <p class="empty-state__title">Aún no hay deportistas inscritos</p>
          <p class="empty-state__desc">Inscribe deportistas (individual o masivo) y aparecerán aquí, con filtros por deporte, competencia, documento y correo.</p>
        </div>`}
      </div>`;
    const bindDel = () => mount.querySelectorAll('[data-del]').forEach((b) => b.addEventListener('click', () => {
      const id = b.dataset.del, r = all.find((x) => x.id === id);
      confirmDialog({ title: 'Eliminar inscripción', message: `¿Eliminar a <strong>${esc(r ? r.nombre : '')}</strong> de las inscripciones de este evento?`, confirmLabel: 'Eliminar', onConfirm: () => { removeInscrito(selectedEventId, id); flash('Inscripción eliminada.'); mountInscritosPanel(); } });
    }));
    const bindEdit = () => mount.querySelectorAll('[data-edit]').forEach((b) => b.addEventListener('click', () => {
