    setupDropdown(mount.querySelector('[data-dd="fPrueba"]'), [{ value: '', label: 'Todas las competencias' }, ...pruebas.map((p) => ({ value: p, label: p }))], () => inscFilter.prueba, (v) => { inscFilter.prueba = v; mountInscritosPanel(); });
    const inp = mount.querySelector('#fInput'), box = mount.querySelector('#fSearch');
    box.classList.toggle('naowee-searchbox--has-value', inscFilter.q.length > 0);
    inp.addEventListener('input', () => {
      inscFilter.q = inp.value; box.classList.toggle('naowee-searchbox--has-value', inp.value.length > 0);
      const tb = mount.querySelector('#inscTbody'); const f2 = applyFilter();
      tb.innerHTML = f2.length ? f2.map(inscRowHTML).join('') : emptyRow; bindDel(); bindEdit();
    });
    mount.querySelector('#fClear').addEventListener('click', () => { inscFilter.q = ''; mountInscritosPanel(); });
    bindDel(); bindEdit();
  }

  /* Modal de EDICIÓN de un inscrito (feedback Doug: lápiz junto al borrar). Reusa los
     builders de campo canónicos + cascada Deporte→Prueba; persiste vía updateInscrito. */
  function editInscritoModal(r) {
    const draft = { tipoDoc: r.tipoDoc || '', nroDoc: r.nroDoc || '', nombre: r.nombre || '', sexo: r.sexo || '', deporte: r.deporte || '', prueba: r.prueba || '', organizacion: r.organizacion || '', depto: r.depto || '', correo: r.correo || '' };
    const baseline = JSON.stringify(draft);
    document.getElementById('cargEdit')?.remove();
    const el = document.createElement('div');
    el.className = 'carg-modal-overlay'; el.id = 'cargEdit';
    el.innerHTML = `
      <div class="carg-modal carg-modal--wide" role="dialog" aria-modal="true" aria-labelledby="cargEditTitle">
        <div class="carg-modal__head">
          <h3 class="carg-modal__title" id="cargEditTitle">Editar inscripción</h3>
          <button class="carg-modal__close" type="button" data-close aria-label="Cerrar">${I.x}</button>
        </div>
        <div class="carg-modal__body">
          <div class="carg-edit-grid">
            ${ddFieldHTML('tipoDoc', 'Tipo de documento', 'Selecciona…', true)}
            ${tfFieldHTML('nroDoc', 'Número de documento', 'Ej: 1052342871', true)}
            ${tfFieldHTML('nombre', 'Nombres y apellidos', '', true, true)}
            ${ddFieldHTML('deporte', 'Deporte', 'Selecciona…', true)}
            ${ddFieldHTML('prueba', 'Prueba (competencia)', 'Selecciona…', true)}
            ${ddFieldHTML('sexo', 'Sexo', 'Selecciona…', true)}
            ${ddFieldHTML('organizacion', 'Organización', 'Busca la liga/club…', false)}
            ${ddFieldHTML('depto', 'Departamento', 'Selecciona…', false)}
            ${tfFieldHTML('correo', 'Correo electrónico', 'nombre@correo.com', true)}
          </div>
        </div>
        <div class="carg-modal__foot">
          <button class="naowee-btn naowee-btn--ghost" type="button" data-close>Cancelar</button>
          <button class="naowee-btn naowee-btn--loud" type="button" id="cargEditSave" disabled>${I.check} Guardar cambios</button>
        </div>
      </div>`;
    document.body.appendChild(el);
    void el.offsetWidth; el.classList.add('is-open');
    const saveBtn = el.querySelector('#cargEditSave');
    const REQUIRED = ['tipoDoc', 'nroDoc', 'nombre', 'sexo', 'deporte', 'prueba', 'correo'];
    /* Guardar arranca disabled: solo se habilita con cambio REAL y requeridos completos. */
    const syncSave = () => { saveBtn.disabled = !REQUIRED.every((k) => (draft[k] || '').trim() !== '') || JSON.stringify(draft) === baseline; };
    el.querySelectorAll('[data-tf]').forEach((wrap) => {
      const name = wrap.dataset.tf; const inp = wrap.querySelector('.naowee-textfield__input');
      inp.value = draft[name] || ''; if (draft[name]) wrap.classList.add('naowee-textfield--active');
      inp.addEventListener('input', () => { draft[name] = inp.value; wrap.classList.toggle('naowee-textfield--active', inp.value.length > 0); syncSave(); });
    });
    setupDropdown(el.querySelector('[data-dd="tipoDoc"]'), TIPOS_DOC, () => draft.tipoDoc, (v) => { draft.tipoDoc = v; syncSave(); });
    setupDropdown(el.querySelector('[data-dd="sexo"]'), SEXOS, () => draft.sexo, (v) => { draft.sexo = v; syncSave(); });
    let ddPrueba = null;
    setupDropdown(el.querySelector('[data-dd="deporte"]'), DEPORTES_LIST, () => draft.deporte, (v) => { draft.deporte = v; draft.prueba = ''; if (ddPrueba) ddPrueba.reset(); syncSave(); });
    ddPrueba = setupDropdown(el.querySelector('[data-dd="prueba"]'), () => pruebasFor(draft.deporte), () => draft.prueba, (v) => { draft.prueba = v; syncSave(); });
    setupDropdown(el.querySelector('[data-dd="organizacion"]'), ORGS_LIST, () => draft.organizacion, (v) => { draft.organizacion = v; syncSave(); });
    setupDropdown(el.querySelector('[data-dd="depto"]'), DEPTOS_LIST, () => draft.depto, (v) => { draft.depto = v; syncSave(); });
    const setDD = (name, val, opts) => { if (!val) return; const dd = el.querySelector(`[data-dd="${name}"]`); if (!dd) return; const o = (typeof opts === 'function' ? opts() : opts).find((x) => x.value === val); const vEl = dd.querySelector('.naowee-dropdown__value'); vEl.textContent = o ? o.label : val; vEl.classList.remove('is-placeholder'); };
    setDD('tipoDoc', draft.tipoDoc, TIPOS_DOC); setDD('sexo', draft.sexo, SEXOS); setDD('deporte', draft.deporte, DEPORTES_LIST);
    setDD('prueba', draft.prueba, () => pruebasFor(draft.deporte)); setDD('organizacion', draft.organizacion, ORGS_LIST); setDD('depto', draft.depto, DEPTOS_LIST);
    function onEsc(e) { if (e.key === 'Escape') close(); }
    function close() { el.classList.remove('is-open'); document.removeEventListener('keydown', onEsc); setTimeout(() => el.remove(), 240); }
    el.querySelectorAll('[data-close]').forEach((b) => b.addEventListener('click', close));
    el.addEventListener('click', (e) => { if (e.target === el) close(); });
    document.addEventListener('keydown', onEsc);
    syncSave();
    saveBtn.addEventListener('click', () => {
      const patch = { tipoDoc: draft.tipoDoc, nroDoc: (draft.nroDoc || '').trim(), nombre: (draft.nombre || '').trim(), sexo: draft.sexo, deporte: draft.deporte, prueba: draft.prueba, organizacion: draft.organizacion || '', depto: draft.depto || '', correo: (draft.correo || '').trim() };
      const ok = updateInscrito(selectedEventId, r.id, patch);
      if (!ok) { flash('Ya hay un inscrito con ese documento en ese deporte.', 'error'); return; }   // conflicto → el modal sigue abierto para corregir
      close();
      flash(`✓ ${patch.nombre} actualizado.`, 'success');
      mountInscritosPanel();
    });
  }

  /* ── Modo manual Inscripciones: búsqueda SUID + registro (confirmación directa) ── */
  function renderManualSearch(container, cfg) {
    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Inscripción individual</h3>
          <p class="carg-card__sub">Busca el deportista en el SUID o regístralo como nuevo. Confirmas y queda inscrito en el evento al instante.</p>
        </div></div>
        <div class="carg-manual-search">
          <div class="carg-search-row">
            <div class="naowee-searchbox" id="athleteSearch" style="max-width:460px;flex:1 1 260px">
              <div class="naowee-searchbox__input-wrap">
                <span class="naowee-searchbox__icon">${I.search}</span>
                <input class="naowee-searchbox__input" type="search" id="athleteInput" placeholder="Nombre o número de documento…" autocomplete="off">
                <button class="naowee-searchbox__clear" id="athleteClear" type="button" aria-label="Limpiar búsqueda">${I.x}</button>
              </div>
            </div>
            <button class="naowee-btn naowee-btn--ghost naowee-btn--sm" id="searchBtn" type="button">${I.search} Buscar</button>

  function bindManualSearch(cfg) {
    const input = document.getElementById('athleteInput');
    const clear = document.getElementById('athleteClear');
    const searchBox = document.getElementById('athleteSearch');
    const results = document.getElementById('athleteResults');
    const searchBtn = document.getElementById('searchBtn');
    const newBtn = document.getElementById('newAthleteBtn');
    const formEl = document.getElementById('newAthleteForm');
    const docOf = (a) => `${a.tipoDoc} ${a.nroDoc}`;

    function performSearch() {
      const q = input.value.trim().toLowerCase();
      searchBox.classList.toggle('naowee-searchbox--has-value', q.length > 0);
      if (!q) { results.innerHTML = ''; return; }
      const matches = MOCK_ROWS.inscripciones.valid.filter((a) => a.nombre.toLowerCase().includes(q) || docOf(a).toLowerCase().includes(q));
      if (matches.length === 0) {
        results.innerHTML = `<div class="carg-athlete-empty">${I.inbox}<span>No se encontró ningún deportista con "<strong>${esc(q)}</strong>" en el SUID. Puedes registrarlo como nuevo.</span></div>`;
        return;
      }
      results.innerHTML = `
        <div class="carg-athlete-list">
          ${matches.map((a) => `
            <div class="carg-athlete-row">
              <div class="carg-athlete-row__ava">${a.nombre.split(' ').slice(0,2).map((w)=>w[0]).join('')}</div>
              <div class="carg-athlete-row__info">
                <div class="carg-athlete-row__name">${esc(a.nombre)}</div>
                <div class="carg-athlete-row__doc">${esc(docOf(a))} · ${esc(a.deporte)} · ${esc(a.depto)}</div>
              </div>
              <div class="carg-athlete-row__btn"><button class="naowee-btn naowee-btn--loud naowee-btn--sm agregar-btn" type="button">${I.userPlus} Inscribir</button></div>
            </div>`).join('')}
        </div>`;
      results.querySelectorAll('.agregar-btn').forEach((btn, idx) => {
        btn.addEventListener('click', () => {
          const a = matches[idx];
          /* SUID trae identidad + deporte; falta la PRUEBA (y organización en nacional).
             Se pre-llena el form de registro para completarlas y confirmar (#4). */
          const parts = String(a.nombre || '').split(/\s+/).filter(Boolean);
          const pn = parts[0] || '', sa = parts.length > 1 ? parts[parts.length - 1] : '';
          const pa = parts.length > 2 ? parts[parts.length - 2] : (parts.length === 2 ? parts[1] : '');
          const sn = parts.length > 3 ? parts.slice(1, parts.length - 2).join(' ') : '';
          openNewForm(cfg, document.getElementById('newAthleteForm'), { origen: 'SUID', tipoDoc: a.tipoDoc, nroDoc: a.nroDoc, sexo: a.sexo, pn, sn, pa, sa, deporte: a.deporte, depto: a.depto, correo: a.correo || '' });
        });
      });
    }

    searchBtn.addEventListener('click', performSearch);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });
    clear.addEventListener('click', () => { input.value = ''; results.innerHTML = ''; searchBox.classList.remove('naowee-searchbox--has-value'); input.focus(); });

    newBtn.addEventListener('click', () => {
      if (formEl.hasAttribute('hidden')) openNewForm(cfg, formEl);
      else { formEl.setAttribute('hidden', ''); formEl.innerHTML = ''; newDraft = {}; }
    });
  }

  function openNewForm(cfg, formEl, prefill = {}) {
    newDraft = {};
    const nacional = ev.alcance !== 'internacional';   /* organización obligatoria solo en nacional (#3) */
    /* La inscripción se limita a los DEPORTES asociados al evento (feedback Doug): si el
       ADMIN configuró el catálogo (ev.deportes), solo esos aparecen; si es UNO, queda FIJO
       (sin opción de cambiarlo). Sin catálogo configurado → fallback al catálogo completo. */
    const evCat = Array.isArray(ev && ev.deportes) ? ev.deportes : [];
    /* label SIN emoji: el dropdown ya pinta o.emoji aparte (si se incluye en el label → emoji doble). */
    const depList = evCat.length ? evCat.map((d) => ({ value: d.deporte, label: d.deporte, emoji: d.emoji || '' })) : DEPORTES_LIST;
    const pruebasForEv = (dep) => { if (evCat.length) { const d = evCat.find((x) => x.deporte === dep); return ((d && d.competencias) || []).map((p) => ({ value: p, label: p })); } return pruebasFor(dep); };
    const lockedDep = evCat.length === 1 ? evCat[0].deporte : null;
    if (lockedDep) newDraft.deporte = lockedDep;
    /* Organización se limita a las ORGANIZACIONES INVITADAS del evento (feedback Doug):
       si el ADMIN invitó organizaciones, solo esas; si es UNA, queda FIJA. Sin invitadas
       → fallback al catálogo general de ligas/clubes. Solo aplica en eventos nacionales. */
    const evOrgs = Array.isArray(ev && ev.organizaciones) ? ev.organizaciones : [];
    const orgList = (nacional && evOrgs.length) ? evOrgs.map((o) => ({ value: o.nombre, label: o.nombre })) : ORGS_LIST;
    const lockedOrg = (nacional && evOrgs.length === 1) ? evOrgs[0].nombre : null;
    if (lockedOrg) newDraft.organizacion = lockedOrg;
    formEl.removeAttribute('hidden');
    formEl.innerHTML = `
      <div class="carg-newform__inner">
        <div class="carg-newform__head">
          <span class="carg-newform__ico">${I.userPlus}</span>
          <div>
            <h4 class="carg-newform__title">${prefill.origen === 'SUID' ? 'Deportista del SUID' : 'Registrar nuevo deportista'}</h4>
            <p class="carg-newform__sub">${prefill.origen === 'SUID' ? 'Datos traídos del SUID; complétalos y confirma la inscripción.' : 'Crea el deportista y queda inscrito en el evento al instante.'}</p>
          </div>
        </div>
        <div class="carg-newform__grid">
          ${ddFieldHTML('tipoDoc', 'Tipo de documento', 'Selecciona…', true)}
          ${tfFieldHTML('nroDoc', 'Número de documento', 'Ej: 1052342871', true)}
          ${ddFieldHTML('sexo', 'Sexo', 'Selecciona…', true)}
          ${tfFieldHTML('pn', 'Primer nombre', '', true)}
          ${tfFieldHTML('sn', 'Segundo nombre', '', false)}
          ${tfFieldHTML('pa', 'Primer apellido', '', true)}
          ${tfFieldHTML('sa', 'Segundo apellido', '', false)}
          ${lockedDep
            ? `<div class="carg-field"><label class="naowee-textfield__label naowee-textfield__label--required">Deporte</label><div class="carg-eq-fixed">${esc((evCat[0].emoji ? evCat[0].emoji + ' ' : '') + lockedDep)}</div></div>`
            : ddFieldHTML('deporte', 'Deporte', 'Selecciona…', true)}
          ${ddFieldHTML('prueba', 'Prueba (competencia)', 'Selecciona la prueba…', true)}
          ${nacional ? (lockedOrg
            ? `<div class="carg-field"><label class="naowee-textfield__label naowee-textfield__label--required">Organización</label><div class="carg-eq-fixed">${esc(lockedOrg)}</div></div>`
            : ddFieldHTML('organizacion', 'Organización', evOrgs.length ? 'Selecciona la organización…' : 'Busca la liga/club…', true)) : ''}
          ${ddFieldHTML('depto', 'Departamento (opcional)', 'Selecciona…', false)}
          ${tfFieldHTML('correo', 'Correo electrónico', 'nombre@correo.com', true, true)}
        </div>
        <div class="carg-newform__foot">
          <button class="naowee-btn naowee-btn--ghost naowee-btn--sm" type="button" id="newCancel">Cancelar</button>
          <button class="naowee-btn naowee-btn--loud naowee-btn--sm" type="button" id="newAdd" disabled>${I.check} Inscribir deportista</button>
        </div>
      </div>`;

    const addBtn = formEl.querySelector('#newAdd');
    /* Departamento OPCIONAL; Prueba, Correo y (nacional) Organización OBLIGATORIOS. */
    const REQUIRED = ['tipoDoc', 'nroDoc', 'pn', 'pa', 'sexo', 'deporte', 'prueba', 'correo'].concat(nacional ? ['organizacion'] : []);
    function syncAdd() { addBtn.disabled = !REQUIRED.every((k) => (newDraft[k] || '').trim() !== ''); }

    formEl.querySelectorAll('[data-tf]').forEach((wrap) => {
      const name = wrap.dataset.tf;
      const inp = wrap.querySelector('.naowee-textfield__input');
      inp.addEventListener('input', () => { newDraft[name] = inp.value; wrap.classList.toggle('naowee-textfield--active', inp.value.length > 0); syncAdd(); });
    });
    setupDropdown(formEl.querySelector('[data-dd="tipoDoc"]'), TIPOS_DOC, () => newDraft.tipoDoc, (v) => { newDraft.tipoDoc = v; syncAdd(); });
    setupDropdown(formEl.querySelector('[data-dd="sexo"]'), SEXOS, () => newDraft.sexo, (v) => { newDraft.sexo = v; syncAdd(); });
    /* Deporte → resetea la prueba (cascada); Prueba lee sus opciones del deporte elegido. */
    let ddPrueba = null;
    if (!lockedDep) setupDropdown(formEl.querySelector('[data-dd="deporte"]'), depList, () => newDraft.deporte, (v) => { newDraft.deporte = v; newDraft.prueba = ''; if (ddPrueba) ddPrueba.reset(); syncAdd(); });
    ddPrueba = setupDropdown(formEl.querySelector('[data-dd="prueba"]'), () => pruebasForEv(newDraft.deporte), () => newDraft.prueba, (v) => { newDraft.prueba = v; syncAdd(); });
    if (nacional && !lockedOrg) setupDropdown(formEl.querySelector('[data-dd="organizacion"]'), orgList, () => newDraft.organizacion, (v) => { newDraft.organizacion = v; syncAdd(); });
    setupDropdown(formEl.querySelector('[data-dd="depto"]'), DEPTOS_LIST, () => newDraft.depto, (v) => { newDraft.depto = v; syncAdd(); });

    /* Pre-llenado (p.ej. desde el SUID): setea valores + etiquetas de dropdown. */
    const setDD = (name, val, opts) => {
      if (!val) return; newDraft[name] = val;
      const dd = formEl.querySelector(`[data-dd="${name}"]`); if (!dd) return;
      const o = (typeof opts === 'function' ? opts() : opts).find((x) => x.value === val);
      const vEl = dd.querySelector('.naowee-dropdown__value'); if (!vEl) return; vEl.textContent = o ? o.label : val; vEl.classList.remove('is-placeholder');
    };
    ['nroDoc', 'pn', 'sn', 'pa', 'sa', 'correo'].forEach((k) => {
      if (!prefill[k]) return; newDraft[k] = prefill[k];
      const wrap = formEl.querySelector(`[data-tf="${k}"]`); if (wrap) { const inp = wrap.querySelector('.naowee-textfield__input'); inp.value = prefill[k]; wrap.classList.add('naowee-textfield--active'); }
    });
    setDD('tipoDoc', prefill.tipoDoc, TIPOS_DOC); setDD('sexo', prefill.sexo, SEXOS);
    if (!lockedDep) setDD('deporte', prefill.deporte, depList);
    setDD('depto', prefill.depto, DEPTOS_LIST);
    /* Deporte fijo con una sola competencia → pre-selecciona la prueba. */
    if (lockedDep) { const ps = pruebasForEv(lockedDep); if (ps.length === 1) setDD('prueba', ps[0].value, () => pruebasForEv(lockedDep)); }
    if (nacional && !lockedOrg && (!evOrgs.length || evOrgs.some((o) => o.nombre === prefill.organizacion))) setDD('organizacion', prefill.organizacion, orgList);
    syncAdd();

    formEl.querySelector('#newCancel').addEventListener('click', () => { formEl.setAttribute('hidden', ''); formEl.innerHTML = ''; newDraft = {}; });
    addBtn.addEventListener('click', () => {
      const nombre = [newDraft.pn, newDraft.sn, newDraft.pa, newDraft.sa].filter(Boolean).join(' ').replace(/\s+/g, ' ').trim();
      const athlete = {
        tipoDoc: newDraft.tipoDoc, nroDoc: (newDraft.nroDoc || '').trim(), nombre,
        sexo: newDraft.sexo, deporte: newDraft.deporte, prueba: newDraft.prueba,
        depto: newDraft.depto || '', organizacion: newDraft.organizacion || '', correo: (newDraft.correo || '').trim(),
        origen: prefill.origen || 'Nuevo'
      };
      formEl.setAttribute('hidden', ''); formEl.innerHTML = ''; newDraft = {};
      confirmInscripcion(athlete);
    });
  }

  /* Ranking manual (nacional) con BUSCADOR por deporte/nombre + PAGINADOR
     (feedback Juanma). Estado por fila para preservar posición/marca al filtrar/paginar. */
  const ICON_CHEVR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  function renderManualGrid(container, cfg) {
    /* Los atletas de conjunto no reciben posición individual: se excluyen y van a Equipos. */
    const fullRoster = effectiveRoster(ev);
    const all = fullRoster.filter((r) => !isConjuntoDeporte(r.deporte));
    const hasConjunto = fullRoster.some((r) => isConjuntoDeporte(r.deporte));
    if (!all.length) { if (hasConjunto) { conjuntoOnlyState(container, 'ranking'); return; } rosterEmptyState(container, 'Los resultados'); return; }
    const conjNote = hasConjunto ? `<div class="naowee-message naowee-message--caution" style="margin-bottom:12px"><div class="naowee-message__header"><span class="naowee-message__icon">${I.bang}</span><span class="naowee-message__body">Este evento incluye <strong>deportes de conjunto</strong>: sus resultados se registran en el modo <strong>Equipos · conjunto</strong> (arriba), no aquí por deportista.</span></div></div>` : '';
    const PAGE_SIZE = 6;
    const state = {};   // id -> { posicion, marca }
    let page = 1, q = '';
    const rowHTML = (r) => {
      const st = state[r.id] || {};
      const rm = resultMeta(r.deporte, r.prueba);
      return `<div class="carg-manual-row g-ranking" data-id="${r.id}">
        <div><div class="carg-manual-row__name">${esc(r.nombre)}</div><div class="carg-manual-row__doc">${rosterSub(r)}</div></div>
        <input class="carg-manual-input" type="number" min="1" placeholder="—" data-field="posicion" data-id="${r.id}" value="${esc(st.posicion || '')}">
        <input class="carg-manual-input" type="text" placeholder="${esc(rm.ph)}" data-field="marca" data-id="${r.id}" value="${esc(st.marca || '')}" title="${esc(rm.label)}">
      </div>`;
    };
    container.innerHTML = `
      <div class="carg-card">
        <div class="carg-card__head"><div>
          <h3 class="carg-card__title">Captura manual — ${esc(cfg.label)}</h3>
          <p class="carg-card__sub">Filtra por deporte o nombre y registra posición y resultado para cada inscrito.${sampleNote(all.length)}</p>
        </div></div>
        ${conjNote}
        <div class="carg-search-row" style="margin-bottom:12px">
          <div class="naowee-searchbox" id="rkSearch" style="max-width:480px;flex:1 1 260px">
            <div class="naowee-searchbox__input-wrap">
              <span class="naowee-searchbox__icon">${I.search}</span>
              <input class="naowee-searchbox__input" type="search" id="rkInput" placeholder="Buscar por deporte, prueba o nombre…" autocomplete="off">
              <button class="naowee-searchbox__clear" id="rkClear" type="button" aria-label="Limpiar búsqueda">${I.x}</button>
            </div>
          </div>
        </div>
        <div class="carg-manual-grid">
          <div class="carg-manual-grid__header g-ranking"><span>Deportista</span><span>Posición</span><span>Resultado</span></div>
          <div id="rkRows"></div>
        </div>
        <div class="carg-rk-foot">
          <div class="carg-rk-pager" id="rkPager"></div>
          <div class="carg-rk-actions">
            <span class="carg-rk-dupwarn" id="rkDupWarn" hidden>⚠ Posiciones repetidas en una misma competencia.</span>
            <button class="naowee-btn naowee-btn--loud" id="manualSaveBtn" disabled>${I.check} Guardar ${esc(cfg.labelShort.toLowerCase())}</button>
          </div>
        </div>
      </div>`;
    const rowsEl = container.querySelector('#rkRows');
    const pagerEl = container.querySelector('#rkPager');
    const saveBtn = container.querySelector('#manualSaveBtn');
    const input = container.querySelector('#rkInput');
    const searchBox = container.querySelector('#rkSearch');
    const filtered = () => { const t = q.trim().toLowerCase(); return t ? all.filter((r) => `${r.nombre} ${r.deporte} ${r.prueba || ''} ${rosterDoc(r)}`.toLowerCase().includes(t)) : all; };
    const entered = () => Object.values(state).filter((s) => String(s.posicion || '').trim() || String(s.marca || '').trim()).length;
    /* Posiciones NO se repiten dentro de una misma competencia (deporte + prueba) (#6). */
    const compKey = (r) => `${(r.deporte || '').toLowerCase()}·${(r.prueba || '').toLowerCase()}`;
    const dupIds = () => {
      const byComp = {};
      all.forEach((r) => { const s = state[r.id]; if (!s) return; const p = String(s.posicion || '').trim(); if (!p) return; const ck = compKey(r); (byComp[ck] = byComp[ck] || {}); (byComp[ck][p] = byComp[ck][p] || []).push(r.id); });
      const dup = new Set();
      Object.values(byComp).forEach((pm) => Object.values(pm).forEach((ids) => { if (ids.length > 1) ids.forEach((id) => dup.add(id)); }));
      return dup;
    };
    const markDups = () => {
      const dup = dupIds();
      rowsEl.querySelectorAll('.carg-manual-input[data-field="posicion"]').forEach((inp) => inp.classList.toggle('carg-manual-input--dup', dup.has(inp.dataset.id)));
      const w = container.querySelector('#rkDupWarn'); if (w) w.hidden = dup.size === 0;
      return dup;
    };
    const syncSave = () => { const dup = markDups(); saveBtn.disabled = entered() === 0 || dup.size > 0; };
    function paint() {
      const f = filtered();
      const pages = Math.max(1, Math.ceil(f.length / PAGE_SIZE));
      if (page > pages) page = pages;
      const slice = f.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
      rowsEl.innerHTML = slice.length ? slice.map(rowHTML).join('') : '<div class="carg-empty-inline" style="padding:16px;color:var(--text-muted)">Sin resultados para esa búsqueda.</div>';
      rowsEl.querySelectorAll('.carg-manual-input').forEach((inp) => inp.addEventListener('input', () => {
        const id = inp.dataset.id, fld = inp.dataset.field;
        state[id] = state[id] || {}; state[id][fld] = inp.value; syncSave();
      }));
      pagerEl.innerHTML = pages > 1
        ? `<button class="carg-pg-btn" id="rkPrev" ${page === 1 ? 'disabled' : ''} aria-label="Anterior">${I.chevL}</button>
           <span class="carg-pg-info">Página ${page} de ${pages} · ${f.length} deportistas</span>
           <button class="carg-pg-btn" id="rkNext" ${page === pages ? 'disabled' : ''} aria-label="Siguiente">${ICON_CHEVR}</button>`
        : `<span class="carg-pg-info">${f.length} deportista${f.length !== 1 ? 's' : ''}</span>`;
      pagerEl.querySelector('#rkPrev')?.addEventListener('click', () => { if (page > 1) { page--; paint(); } });
      pagerEl.querySelector('#rkNext')?.addEventListener('click', () => { if (page < pages) { page++; paint(); } });
      markDups();
    }
    paint(); syncSave();
    input.addEventListener('input', () => { q = input.value; page = 1; searchBox.classList.toggle('naowee-searchbox--has-value', q.length > 0); paint(); });
    container.querySelector('#rkClear').addEventListener('click', () => { input.value = ''; q = ''; searchBox.classList.remove('naowee-searchbox--has-value'); paint(); input.focus(); });
    saveBtn.addEventListener('click', () => {
      if (dupIds().size) { flash('Corrige las posiciones repetidas antes de guardar.', 'error'); return; }
      const filled = all.filter((r) => { const s = state[r.id] || {}; return String(s.posicion || '').trim() || String(s.marca || '').trim(); });
      const n = filled.length;
      if (!n) return;
      saveBtn.disabled = true;   // evita doble guardado
      const ts = nowStamp();
      applyUpload(selectedEventId, cfg.storeTipo, n);
      addUploadRecord(selectedEventId, { tipo: cfg.label, n, modeLabel: 'Manual', timestamp: ts });
      addFileVersion(selectedEventId, cfg.storeTipo, {
        fileName: `${cfg.label} manual`, n, modeLabel: 'Manual', timestamp: ts,
        columns: RANK_COLS,
        rows: filled.map((r) => { const s = state[r.id] || {}; return { organizacion: r.organizacion || '—', deportista: r.nombre || '—', deporte: r.deporte || '—', prueba: r.prueba || '—', posicion: s.posicion || '—', marca: s.marca || '—' }; })
      });
      /* Liga con Medallería: registra la posición por persona+competencia → la
         medallería solo permitirá la medalla que corresponde al puesto. */
      if (cfg.storeTipo === 'res') filled.forEach((r) => { const s = state[r.id] || {}; const pos = String(s.posicion || '').trim(); if (pos) setResultPosition(selectedEventId, { nroDoc: r.nroDoc, deporte: r.deporte, prueba: r.prueba, posicion: pos, deportista: r.nombre }); });
      flash(`✓ ${n} ${cfg.labelShort.toLowerCase()}${n !== 1 ? 's' : ''} guardada${n !== 1 ? 's' : ''} correctamente.`, 'success');
      renderTabPanel();   // resetea el estado y muestra la nueva versión en "Archivos cargados"
    });
  }

  /* ═══ ARCHIVOS CARGADOS — versiones + tabla con columnas de la planilla ═══ */
  function filesHTML() {
    const cfg = TIPO_CFG[activeTipo];
    const versions = getFileVersions(selectedEventId, cfg.storeTipo);
    if (versions.length === 0) {
      return `
        <div class="carg-files">
          <div class="carg-files__title">${I.layers} Cargas realizadas <span class="carg-files__count">(0)</span></div>
          <div class="empty-state">
            <div class="empty-state__icon">${I.fileSheet}</div>
            <p class="empty-state__title">Aún no hay cargas</p>
            <p class="empty-state__desc">Cuando cargues ${esc(cfg.label.toLowerCase())} (masivo o manual), aquí verás cada carga con su data en tabla.</p>
          </div>
        </div>`;
    }
    return `
      <div class="carg-files">
        <div class="carg-files__title">${I.layers} Cargas realizadas <span class="carg-files__count">(${versions.length})</span></div>
        <div class="carg-files__list">
          ${versions.map((v, i) => fileCardHTML(v, i === 0)).join('')}
        </div>
      </div>`;
  }

  function fileCardHTML(v, open) {
    return `
      <div class="carg-file ${open ? 'is-open' : ''}" data-file data-ver="${v.version}">
        <button class="carg-file__head" type="button" aria-expanded="${open ? 'true' : 'false'}">
          <span class="carg-file__ico">${I.fileSheet}</span>
          <span class="carg-file__meta">
            <span class="carg-file__name"><span class="carg-file__name-txt">${esc(v.fileName)}</span></span>
            <span class="carg-file__sub"><span class="carg-file__n">${v.n} registro${v.n !== 1 ? 's' : ''}</span><span>·</span><span>${esc(v.timestamp)}</span></span>
          </span>
          <span class="carg-file__chev">${I.chevD}</span>
        </button>
        <div class="carg-file__body">
          ${fileTableHTML(v)}
        </div>
      </div>`;
  }

  /* Editable = evento no finalizado (gateOpen). Cada fila lleva editar/borrar. */
  function fileTableHTML(v) {
    const cols = v.columns || [];
    const rows = v.rows || [];
    const actTh = gateOpen ? '<th class="carg-file__acts-th" aria-label="Acciones"></th>' : '';
    const thead = cols.map((c) => `<th class="${c.num ? 'num' : ''}">${c.l}</th>`).join('') + actTh;
    const tbody = rows.map((row, i) => `
      <tr data-row="${i}">${cols.map((c) => `<td class="${c.num ? 'num' : ''}" data-col="${esc(c.k)}">${esc(row[c.k] ?? '—')}</td>`).join('')}${gateOpen ? `<td class="carg-file__acts">
        <button type="button" class="carg-file__act" data-edit-row aria-label="Editar fila" title="Editar">${I.pencil}</button>
        <button type="button" class="carg-file__act carg-file__act--del" data-del-row aria-label="Borrar fila" title="Borrar">${I.trash}</button>
      </td>` : ''}</tr>
    `).join('');
    return `
      <div class="carg-data-scroll">
        <table class="naowee-table--in-card">
          <thead><tr>${thead}</tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
      <div class="carg-file__table-foot">${rows.length} fila${rows.length !== 1 ? 's' : ''} · ${cols.length} columnas de la plantilla. Desliza horizontalmente para ver todas.</div>`;
  }

  /* Re-render SOLO de "Cargas realizadas" (no toca el formulario de captura). */
  function remountFiles() {
    const m = document.getElementById('filesMount');
    if (!m) return;
    m.innerHTML = filesHTML();
    bindFiles();
  }
  /* Edición inline de una fila ya guardada: cada celda → input; guardar/cancelar. */
  function enterRowEdit(card, tr) {
    const ver = Number(card.dataset.ver), idx = Number(tr.dataset.row);
    const storeTipo = TIPO_CFG[activeTipo].storeTipo;
    const v = getFileVersions(selectedEventId, storeTipo).find((x) => x.version === ver);
    if (!v || !v.rows[idx]) return;
    const rowData = v.rows[idx];
    tr.querySelectorAll('td[data-col]').forEach((td) => {
      const k = td.dataset.col, val = rowData[k] == null ? '' : String(rowData[k]);
      td.innerHTML = `<input class="carg-file__edit-input" data-edit-col="${esc(k)}" value="${esc(val)}">`;
    });
    const acts = tr.querySelector('.carg-file__acts');
    if (acts) {
      acts.innerHTML = `<button type="button" class="carg-file__act carg-file__act--save" data-save-row title="Guardar">${I.check}</button><button type="button" class="carg-file__act" data-cancel-row title="Cancelar">${I.x}</button>`;
      acts.querySelector('[data-save-row]').addEventListener('click', () => {
        const patch = {};
        tr.querySelectorAll('[data-edit-col]').forEach((inp) => { patch[inp.dataset.editCol] = inp.value.trim(); });
        updateFileRow(selectedEventId, storeTipo, ver, idx, patch);
        remountFiles();
        flash('Fila actualizada.', 'success');
      });
      acts.querySelector('[data-cancel-row]').addEventListener('click', remountFiles);
      const first = tr.querySelector('.carg-file__edit-input'); if (first) first.focus();
    }
  }
  function bindFiles() {
    document.querySelectorAll('[data-file]').forEach((card) => {
      const head = card.querySelector('.carg-file__head');
      head?.addEventListener('click', () => {
        const open = card.classList.toggle('is-open');
        head.setAttribute('aria-expanded', String(open));
      });
      /* Acciones por fila (solo si el evento es editable: gateOpen). */
      card.querySelectorAll('[data-edit-row]').forEach((b) => b.addEventListener('click', (e) => { e.stopPropagation(); enterRowEdit(card, b.closest('tr')); }));
      card.querySelectorAll('[data-del-row]').forEach((b) => b.addEventListener('click', (e) => {
        e.stopPropagation();
        const tr = b.closest('tr'), ver = Number(card.dataset.ver), idx = Number(tr.dataset.row);
        if (!window.confirm('¿Borrar este registro de la carga? Se descontará del conteo del evento.')) return;
        removeFileRow(selectedEventId, TIPO_CFG[activeTipo].storeTipo, ver, idx);
        remountFiles();
        flash('Registro borrado.', 'success');
      }));
    });
  }

  /* ═══════════════════════════════════════════════════════════════
     OVERSIGHT — modo Admin (solo lectura, sin cambios funcionales)
     ═══════════════════════════════════════════════════════════════ */
  function renderOversight() {
    const tipo = TIPOS.includes(tipoParam) ? tipoParam : 'inscripciones';
    const cfg = TIPO_CFG[tipo];
    const app = document.getElementById('cargueApp');
    const storeKey = { inscripciones: 'insc', ranking: 'res', medalleria: 'med' }[tipo] || 'insc';
    const events = allEvents();

    function resolveGestor(e) {
      const gid = e.assignedGestorId || GESTOR_MAP[e.id];
      return GESTORES.find((g) => g.id === gid) || null;
    }
    function progPct(e) { const o = e[storeKey]; return (o && o.total) ? Math.round((o.done / o.total) * 100) : 0; }
    function progLabel(e) { const o = e[storeKey]; return (o && o.total) ? `${o.done} / ${o.total}` : '—'; }

    const rows = events.map((e, i) => {
      const gestor = resolveGestor(e);
      const p = progPct(e);
      const versions = getFileVersions(e.id, storeKey);
      const last = versions.length ? versions[0].timestamp : '—';
      const histId = `ov-hist-${i}`;
      return `
        <tr>
          <td data-label="Evento">
            <div class="ev-row__name">
              <span class="ev-row__emoji" aria-hidden="true">${esc(e.emoji)}</span>
              <div style="min-width:0"><div class="ev-row__nm">${esc(e.name)}</div><div class="ev-row__sport" style="font-size:11.5px">${esc(e.id)}</div></div>
            </div>
          </td>
          <td data-label="Estado"><span class="badge s-${e.status}">${STATUS_LABEL[e.status] || e.status}</span></td>
          <td class="ov-col-gestor" data-label="Gestor">
            ${gestor ? `<div class="ov-gestor-chip"><span class="ov-gestor-av" style="background:${esc(gestor.color)}">${esc(gestor.avatar)}</span><span class="ov-gestor-name">${esc(gestor.name)}</span></div>` : '<span style="color:var(--text-secondary);font-size:12px">Sin asignar</span>'}
          </td>
          <td class="ov-col-prog" data-label="Progreso"><div class="ov-prog-wrap"><div class="ov-prog-track"><div class="ov-prog-fill" style="width:${p}%"></div></div><span class="ov-prog-pct">${progLabel(e)}</span></div></td>
          <td class="ov-col-last" data-label="Último cargue"><span class="ov-last-cargue">${esc(last)}</span></td>
          <td data-label="Archivos" style="text-align:right">
            ${versions.length ? `<button type="button" class="ov-history-toggle" data-ev-id="${esc(e.id)}">Ver cargas (${versions.length})</button>` : '<span style="font-size:11.5px;color:var(--text-muted)">Sin cargues</span>'}
          </td>
        </tr>`;
    }).join('');

    app.innerHTML = `
      <div class="oversight-head">
        <div class="oversight-head__title"><h2>${esc(cfg.label)} · seguimiento</h2><p>Monitoreo de cargues por evento — lectura en vivo del progreso de cada gestor.</p></div>
      </div>
      <div class="naowee-table-card">
        <div class="naowee-table-card__table-wrap">
          <table class="naowee-table--in-card">
            <colgroup>
              <col style="min-width:200px"><col style="width:110px">
              <col class="ov-col-gestor" style="width:180px"><col class="ov-col-prog" style="width:180px">
              <col class="ov-col-last" style="width:140px"><col style="width:130px">
            </colgroup>
            <thead><tr>
              <th>Evento</th><th>Estado</th><th class="ov-col-gestor">Gestor asignado</th>
              <th class="ov-col-prog">Cargado · progreso</th><th class="ov-col-last">Último cargue</th><th style="text-align:right">Archivos</th>
            </tr></thead>
            <tbody>${events.length === 0 ? `<tr class="ov-empty-row"><td colspan="6">No hay eventos registrados.</td></tr>` : rows}</tbody>
          </table>
        </div>
      </div>
    `;
    app.querySelectorAll('.ov-history-toggle').forEach((btn) => {
      btn.addEventListener('click', () => openArchivosModal(btn.dataset.evId, cfg, storeKey));
    });
  }

  /* ─── Modal "Archivos cargados" (oversight) — timeline de versiones ─── */
  function ensureOvModal() {
    let overlay = document.getElementById('ovModalOverlay');
    if (overlay) return overlay;
    overlay = document.createElement('div');
    overlay.className = 'ov-modal-overlay';
    overlay.id = 'ovModalOverlay';
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.innerHTML = `
      <div class="ov-modal" role="document">
        <div class="ov-modal__head">
          <div><h3 data-ov-title>Cargas realizadas</h3><p data-ov-sub></p></div>
          <button type="button" class="ov-modal__close" aria-label="Cerrar">${I.x}</button>
        </div>
        <div class="ov-modal__body" data-ov-body></div>
      </div>`;
    document.body.appendChild(overlay);
    const close = () => { overlay.classList.remove('is-open'); document.body.style.overflow = ''; };
    overlay.querySelector('.ov-modal__close').addEventListener('click', close);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && overlay.classList.contains('is-open')) close(); });
    return overlay;
  }

  function openArchivosModal(eventId, cfg, storeKey) {
    const ev = allEvents().find((e) => e.id === eventId);
    if (!ev) return;
    const gid = ev.assignedGestorId || GESTOR_MAP[ev.id];
    const gestor = GESTORES.find((g) => g.id === gid) || null;
    const versions = getFileVersions(eventId, storeKey);
    const overlay = ensureOvModal();
    overlay.querySelector('[data-ov-title]').textContent = 'Cargas realizadas';
    overlay.querySelector('[data-ov-sub]').textContent = `${ev.name} · ${cfg.label}`;
    const whoHTML = gestor
      ? `<span class="carg-tl-who"><span class="carg-tl-av" style="background:${esc(gestor.color)}">${esc(gestor.avatar)}</span>${esc(gestor.name)}</span><span>·</span>`
      : '';
    const items = versions.map((v) => `
      <div class="carg-tl-item">
        <span class="carg-tl-dot" aria-hidden="true"></span>
        <div class="carg-tl-content">
          <div class="carg-tl-file"><span class="carg-tl-ico">${I.fileSheet}</span><span class="carg-tl-name">${esc(v.fileName)}</span></div>
          <div class="carg-tl-meta">${whoHTML}<span class="carg-tl-n">+${v.n} registro${v.n !== 1 ? 's' : ''}</span></div>
          <div class="carg-tl-time">${esc(v.timestamp)}</div>
        </div>
      </div>`).join('');
    overlay.querySelector('[data-ov-body]').innerHTML = versions.length
      ? `<div class="carg-timeline">${items}</div>`
      : `<div class="ov-modal__empty">Sin archivos cargados.</div>`;
    overlay.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }

  /* ─── Bootstrap ─── */
  /* Guard RBAC (feedback Danna 2026-06): los cargues los realiza SOLO el Gestor;
     ADMIN entra en modo oversight (lectura). Cualquier otro rol (Usuario del
     módulo, Organismo) NO accede a esta página → redirect a su home. */
  const CAN_ENTER_CARGUE = roleCode === 'GESTOR' || roleCode === 'ADMIN';
  if (!CAN_ENTER_CARGUE) {
    window.location.replace(`${homeForRole(roleCode)}?role=${roleCode}`);
  } else {
    mountSidebar({ rootEl: document.getElementById('sidebarRoot'), roleCode, activeId: roleCode === 'ADMIN' ? (TIPOS.includes(tipoParam) ? tipoParam : 'inscripciones') : 'eventos' });
    mountHeader({ headerEl: document.getElementById('topHeader'), role });
    mountBackdrop();
    mountDemoSwitcher({ roleCode });

    if (roleCode === 'ADMIN') {
      renderOversight();
      document.title = `Naowee Eventos — ${TIPO_CFG[TIPOS.includes(tipoParam) ? tipoParam : 'inscripciones'].label} · seguimiento`;
    } else {
      render();
      document.title = ev ? `Naowee Eventos — ${ev.name}` : 'Naowee Eventos — Cargues';
    }
  }
</script>
