<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naowee Eventos — Reportería</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared/tokens.css?v=0.4.0">
<link rel="stylesheet" href="shared/shell.css?v=0.4.5">
<link rel="stylesheet" href="shared/list-components.css?v=0.4.2">
<link rel="stylesheet" href="shared/event-detail.css?v=0.4.0">
<link rel="stylesheet" href="shared/forms.css?v=0.4.3">
<link rel="stylesheet" href="shared/reporteria.css?v=0.6.2">
<link rel="stylesheet" href="shared/naowee-footer.css?v=0.4.0">
<script src="shared/naowee-footer.js?v=0.6.2" defer></script>

<style>
  /* Topbar: back (ghost canónico) a la izquierda, CTA a la derecha. */
  .rep-topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
</style>
</head>

<body>
<div class="shell" id="shellRoot">
  <div id="sidebarRoot"></div>
  <div class="main">
    <div class="top-header" id="topHeader"></div>
    <div class="page" id="pageRep">
      <div class="page-inner" id="repApp"></div>
    </div>
  </div>
</div>

<script type="module">
  import { mountSidebar, mountHeader, mountBackdrop, mountDemoSwitcher, getRoleFromQuery, getIcon, ROLES, homeForRole } from './shared/sidebar.js';
  import { allEvents, STATUS_LABEL } from './shared/events-data.js';
  import { buildReporteria } from './shared/reporteria-data.js';
  import { dailyChart, hbars, donut, progress, podio, stackedBars, animateBars } from './shared/reporteria-charts.js';

  const params = new URLSearchParams(location.search);
  const roleCode = getRoleFromQuery();
  const role = ROLES[roleCode] || ROLES.USER;
  const CAN_VIEW = roleCode === 'ADMIN' || roleCode === 'USER';

  /* ─── Iconos ─── */
  const I = {
    chart: getIcon('chart'), ticket: getIcon('ticket'), ranking: getIcon('ranking'),
    medal: getIcon('medal'), athlete: getIcon('athlete'),
    /* Chevron IZQUIERDO para "volver" (getIcon('chevron') apunta hacia abajo). */
    chevL: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>'
  };
  const cal = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
  const pin = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
  const bld = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';

  const PALETTE = ['#1f78d1', '#d74009', '#7c3aed', '#1f8923', '#0891b2', '#9333ea', '#c2410c', '#065f46'];
  const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  /* ════════════ Dropdown canónico del DS (.naowee-dropdown) ════════════
     Engine copiado VERBATIM de evento-crear.html (mismo CSS en forms.css que
     ya cargamos). Reusar, no reinventar. ddMarkup() emite el HTML; setupDropdown()
     pinta opciones, maneja apertura/cierre/auto-flip y bottom-sheet en móvil. */
  const ddChevron = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  const ICON_X = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  let _sheetBackdrop = null;
  function ensureBackdrop() {
    if (_sheetBackdrop) return _sheetBackdrop;
    _sheetBackdrop = document.createElement('div');
    _sheetBackdrop.className = 'naowee-sheet-backdrop';
    document.body.appendChild(_sheetBackdrop);
    _sheetBackdrop.addEventListener('click', closeAllPopovers);
    return _sheetBackdrop;
  }
  function isMobile() { return window.matchMedia('(max-width: 760px)').matches; }
  function closeAllPopovers() {
    document.querySelectorAll('.naowee-dropdown.is-open').forEach((el) => el.classList.remove('is-open'));
    if (_sheetBackdrop) _sheetBackdrop.classList.remove('is-open');
  }
  function setupDropdown(name, opts, onSelect, getSelected) {
    const dd = document.querySelector(`[data-dd="${name}"]`);
    if (!dd) return { setLabel() {}, setDisabled() {}, close() {} };
    const menu = dd.querySelector('.naowee-dropdown__menu');
    const valEl = dd.querySelector('[data-dd-val]');
    const trigger = dd.querySelector('.naowee-dropdown__trigger');
    const sheetTitle = dd.getAttribute('data-sheet-title') || 'Selecciona';
    function paint() {
      const sel = getSelected ? getSelected() : null;
      const sheetHead = `<div class="naowee-dropdown__sheet-head"><span class="naowee-dropdown__sheet-title">${sheetTitle}</span><button type="button" class="naowee-dropdown__sheet-close" data-close aria-label="Cerrar">${ICON_X}</button></div>`;
      const body = opts.length
        ? opts.map((o) => `
            <button type="button" class="naowee-dropdown__opt ${o.value === sel ? 'is-selected' : ''}" data-val="${esc(o.value)}">
              ${o.emoji ? `<span class="naowee-dropdown__opt-emoji">${o.emoji}</span>` : ''}
              ${o.html || `<span>${esc(o.label)}</span>`}
              <span class="naowee-dropdown__opt-check">${ICON_CHECK}</span>
            </button>`).join('')
        : `<div class="naowee-dropdown__empty">Sin opciones disponibles</div>`;
      menu.innerHTML = sheetHead + body;
      menu.querySelectorAll('.naowee-dropdown__opt').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const chosen = opts.find((o) => String(o.value) === btn.dataset.val);
          onSelect(chosen); close();
        });
      });
      menu.querySelector('[data-close]')?.addEventListener('click', (e) => { e.stopPropagation(); close(); });
    }
    function open() {
      if (dd.classList.contains('naowee-dropdown--disabled')) return;
      closeAllPopovers();
      paint();
      dd.classList.remove('is-up');
      if (!isMobile()) {
        const r = trigger.getBoundingClientRect();
        const espacioAbajo = window.innerHeight - r.bottom;
        if (espacioAbajo < 300 && r.top > espacioAbajo) dd.classList.add('is-up');
      }
      dd.classList.add('is-open');
      trigger.setAttribute('aria-expanded', 'true');
      if (isMobile()) ensureBackdrop().classList.add('is-open');
    }
    function close() {
      dd.classList.remove('is-open');
      trigger.setAttribute('aria-expanded', 'false');
      if (_sheetBackdrop && !document.querySelector('.is-open')) _sheetBackdrop.classList.remove('is-open');
    }
    trigger.addEventListener('click', (e) => { e.stopPropagation(); dd.classList.contains('is-open') ? close() : open(); });
    return {
      setLabel(label, isPlaceholder) { valEl.textContent = label; valEl.classList.toggle('is-placeholder', !!isPlaceholder); },
      setDisabled(d) { dd.classList.toggle('naowee-dropdown--disabled', d); },
      setOpts(next) { opts = next; },
      close
    };
  }
  function ddMarkup(name, sheetTitle, label, isPlaceholder, disabled) {
    return `<div class="naowee-dropdown naowee-dropdown--medium${disabled ? ' naowee-dropdown--disabled' : ''}" data-dd="${name}" data-sheet-title="${esc(sheetTitle)}">
      <button type="button" class="naowee-dropdown__trigger" aria-haspopup="listbox" aria-expanded="false">
        <span class="naowee-dropdown__value${isPlaceholder ? ' is-placeholder' : ''}" data-dd-val>${esc(label)}</span>
        <span class="naowee-dropdown__chevron">${ddChevron}</span>
      </button>
      <div class="naowee-dropdown__menu" role="listbox"></div>
    </div>`;
  }

  /* ─── Estado ─── */
  let events = [];
  let ev = null;
  let activeTab = 'inscripciones';
  let chartMode = 'd';
  let filterState = { org: '', dep: '', pru: '' };

  const TABS = [
    { id: 'inscripciones', label: 'Inscripciones', icon: I.ticket },
    { id: 'resultados',    label: 'Resultados',    icon: I.ranking },
    { id: 'medalleria',    label: 'Medallería',    icon: I.medal }
  ];

  function boot() {
    mountSidebar({ rootEl: document.getElementById('sidebarRoot'), roleCode, activeId: 'reporteria' });
    mountHeader({ headerEl: document.getElementById('topHeader'), role });
    mountBackdrop();
    mountDemoSwitcher({ roleCode });

    /* Click fuera de un dropdown → cierra (desktop); ESC también. */
    document.addEventListener('click', (e) => { if (!e.target.closest('.naowee-dropdown')) closeAllPopovers(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAllPopovers(); });

    events = allEvents();
    const wanted = params.get('id');
    ev = events.find((e) => e.id === wanted) || events.find((e) => e.status === 'activo') || events[0];
    activeTab = ['inscripciones', 'resultados', 'medalleria'].includes(params.get('tab')) ? params.get('tab') : 'inscripciones';
    render();
    document.title = ev ? `Naowee Eventos — Reportería · ${ev.name}` : 'Naowee Eventos — Reportería';
  }

  /* ─── Shell de la página (contexto + filtros + tabs + panel) ─── */
  function render() {
    filterState = { org: '', dep: '', pru: '' };
    const backHref = `dashboard.html?role=${roleCode}`;
    const cargueCta = roleCode === 'ADMIN'
      ? `<a class="naowee-btn naowee-btn--ghost naowee-btn--sm" href="cargue.html?tipo=inscripciones&id=${ev.id}&role=${roleCode}">${I.ticket} Ver cargues</a>`
      : '';

    document.getElementById('repApp').innerHTML = `
      <div class="rep-topbar">
        <a class="naowee-btn naowee-btn--ghost naowee-btn--sm" href="${backHref}">${I.chevL} Volver al dashboard</a>
        ${cargueCta}
      </div>

      <!-- Contexto del evento + selector -->
      <div class="rep-ctx">
        <div class="rep-ctx__main">
          <div class="rep-ctx__title">
            <span class="rep-ctx__name">${ev.emoji} ${esc(ev.name)}</span>
            <span class="badge s-${ev.status}">${STATUS_LABEL[ev.status]}</span>
          </div>
          <div class="rep-ctx__meta">
            <span class="rep-chip">${cal} ${esc(ev.start)} — ${esc(ev.end)}</span>
            <span class="rep-chip">${pin} ${esc(ev.place)}</span>
            <span class="rep-chip">${bld} ${esc(ev.org)}</span>
          </div>
        </div>
        <div class="rep-ev-switch">
          <label>Evento</label>
          ${ddMarkup('evSwitch', 'Evento', `${ev.emoji} ${esc(ev.name)} · ${STATUS_LABEL[ev.status]}`, false, false)}
        </div>
      </div>

      <!-- Gran container canónico (patrón .carg-tabs-card): tabs + filtros + panel -->
      <section class="rep-tabs-card" aria-label="Tableros de reportería">
        <div class="naowee-tabs naowee-tabs--proportional" id="repTabs" role="tablist" aria-label="Tableros de reportería">
          ${TABS.map((t) => `
            <button class="naowee-tab${t.id === activeTab ? ' naowee-tab--selected' : ''}" data-tab="${t.id}" type="button" role="tab" aria-selected="${t.id === activeTab}">
              ${t.icon}<span>${t.label}</span>
            </button>`).join('')}
        </div>
        <div class="rep-tabs-card__body">
          ${filterBar()}
          <div id="repPanel"></div>
        </div>
      </section>
    `;

    document.querySelectorAll('#repTabs .naowee-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        if (tab.dataset.tab === activeTab) return;
        activeTab = tab.dataset.tab;
        chartMode = 'd';
        document.querySelectorAll('#repTabs .naowee-tab').forEach((t) => {
          const on = t.dataset.tab === activeTab;
          t.classList.toggle('naowee-tab--selected', on);
          t.setAttribute('aria-selected', on);
        });
        syncUrl();
        renderPanel();
      });
    });
    bindFilters();
    renderPanel();
  }

  function syncUrl() {
    const u = new URLSearchParams(location.search);
    u.set('id', ev.id); u.set('tab', activeTab); u.set('role', roleCode);
    history.replaceState(null, '', `?${u.toString()}`);
  }

  /* ─── Barra de filtros (dropdowns CANÓNICOS .naowee-dropdown + botones DS) ─── */
  function filterBar() {
    return `
      <div class="rep-filter">
        <span class="rep-filter__label">Filtrar por</span>
        ${ddMarkup('fOrg', 'Organismo', 'Todos los organismos', true, false)}
        ${ddMarkup('fDep', 'Deporte', 'Todos los deportes', true, false)}
        ${ddMarkup('fPru', 'Prueba', 'Todas las pruebas', true, true)}
        <div class="rep-filter__actions">
          <button class="naowee-btn naowee-btn--ghost naowee-btn--sm" id="fClear" type="button" disabled>Limpiar</button>
          <button class="naowee-btn naowee-btn--loud naowee-btn--sm" id="fApply" type="button">Aplicar filtros</button>
        </div>
      </div>`;
  }
  /* Cablea los 4 dropdowns canónicos. Switcher de evento → re-render; filtros =
     cosméticos en la demo (igual que el mock de Diego), pero con UX real:
     cascada deporte→prueba, Limpiar resetea, Aplicar da feedback. */
  function bindFilters() {
    const D = buildReporteria(ev);
    /* "Limpiar" (--ghost) arranca disabled; se habilita en cuanto hay algún
       filtro seleccionado, y vuelve a disabled al limpiar. */
    const fClearBtn = document.getElementById('fClear');
    const updateClearBtn = () => { fClearBtn.disabled = !(filterState.org || filterState.dep || filterState.pru); };

    setupDropdown('evSwitch',
      events.map((e) => ({ value: e.id, label: `${e.emoji} ${e.name} · ${STATUS_LABEL[e.status]}` })),
      (chosen) => { ev = events.find((x) => x.id === chosen.value) || ev; syncUrl(); render(); },
      () => ev.id
    );

    const orgOpts = [{ value: '', label: 'Todos los organismos' }, ...D.insc.porOrganismo.map((o) => ({ value: o.name, label: o.name }))];
    const ddOrg = setupDropdown('fOrg', orgOpts,
      (c) => { filterState.org = c.value; ddOrg.setLabel(c.value || 'Todos los organismos', !c.value); updateClearBtn(); },
      () => filterState.org);

    let ddPru;
    const depOpts = [{ value: '', label: 'Todos los deportes' }, ...D.insc.porDeporte.map((d) => ({ value: d.lbl, label: d.lbl }))];
    const ddDep = setupDropdown('fDep', depOpts,
      (c) => {
        filterState.dep = c.value; ddDep.setLabel(c.value || 'Todos los deportes', !c.value);
        filterState.pru = ''; ddPru.setLabel('Todas las pruebas', true); ddPru.setDisabled(!c.value);
        updateClearBtn();
      },
      () => filterState.dep);

    ddPru = setupDropdown('fPru', [{ value: '', label: 'Todas las pruebas' }],
      (c) => { filterState.pru = c.value; ddPru.setLabel(c.value || 'Todas las pruebas', !c.value); updateClearBtn(); },
      () => filterState.pru);
    ddPru.setDisabled(!filterState.dep);

    document.getElementById('fClear').addEventListener('click', () => {
      filterState = { org: '', dep: '', pru: '' };
      ddOrg.setLabel('Todos los organismos', true);
      ddDep.setLabel('Todos los deportes', true);
      ddPru.setLabel('Todas las pruebas', true); ddPru.setDisabled(true);
      updateClearBtn();
    });
    document.getElementById('fApply').addEventListener('click', (e) => {
      const b = e.currentTarget; const t = b.textContent;
      b.textContent = '✓ Filtros aplicados'; setTimeout(() => { b.textContent = t; }, 1400);
    });
  }

  /* ─── Panel por tab ─── */
  function renderPanel() {
    const D = buildReporteria(ev);
    const el = document.getElementById('repPanel');
    if (activeTab === 'inscripciones') el.innerHTML = panelInsc(D);
    else if (activeTab === 'resultados') el.innerHTML = panelRes(D);
    else el.innerHTML = panelMed(D);
    animateBars(el);
    bindChartToggle(D);
  }

  function emptyState(msg) {
    return `<div class="rep-panel"><div class="rep-empty">
      <div class="rep-empty__icon">${I.chart}</div>
      <div class="rep-empty__title">Aún no hay datos para este tablero</div>
      <div class="rep-empty__text">${msg}</div>
    </div></div>`;
  }

  function kpi(icon, cls, tag, tagUp, num, lbl) {
    return `<div class="rep-kpi">
      <div class="rep-kpi__top"><div class="rep-kpi__icon ${cls}">${icon}</div><span class="rep-kpi__tag${tagUp ? ' up' : ''}">${tag}</span></div>
      <div class="rep-kpi__num">${num}</div><div class="rep-kpi__lbl">${lbl}</div>
    </div>`;
  }

  /* ── INSCRIPCIONES ── */
  function panelInsc(D) {
    const d = D.insc;
    if (!d.hasData) return emptyState(`<strong>${esc(ev.name)}</strong> está en preparación. Las inscripciones aparecerán aquí en cuanto el gestor cargue el primer registro.`);
    return `<div class="rep-panel">
      <div class="rep-kpis">
        ${kpi(I.athlete, 'blue', `${d.pctCupo}% del cupo`, false, D.num(d.inscritos), 'Deportistas inscritos')}
        ${kpi(bld, 'green', 'participando', false, d.organismosCount, 'Organismos')}
        ${kpi(I.ranking, 'orange', 'en disputa', false, d.deportesCount, d.deportesCount === 1 ? 'Deporte' : 'Deportes')}
        ${kpi(I.ticket, 'purple', `${d.pruebasConInscritos} con inscritos`, false, d.pruebasCount, 'Pruebas')}
      </div>
      <div class="rep-widgets">
        <div class="rep-w rep-w--4">
          <div class="rep-w__hd"><div><div class="rep-w__title">Inscripciones registradas</div><div class="rep-w__sub">Registros diarios · línea de promedio</div></div>
            <div class="rep-toggle"><button class="rep-tgl on" data-mode="d" type="button">Diario</button><button class="rep-tgl" data-mode="a" type="button">Acumulado</button></div>
          </div>
          <div class="rep-chart" id="dailyChart">${dailyChart(d.daily, chartMode)}</div>
        </div>
        <div class="rep-w rep-w--2" style="display:flex;flex-direction:column">
          <div class="rep-w__title">Tipo de deporte</div><div class="rep-w__sub">Distribución por categoría</div>
          <div style="flex:1;display:flex;align-items:center;justify-content:center">${donut(d.tipo)}</div>
        </div>
        <div class="rep-w rep-w--3"><div class="rep-w__title">Por organismo</div><div class="rep-w__sub">Inscritos por liga · top ${d.porOrganismo.length}</div>
          <div class="rep-hbars">${hbars(d.porOrganismo.map((o) => ({ lbl: o.name, v: o.v, c: 'var(--blue-info)' })))}</div></div>
        <div class="rep-w rep-w--3"><div class="rep-w__title">${d.porDeporteLabel}</div><div class="rep-w__sub">Inscritos por disciplina</div>
          <div class="rep-hbars">${hbars(d.porDeporte.map((x) => ({ lbl: x.lbl, v: x.v, c: 'var(--accent)' })))}</div></div>
        <div class="rep-w rep-w--6"><div class="rep-w__title">Progreso de inscripción</div><div class="rep-w__sub">Avance frente al cupo y cobertura de pruebas</div>
          <div class="rep-prog">${progress([
            { title: 'Inscripción vs cupo', done: d.inscritos, total: d.cupo, c: 'var(--blue-info)' },
            { title: 'Pruebas con inscritos', done: d.pruebasConInscritos, total: d.pruebasCount, c: 'var(--accent)' }
          ])}</div></div>
      </div>
    </div>`;
  }
  function bindChartToggle(D) {
    document.querySelectorAll('.rep-tgl').forEach((b) => b.addEventListener('click', () => {
      chartMode = b.dataset.mode;
      document.querySelectorAll('.rep-tgl').forEach((x) => x.classList.toggle('on', x.dataset.mode === chartMode));
      const box = document.getElementById('dailyChart');
      if (box) box.innerHTML = dailyChart(D.insc.daily, chartMode);
    }));
  }

  /* ── RESULTADOS ── */
  function panelRes(D) {
    const r = D.res;
    if (!r.hasData) return emptyState(`Todavía no hay resultados cargados para <strong>${esc(ev.name)}</strong>. El gestor los sube por inscripción o de forma masiva.`);
    return `<div class="rep-panel">
      <div class="rep-kpis rep-kpis--3">
        ${kpi(I.ranking, 'blue', `${r.cargados} de ${D.num(r.total)} pruebas`, false, D.num(r.cargados), 'Resultados cargados')}
        ${kpi(I.athlete, 'green', `↑ ${r.pctCargado}%`, true, D.num(r.deportistasConRes), 'Deportistas con resultado')}
        ${kpi(I.medal, 'orange', `${esc(r.deporteCtx)} · ${esc(r.pruebaLbl)}`, false, `<span style="font-size:22px">${esc(r.mejorMarca)}</span>`, 'Mejor marca registrada')}
      </div>
      <div class="rep-podio-card">
        <div class="rep-podio-card__title">Podio — ${esc(r.deporteCtx)} · ${esc(r.pruebaLbl)}</div>
        <div class="rep-podio-card__sub">Top 3 posiciones registradas en esta prueba</div>
        <div class="rep-podio">${podio(r.podio, PALETTE)}</div>
      </div>
      <div class="rep-table-card">
        <div class="rep-table-hd"><div><div class="rep-table-hd__title">Tabla de resultados</div><div class="rep-table-hd__sub">${esc(r.deporteCtx)} · ${esc(r.pruebaLbl)}</div></div>
          <span class="rep-table-count">${r.tabla.length} resultados</span></div>
        <div class="rep-table-scroll"><table class="rep-table"><thead><tr>
          <th class="num">#</th><th>Deportista</th><th>Organismo</th><th>Prueba</th><th style="text-align:right">Marca / Resultado</th>
        </tr></thead><tbody>
          ${r.tabla.map((row, i) => `<tr class="${i < 3 ? 'top' + (i + 1) : ''}">
            <td class="num"><span class="rep-pos-chip ${i < 3 ? 'pc-' + (i + 1) : 'pc-n'}">${row.pos}</span></td>
            <td><div class="rep-org"><div class="rep-org__av" style="background:${PALETTE[i % PALETTE.length]}">${row.av}</div><span class="rep-org__name">${esc(row.dep)}</span></div></td>
            <td style="color:var(--text-secondary)">${esc(row.org)}</td>
            <td><span class="rep-chip-prueba">${esc(r.deporteCtx)} · ${esc(row.marca ? r.pruebaLbl : r.pruebaLbl)}</span></td>
            <td style="text-align:right;font-weight:700">${esc(row.marca)}</td>
          </tr>`).join('')}
        </tbody></table></div>
      </div>
    </div>`;
  }

  /* ── MEDALLERÍA ── */
  function panelMed(D) {
    const m = D.med;
    if (!m.hasData) return emptyState(`El medallero de <strong>${esc(ev.name)}</strong> se llena a medida que se cierran las pruebas. Aún no hay medallas otorgadas.`);
    const rowsTop = m.porOrganismo.slice(0, 5);
    return `<div class="rep-panel">
      <div class="rep-med-summary">
        <div class="rep-med-kpi oro"><span class="rep-med-kpi__emoji">🥇</span><div class="rep-med-kpi__num">${m.oro}</div><div class="rep-med-kpi__lbl">Medallas de oro</div><div class="rep-med-kpi__sub">en ${m.pruebas} pruebas</div></div>
        <div class="rep-med-kpi plata"><span class="rep-med-kpi__emoji">🥈</span><div class="rep-med-kpi__num">${m.plata}</div><div class="rep-med-kpi__lbl">Medallas de plata</div><div class="rep-med-kpi__sub">en ${m.pruebas} pruebas</div></div>
        <div class="rep-med-kpi bronce"><span class="rep-med-kpi__emoji">🥉</span><div class="rep-med-kpi__num">${m.bronce}</div><div class="rep-med-kpi__lbl">Medallas de bronce</div><div class="rep-med-kpi__sub">en ${m.pruebas} pruebas</div></div>
        <div class="rep-med-kpi total"><span class="rep-med-kpi__emoji">🏅</span><div class="rep-med-kpi__num">${m.total}</div><div class="rep-med-kpi__lbl">Total de medallas</div><div class="rep-med-kpi__sub">${m.porOrganismo.length} organismos en el medallero</div></div>
      </div>
      <div class="rep-two">
        <div class="rep-card">
          <div class="rep-table-hd__title">Medallero por organismo</div>
          <div class="rep-table-hd__sub" style="margin-bottom:14px">Distribución apilada · top ${m.porOrganismo.length}</div>
          <div class="rep-leyenda">
            <div class="rep-leg-item"><div class="rep-leg-item__dot" style="background:var(--rep-gold-fill)"></div>Oro</div>
            <div class="rep-leg-item"><div class="rep-leg-item__dot" style="background:var(--rep-silver-fill)"></div>Plata</div>
            <div class="rep-leg-item"><div class="rep-leg-item__dot" style="background:var(--rep-bronze-fill)"></div>Bronce</div>
          </div>
          <div class="rep-shbars">${stackedBars(m.porOrganismo)}</div>
        </div>
        <div class="rep-table-card">
          <div class="rep-table-hd"><div><div class="rep-table-hd__title">Top organismos</div><div class="rep-table-hd__sub">Por medallas de oro</div></div></div>
          <div class="rep-table-scroll"><table class="rep-table"><thead><tr><th class="num">#</th><th>Organismo</th><th class="num">🥇</th><th class="num">🥈</th><th class="num">🥉</th></tr></thead><tbody>
            ${rowsTop.map((d, i) => `<tr class="${i < 3 ? 'top' + (i + 1) : ''}">
              <td class="num"><span class="rep-pos-chip ${i < 3 ? 'pc-' + (i + 1) : 'pc-n'}">${i + 1}</span></td>
              <td><div class="rep-org"><div class="rep-org__av" style="background:${d.c}">${d.av}</div><span style="font-weight:600">${esc(d.name.replace('Liga ', ''))}</span></div></td>
              <td class="num col-oro">${d.oro}</td><td class="num col-plata">${d.plata}</td><td class="num col-bronce">${d.bronce}</td>
            </tr>`).join('')}
          </tbody></table></div>
        </div>
      </div>
      <div class="rep-table-card">
        <div class="rep-table-hd"><div><div class="rep-table-hd__title">Medallero completo</div><div class="rep-table-hd__sub">Ordenado por medallas de oro · todos los deportes</div></div>
          <span class="rep-table-count">${m.porOrganismo.length} organismos</span></div>
        <div class="rep-table-scroll"><table class="rep-table"><thead><tr><th class="num">#</th><th>Organismo</th><th class="num">🥇 Oro</th><th class="num">🥈 Plata</th><th class="num">🥉 Bronce</th><th class="num">Total</th></tr></thead><tbody>
          ${m.porOrganismo.map((d, i) => `<tr class="${i < 3 ? 'top' + (i + 1) : ''}">
            <td class="num"><span class="rep-pos-chip ${i < 3 ? 'pc-' + (i + 1) : 'pc-n'}">${i + 1}</span></td>
            <td><div class="rep-org"><div class="rep-org__av" style="background:${d.c}">${d.av}</div><span class="rep-org__name">${esc(d.name)}</span></div></td>
            <td class="num col-oro">${d.oro}</td><td class="num col-plata">${d.plata}</td><td class="num col-bronce">${d.bronce}</td>
            <td class="num col-total">${d.oro + d.plata + d.bronce}</td>
          </tr>`).join('')}
        </tbody></table></div>
      </div>
    </div>`;
  }

  /* ─── Arranque (al final: evita TDZ con const/let de arriba) ───
       Guard RBAC: la Reportería es consumo de lectura → ADMIN y Usuario.
       Gestor (operativo) y Organismo (calendario) no la ven. */
  if (!CAN_VIEW) {
    window.location.replace(`${homeForRole(roleCode)}?role=${roleCode}`);
  } else {
    boot();
  }
</script>

</body>
</html>
